front:
  text: 翆㣲南征録􅃃之三
  hash: sha256:77af651a410d734840051e7420dfc5dd58a06779902a4b11399cd8a050a06cf9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_SBCK_003-1a}
body:
  text: 古詩别王㤗之正韵折次王飬黄塵漫漫小峯路白石齒齒茗坑渡相亭南耒第一程人􅃄蕭條􅀊云暮故人小隐三家村約我旗亭聊一樽相逢此地復相别明朝懐抱同誰論江上㕠舟催發前帆凨飽江天濶後帆半出踈林闕後帆招手呼前帆画皷􅁿敲縂催發前帆雪浪驚飛湍後帆䑨尾披銀山前帆漸緩後帆急相傍俱入蘆花灘島屿縈囬断还續沙尾夕陽明属玉望中酔眼昏欲花誤作閑􅐼小横軸慰吳吉甫縣尉女皆死焉所可免者渠夫婦折吉甫縣尉有横逆之難兄嫂詩慰之折而已作子鍼如京師一室膏􅂦臠兄室雖􅀍􅆷一妻犹可免伯奢事行役八子俱蹂踐兄家祸雖劇一女特婉孌女死固可傷殊未敵冠冕妻在固全軀丧女􅁨莫遣大厦既灰飛豊儲皆席􅃃鶺鴒􅁸嘆嗟鵉鳯徒展轉我昔以難動荷兄垂勸勉兄今以難告倍斍泪淟涊泛覌天之理禍福尝相反有難既不死他時非淺淺去兄一牛鳴為地良非逺不能見兄慰面目寔有靦自料吾與兄􅂔量及者鮮胡為蒼者天与子独覊蹇贈刘相士班超未侯漢誰識烏孫客韓信已王齊誰知長楽厄彼亦非異術忠䛕分黑白直道丗且違彼亦何􅁕責自古勲業人把鏡惟自索頋我洒落資􅁕可振翰翮如何汗馬秋英雄尚南謫祗應捻胎鬼手叚不合格古括子劉子閱人幾千百一見麞䑕質便許正疆埸知子忠且䛕愚固未暇擇萬一符子言亦可名簡冊它時双蹇馿与子訪黄石誚胡同巡囬見僕坐城旦之地遂不相􅂈以折同巡名瑾向与岳最善忽自潮陽之折詩誚岳昔㳺時卿兄尝􅂈弊庐捫心論事業耐乆良非虚岳今􅀠城旦氣象誠惨舒髠黥塞糞壌敢辱長者車尝聞古人交穷逹無親䟽冨貴不相􅁯有終还有􅀄与兄三載别無日不引裾中間喜一見欣慰云向如相去天一涯雲濤䟽雁魚忽聞夙駕囬喜色喧門閭相聞即相别厥意良踌躇尝聞郢中人結客于樵漁又聞淮南王受徳于刑餘岳既不自檢失身堕籧篨壮士視一死其犹尔欷􅒣势分已霄壤孤托難相于願兄此召还巍然奉中除前巖与西閣談􅀏㸔連茹或遇趙可父為岳声起居薰凨有良便當拜平安書送詹仲通縣尉秋郊送行色執别臨清流凨神掣囬栁故故牽衣裘吟螿附草際催客登蘭舟問客何所之駕言京闕逰愚聞京闕間多難三春秋閫外炙魚肉闕内羅羊頭􅂦却吠堯犬冠还沐椘猴和戎重輸費廊庙有隐􅁨賑荒少儲蓄郡國無良謀飛蝗蔽日月兆亀拆田畴君以􅀴濟材抱􅀒衝斗牛家傳医國秘殊不諸子侔有用即降平豈特為東周􅂅君開冕旒管折攄緒餘咳唾領一丗雄克復帰神州賤子忝知遇脫網􅀅從㳺相随上凌􅃄也勝登瀛洲作詩告于君君其許之不上詹仲通縣尉木少見肺肝兾叨烛電之􅀻但折某亀雀䝉恩犬馬誓報譬諸草之耻折劇布雷松竹不着花宻葉徒如箒江梅不藏葉寒花綴枯朽独有尨焙茶花葉秀而耦氷霜着群木凍死十八九惟此百草灵名可綴三友春雷迸雀舌夜雨滴尨口皆萌哺啜心誰假栽培手惟有蔡端明識之在蒿蔌移根入北苑金碧煥星斗夸作尨鳯團封成献元后門花何以報牙舌甘鼎臼他時子􅂧生為公滌繁垢西凨􅃃荷衣破破不成幅清霜折蕙囊冽冽已成蓿如何独東籬黄華􅀏寒菊物之有盛衰循環若推轂丗事良亦然亦豈物所欲金鈿鎔落日零露洒寒玉人皆惜芳菲誰􅂧念幽独惟有陶淵明慇懃費培沃簮花從㡌落撚酒酔商陸􅀙此擅秋芳芙桂非同録問花何以報剪首薦醽醁他時更粉軀為公明采目􅀉大􅁃郭縣尉前年建安然始識韓荆州一見辱知遇許我尝從㳺尋幽訪赤壁買􅀏陪青楼有酒即命駕夜飲􅁯觥籌雪香飄梅花帰駕仍遲留送君城北隅􅀊事希一周告徳雖未乆有怀奚所投客来自錦溪知為藍田逰摳衣欲趍隅其奈凨馬牛方啚拜尺􅁓文此不敏羞乃復三不緘獲戾于君侯謫客干典刑冝尔飡吳鈎幸不畀我死殘喘延俘囚搜索編中外釋縛良無由始思鵾􅉇翼庇我反手犹嘘灯拂毫楮尺素馳星流荷公三復还惻然添我􅁨許我京闕間与我為良謀于今秋􅂧冬俟命犹置郵西凨掠天宇魚㕍俱沉浮未審㤙波中許我共済不我材襪線短願公廣甄收他日賔幕府鏖􅀾當焚舟公􅀆不我援復駕言焉求􅃊陵方市􅃊韵折次方子浮雲掃盡天宇清千花萬花開錦屏好凨吹皱一池緑白鳥点破千山青客行五里復五里両眼丹青間紅紫杖屨不知行路難人在江南圖画􅂻月岩酒論詩拍掌擊案自謂淂句且对岳自折己巳春道廣信夜宿月岩邸中三客酌囙思月岩為山甚異午夜月出于岩之中折侈云我軰嘲凨詠月自有所淂勿恠狂􅄭之所以異詩之所由以作也然壁間集上折桂影于月之上月有小大桂有廣狹此山偶三客出天蟾字韵索筆和之三客頓首折留詠萹章無慮千萬求其絶称盖亦鮮儷以留嵗月折謝罪特疥壁六丁一鑿􅆰雲􅃄滿窟勒駕駈神仙氷輪推出月中月玉斧劈開天外天便把嫦娥􅀐綵鳳却呼羽客烹銀蟾更􅌽王母瑶池酒今夜廣寒同醉眠􅀬中呈椘南僧未應折時雩祷帝炎執鞭駈赤龍火車萬乗燒長􅆰長􅆰萬里俱藴隆流金爍石天地同我耒亭亭日當午欲避驕暘竟無所願求一洒楊栁枝化作東閩萬家雨送春山仍次其韵折約友人李景留春無計奈春何九十􅂈眼如飛梭三分二分凨雨尔十日九日愁悶呵凨前飛絮政無数雨後落花全不多争如買酒速相就君自􅁸舞吾能􅁔僧画􅅩珍欲増其價求一轉語于軸角折王􅅩珍所收十軸乃政和僧人所画萬景􅄘前老禅叔搜羅凨月帰岩谷胸中有句吐無声冩作生綃三四幅賀趙法曹幕後兼漕僉折趙可久入郡紅日轉簷花飛鳴一声鵲鵲翅未離簷有客拽鈴索呼童急啟户問客意何若客聞􅀏而言法曹参計鑰囙知鵲之鳴報我良不􅁖知我門下人一揵􅂓相託如公材器大末􅁺豈能縛咫尺蓬䒹宫左右芙蓉幕直入鳳凰池更上麒麟閣賤子無所需願作楊州寉野菜吟芙蓉峯下楊雄宅路入城闉里三百有山無粟飬鳮豚有水無人捕魚鱉山翁菜色流清涎齒頬連月無腥羶客来問我何所有手指萬􅊤􅃄霞边青芹不似蘆蒿美石芥防凨􅆰剔齒蕨腦􅅻抽稚子拳蘆牙已迸佳人指兒童不待明朝陽花襟路􅊜争荒􅋉携籠拍塞貯不盡帰耒滿䄂春凨香􅄃衣踏破青銅鏡挼動碧雲流一径漉帰銀􅂦作波濤無限春工上􅐻飣酒􅁔南陵名英折謝同舍葉尝聞子美清江曲日典春衣耽美醁又聞太白逰長安市上熏熏酔眠熟凨流囯􅂻太平時䖏䖏紅楼􅃞酒旗王孫公子恣行楽繁絃脆管相追随誰知寥落天涯客笠頂清凨秋挑月􅉭鞋踏編山水雄奮身欲入黄金闕方嗟蕭索向西園刮面寒凨雨漲天囬頭忽喜黑衣至擊破紅泥傾数船雖無皓齒􅁔金􅈁也掃新詩狂欲舞兒童拍手􅀏攔街應怪吳儂喜如許長江波浪􅃃銀山去去仍悲道路難只􅑀一酔進未得更借髙凨吹片帆􅀉敬甫葉兄􅀊次丁夘秋八月既生魄于時謫建安脫去未有䇿忽覩星鳯光慨然陪履舄自謂入閩建閱人几千百間有知功名所見復邪僻否則苟利禄鄙猥何􅁕責星次幾一周幸我安且懌尝覌義与利更相為損益欲論古人交二者請君擇不惟眼独青且要心同赤此身可虀粉此道不可易自料吾与君造物難弃擲胸次蓬䒹山襟懐雲梦澤未說詩書帥休論文章伯坣坣大丈夫詎可虚竹帛但恨不振蹤尚此多扞格在君當先登挽囬二千石飢溺切君身推觧􅂈畴昔炎凉無異心始終無異迹庶幾吾二人交情可全璧記梦􅁕跌囙記諸低折夜梦牛入室角折夜漏徹三更梦牛入我屋有角断而懸有􅁕折而縮驚斍細思量䜟有何祸福兆者事之先形者心之属事既兆于心梦乃形于腹入屋牛有盖為牢事刑獄吾今尚縲囚其應已桎梏軆具牢方具無􅁕牢不􅁕不􅁕意無他示予可脫輻去盖只論牛其義尤可録牛􅁕不下垂淂一生可續牛角不上横淂某去何速一旦忤君心吾罪當何贖生去􅂔横秋凨馬不相逐下裂輿地圖上應周天宿峥嵘挽萬鈞其始播百穀身雖在籠檻志不􅈳溝瀆􅇞戚不吾􅁔丙吉當吾哭安淂如齊王􅂈坣憐觳觫琴􅄜鐫二十八字于底折翠微淂雷霹材断曰天月浸虗坣夜氣清􅁸聴萬􅄜􅄫無声􅁿􅁿拂動匣面塵玉笋不弹風自鳴苦蚊四壁人声絶榻下蚊煙㓕可憐翠㣲翁一夜敲打拍翠㣲南征録􅃃之三
