front:
  text: 翠㣲南征録􅃃之十
  hash: sha256:cb8f710264e3d3a23d071f423f0d092ad04f6641358a11d0f1285be2dc002873
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_SBCK_010-1a}
body:
  text: 七言絶句白面渡不曉白面之義因詩其事折在池陽之西五十里村人皆繫舡白面問溪翁名不虗傳説未通秪恐當年溪上女浣紗時節懶勻紅田家十絶十幅生綃一墨池盡收好景入屏幃㑹湏少緩丹青筆更倩牧童横笛帰其二農夫日炙面如煤絲婦繅成雪一堆早早安排了官税莫教耆長上門催其三老農鋤水子收禾老婦攀机女擲梭黄絹已成空对喜納官还主外无多其四鳮唱三声天欲明安排飯椀与茶瓶良人犹恐催耕早自扯蓬􅐼看曉星其五緋袴青衫紫繫腰攬衣隨過水平橋雖然不識風流事也向人前學逞嬌其六村獒奮迅出籬笆欲吠还休喚可拏不是忘机太馴狎那囘曾宿那人家其七画眉無墨把燈燒豈識宫粧与翠翹堪笑東風也相謔暗牽裙帶纒声折去人腰其八脔魚炊糝作荷包宿飯無湯煖酒澆放椀出門行一匝小溪新漲已平橋其九麥飯􅀲虀及早催田夫双眼望儂來油塩不倩傍人帶日午痴兒犹未囘其十拂曉呼兒去採樵祝妻早办午炊燒日斜枵腹歸家看尚有生枝炙未焦舂夫秕穅粒粒裹真珠玉杵舂來白有餘待問常姮借金鼎等閑令汝作蟾蜍新市雜詠十首紗翠盖常无異于花朝灯夕折建安人物風流市井華麗紅未尝見之惜藁帙散落不多見耳折長篇短句形容一時之盛翠㣲之前雲鬟烟鬂縷双鴉一搦宫腰柳帶花試問行雲何處覔画橋東畔是奴家其二翠翹佯醉倩人扶約我文君賣酒壚解珮向人陪笑問一盃容妾佐樽無其三恰把青荷挿髻鴉嗔人偷眠過􅐼紗一盤珠翠俱抛擲却向枝頭摘杏花其四遅遅蓮漏不相催亭舘無人午夜開風欲捲簾花影動梦魂疑是故人來其五小橋相見便相親猶帶西湖陌上塵欲買一樽聊欵曲歸遅還怕小蛮嗔其六不帶冠兒不挿花過門佯把扇兒遮嗔人貪數天边雁失記囘頭喚喫茶其七青衫揾淚向人啼妾本秦樓浪子妻流落南州歸不得青樓今在画橋西其八一年不訪李紅娘今日過門意已忘嘶入画橋東畔路紫騮犹記舊垂楊其九花牋得得寄瀛洲約我今宵特地留好笑蒼頭迷去路緑楊無處認青樓其十朱門粉壁謫仙家柳外鞦韆襯落霞一澗碧雲流不去木蘭舟繫木蘭花花村二首山翁云村人花姓因曰花村折寧州花村初謂紅紫之地問問􅀫花村喜有餘已􅂸花下倩人扶牧童不見枝頭杏空向青帘問有無夜宿花村不見花數間茅屋瞰溪沙山翁不是通名姓幾誤河陽令尹家過番陽湖及中流風濤大作篙師束手翠㣲折翠㣲訪趙貢无于畨陽湖之中方絶而止折恬然哦一北風翻雪鼓雷霆舟子停蘭亦斷魂看我金鱗三十六為君一躍上龍門嘲熱門學種􅀲次其韵折張季卿詩云甘傍青赤帝乗龍駕火車晴空燒斷暮天霞流金爍石休相酷少皥看看催戍􅀲三友亭不預其間非私故可議即炎凉世情折平山常有六客從㳺東館之集乃半江梅之間命曰三友回次其韵聊及前日折之論人殆不免異日盧子彰作亭于松竹伯雲皆平山客也折之意盖子彰与李老松疎竹間梅英三友如何独擅名應是枇杷并檜栢當時無力預同盟青樓贈别老人韵折次甘州笛声吹徹玉樓寒金鴨香消更漏殘含淚欲揮羞不敢倩他銀烛向人彈枕上吟凨聞角折建邸曉畵角梅花吸曉寒數声清徹碧雲端誰知有客愁無􅄰一掬鄉心不奈酸午枕三盃未醒復三盃醉眼朦朧劈不開急辦藤床并竹枕要隨蝴蝶到蓬萊香篆字送至求和囙次其韵折刘子源有香篆詩押􅁅輕覆雕盤一擊開星星㣲火自徘徊还同物理人間事歴盡﨑嶇心始􅁅􅲦齋雜詠二十首其一落花東風吹恨上眉頭兩岸桃花瞰碧流一片紅雲飛不起斷霞殘照落汀洲其二宿溪上夢囘斜月掛林端酒力初消怯夜寒何䖏客舟犹未泊一声柔櫓過前灘其三漁兒無肉鸕鷀入水頻双童聨網立沙濱問渠掃得魚多少纔可爲羮了一人其四㑹五友聨翩屐齒破苔痕醉􅂻觥籌不計陳來日不須關太史五星令返聚甌閩其五宿茅亭投宿茅亭得夜凉鷓班摇落奏篔簹青簪擊破寒􅆤紙漏淂山花一線香其六江濤曉鐘搥動巨鰲䟫棖折音枕上春雷一夜轟應是金鱗三十六化龍頭角逞崢嶸其七月夜吟一声殘角送黄昬独倚闌干空斷魂竹影掃堦塵不動自挨明月閉柴門其八嘲染鬂者萬事關心兩鬂秋柳灰何用苦文羞無情霜雪催年少閑似青山犹白頭其九早春梅梢弄粉做新晴積雪殘雲没一星只把眼前春事卜麥坡已作佛頭青其十憶西湖十年南國嘆徘徊一片鄉心撥不開應是西湖花柳問風流何事未歸來其十一問宿紫騮回首客思歸萬里家山蝶梦迷問宿莫耒林下邸夜深生怕杜鵑啼其十二曉望長天萬里掃清秋宿霧朝雲寸不留向曉殘星犹未落一盤棊子倩誰收其十三患瘡前回風疹徧身紅布褐因燒艶火烘両腿熱瘡今又發休將紙被把頭䝉其十四水禽一曲漁歌古渡頭幾多鷗鷺起汀洲西風吹㪚瑶池雪点破長天萬里秋其十五獨宿朔風号木作嚴霜錦被重重凍欲僵夜半脚跟疑已割梦魂安得到髙堂其十六幽居獨自清閑獨自忙杳無人迹到蕭墻眠時不用呼童僕自有清風爲拂床其十七送行秋波春水照殘霞恨雨愁雲嚲髻鵶飛上領襟隨得去妾身安得似楊花其十八春思東風吹恨入青樓滿目春容縂是愁楊柳織成絲萬縷􅑀誰裁作翠茸裘其十九小春閩南十月已春回無限風光暗􅂻催桃李海棠俱閗艶誰云梅是百花魁其二十上巳桃溪噴火柳拖烟如豆青梅已半酸燕子怯春歸未得一簾風雨杏花寒嘲賀將仕二首不克詣賀以詩嘲之折賀兄燕尔翠㣲繋獄花何太喜誰能賦葉是良媒解寄詩但斍人間傳盛事不知天上集佳期其二吾身西圛拘犹少君腹東床坦已多我欲屠牛穷建節君從歡燕小登科冬晴卿韵折次孫子臘月南州不類冬梨花飄粉小桃紅未曽飛動遥山雪早有春三二月風夢謫仙夢駕白雲參謫仙謫仙留賦白雲篇醉將隻手拏虹筆便扯青霄作彩牋懷九江友人罷釣線矣作詩訐之折久不見荣仲樵似聞巳浪拍西風萬􅊤秋幾多香餌落金鈎無魚可釣渾閑事留得􅁝綸在即休翠㣲南征録􅃃之十
