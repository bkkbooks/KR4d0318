front:
  text: 翠㣲南征録􅃃之九
  hash: sha256:75c9d94fe335473641af63e172a5bd21c8b4fb6c2f38f95f0dbdc3981341c07f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_SBCK_009-1a}
body:
  text: 律詩􅲦齋潦其偏有数尺之室僅可置身簷厦去折西関屋㝡􅁦陋上不蔽凨雨下不避􅂗而岀目曰􅲦齋折地不逺不能直腰屋老塵生索椽低帳不縑炙灯􅃄染棟見客帽翻簷織壁慳三尺遮門断半簾吾身交九四控制萬愁兼容膝􅲦齊之側有䖏曰容膝具体功非逺全軀恨已消安禪湏促跌覔句敢成摇悔不身齊足時當事半腰行人只蒲伏何䖏得逍遥野飲呈祝山甫次山甫韵野景何湏買山花不待培幕天分古木裀地得蒼苔酒上鶯調曲肴空鵲墮梅一壺隨所適何䖏問蓬萊題練省元壁次日岀福建界脚債嗟犹欠心朋喜偶逢溪声含客怒山色為誰濃古樹晴摇盖殘蟬晚帶鐘莫辝一樽酒明日是吳儂南浦客邸遇兩半月南浦半月兩溪流暗没沙断橋虹散綺拍岸雪飛花孤舘客無梦短蓬人未家何如擁紅日照我上筠車借景樓則四璧笙簫之声間發戎坐馮著明折翠㣲居建新市萬花間交客至命酒我有也有詩次韵折目曰借景言其皆非朱箔鈎新月平闌架落霞百錢呼酒炙四壁聽笙笳翠映誰家竹香飄何䖏花功名未歸我且此寄生涯宿水陸寺送陳工部上建陽屇水陸寺蕭寺廊廡濶無人独自行吳儂非好僻楚客為誰清花落􅑀風掃灯殘借月明江湖有烟浪且此寄餘生呈魯伯瞻伯瞻有詩次其韵信断無青鳥盟寒有白鷗悶和詩作首愁聽水滴蓮花曉山空桂子秋功名有期㑹教浦城買舟諸友苛留舟人折菊節日買舟商下㣲雨催行斾西風送客舟籬邉鞠纔放浪激花翻雪山涵影浸秋前灘歸興呈吳梦祥次吳梦祥送魚㕍音書少關山梦寐遥對花思粉面遇喜意鵲應報歸心馬更驕西風綽鞭􅌱飛秋晩即事次黄巨瞻韵秋宇清如洗秋宵分外長寒鳮鳴午夜征㕍喚重陽楓葉已全赤菊花纔半黄不知秋幾許試与問蘇郎呈李景山次楊次杜韵居靜心尝樂愁多鬂不禁買舟和月載把酒對花斟白水有深淺青山無古今從兹淂真趣消盡利名心小圃舍北有餘隙平禠作小園花存四五本竹種兩三根風伯倩摇珮月娥煩佐尊誰知方丈􅂻别有一乾坤村居次臧仲武韵時在双瑞莫怪村居僻村居亦可嘉僕羸腰帶艾婢倩鬢簪花歌罷蛙催樂酒闌蜂報衙門前少車馬慚愧五侯家宣城道中恰到杏花天轉頭過禁煙燕歸纔數日蚕起又三眠少智慚樗里多材憶孟堅功名且隨分無苦自咨煎過新豐市懷古書坣今立道旁折新豐乃太白旧㳺路岀横江去虛堂立道偏雨声楊柳外風色杏花前有泪沾詩宿無欹述酒仙采江千古恨號認向誰傳買舟浦城畏路逢危路尋舟得小舟始云為得計終乃復添憂艙狹難伸足篷低怎㪯頭十圍無䖏著踘促向中流憇妙因寺次王有道先生韵蕭寺寒山外﨑嶇一徑幽断雲迎客入曲水護堤流木石四時古軒􅐼五月秋午煩聊小憩拂石為支頭再繼前韵俗塵方倥偬淂淂訪清幽煙練素疑抹山屏翠欲流松筠掃日月藤蔓懸春秋物外有餘樂吾生空白頭七言絶句讀漢史閱紀信韓信傳漢將假帝為真帝齊乞真王作假王大抵紀韓皆是信不知誰短又誰長寄王五四將仕戊辰以其兄之事耒告徘徊折將仕乃清之弟寓廣信嵗在二絶餞行折乆之臨别以季叔青天轟霹靂屈原平地溺波濤從教晉楚多戕賊二子何曾損一毫周田且謂曾占易商野何嘗識梦書假使二君無感召不成終老在樵漁約叔叔真從㳺兩月徬徨不􅃘去作詩送之折二首权真􅀌髙山林自􅁑􅄘耒見半間屋抵斗來大一箇身同山樣髙側坐斜眠俱不得煩君除去一牛毛厄臺有事留司馬凌閣無名問太宗我且􅐻桓君且去歸期千載約芙蓉題􅈧間夜􅁸讀書有感陽虎不名真盗玉子張何事便書紳聖賢立論有㣲㫖精義當求妙入神過西溪觧珮青帘一􅋨而去折道經西溪僕馬痡瘖路随馬足難知數山叠魚鱗不記名隔岸青帘人不渡一溪流水暮潮生題蓮華壁間風外落花千萬片水边啼鳥兩三声無情驚起陽臺梦独倚閑􅐼看月明贈吕元玘居分水道旁周末見人歌采芑楚先聞客賦離騷胸中有氣不能吐空使虹蜺萬丈髙初抵富沙二首芳草不隨春水緑連山犹帶夕陽明人生有酒且行樂休向河梁問子卿鞭鐙兩三千里路樓臺數十万人家長虹不吸秋江水一葉扁舟懸雪花呈周及之貢元山中留宿折及之居三衢一頭却過六七嶺兩足幾乎百十斤恰喜故人能下榻檠􅐼樽酒細論文寧川冷渡次壁間韵峯囬路轉六七里林靜鳥啼三四声㳺女不知行旅恨一茶留我話平生􅀫灌頭次璧間韵淡魚􅅻煮醎魚熟白酒新篘紅酒香莫訝盃􅐻成草草一年忙䖏是蚕桑南浦水閣其中麗人不知行客南征之後乃折南浦橋之西有閣臨水同舍宴岳之意成二十八字折有挿花臨水相嘲橋横南浦虹千丈柳護西溪翠一行佳麗不知滋味􅁖挿花臨水照紅粧秋晩独步次刘彦礼韵十分秋色着嵓桂幾陣晚凉催井桐自恨異鄉知遇少一樽相属與誰同後溪二首蓬􅐼夜雨短長夢啼鳥喚人新旧愁萬里論文一樽酒醉和明月上扁舟泉声恰似世情惡山色不如歸興濃自恨十圍無處著何如瘦作束腰蜂楊花一絲不染湖光白萬点能囘山色青三月金明池上水与予同是一浮萍杜鵑殘月照愁人病酒好風吹梦客思家欲知亡國恨多少紅盡乱山無限花悶述二首雁翎未忍刳丁謂虎口犹期脱蔡京何事姦邪皆倖免洛陽年少却南征有鼎不烹胡虜肉無刀可断佞臣頭男兒此等不平氣空使衝冠射斗牛酒禁民不許交飲之禁折次項仲山韵嘲軍將軍愛士民心失太守憂民士氣衰大抵軍民皆赤子如何從此便藩籬贈美人别鼎才韵折次男氏􅀩花臉送愁和露泣鶯声傳恨向人嬌别情逺去尤難割相送不須離畫橋寄宗上人我為扣閽拘狴犴汝將吟筆換袈裟别來猶記松􅐼外一掬清泉自点茶寄趙及父欲邀詩社同蓮社為築將壇并杏壇圖淂有材皆命世不隨風月報平安有感千囷未必將軍喜五斗難消令尹愁若使淵明逢魯肅折腰應到脚跟頭桃花紅雨隨風散落霞行人幾誤武陵家牧童若向青帘見應認枝頭作杏花􅁌月人間離别最堪憐天上嫦娥恐亦然昨夜廣寒分破鏡半匲飛上九重天翠㣲南征録卷之九
