front:
  text: 翠㣲南征録巻之十一
  hash: sha256:1757decbd50cd0c3c19e4b55b7bed4af72868b7a4d4626cbb4f2506b761d205d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_SBCK_011-1a}
body:
  text: 七言絶句漁父父先送翠㣲翠㣲次韵徑还叔陽明父折廖叔陽漁父詩押花字求何明父和明當退矣明父名于詩社嘆服如此折不及見也它日明父閱軸云老秋江村水落富魚鰕半属橋边賣酒家莫訝鬂边新有雪夜來沉醉宿蘆花寄趙德夫男兒無路出邯鄲長鋏休從暗􅂻彈是䖏有魚堪下釣扁舟何独子陵灘春閨雜詠十首折問庖嫿溪舘供庖独有魚溪翁日日扣吾庐兒童不問無錢買便拽鈴兒喚小厨其二午枕午簟風清帳自開日斜雙鼻尚鳴雷不知蝴蝶何方去多少黄鸝喚不囘其三落花石痕新褪落溪毛應是春流昨夜潮紅雨入簾衣不濕玉人沾作鬂边嬌其四巻簾眉帶遥山淡拂秋幾多春恨瑣重樓真珠半巻嬌無力須索偎人為上鈎其五酒醒宿酒初醒午夢回不煩梳掠傍粧臺曲肱斜把香腮托却訝荷花藕上開其六雪獅兒勸罷浮酥酒一巵殢人相伴塑獅兒却將凍手和衣拍笑我金鈴用橘皮其七醉歸紅猊燒盡夜堂寒銀烛生花玉漏殘沉醉歸來渾不記阿誰扶我上雕鞍其八買盆池蓮小罋栽成一把蓮問渠邀價勒三千玉人不問成和否移向西􅐼画舫前其九晚醉登樓鳳簫吹斷古梁州獨倚東風十二樓醉把朱簾和露巻恍疑新月是銀鈎其十帶花不整烏雲不画眉天然標格自相宜梅花羞對傍人挿背倚屏山捻一枝夜有所聞思者書二十八字于􅐼以愧之折建邸夜不安枕隣璧復有激人之離好風吹月上囘廊花壓䦨干子漏長天籟不鳴天外竹披衣潛起聽鴛鴦秋朝有感􅀄欲檄癸終沮于平原之令折翠㣲在建屡准􅍮淮諸司奏辟西府十年版築嘆勤渠自笑青霄去路迂昨夜髙宗聞有梦不知曽到傅岩無聞有薦翠㣲者成二絶二袁吕布謾豺狼孟德仲謀那易量頋我未逢三頋主空教徐庶下南陽韜鈐鼎鼐本同倫後世人材自淺深相國若能擒項籍漢壇應不薦淮隂流螢二首起占躔度渾儀按堵久之乃知腐草之光折池亭夜坐有星孛入燕翼之郊見于氷鑑誰將殘火曳流螢月黑星昏分外明老眼年來困躔度恍疑流彗入王城前年天狗落京西千里生灵血染衣子夜不知螢電過復憂天外一星飛早春十絶其一􅏺貴公子自嘆身如不繫舟幾年漂泊在南州柳絲只解弄春色不把紫光絆客愁其二層樓故山烟靄接層樓樓上離人泪欲流誰謂樓髙添望眼一層楼上一層愁其三麥坡雪滿遥山玉作堆幾多花柳望春回出門独有平坡麥一􅂀生青熨不開其四楮衾夜來不敵楮衾多全勝吳綾与越羅好是玉人春睡起白雲堆􅂻見姮娥其五酒家青帘久不訪文姬樽酒慇懃欵翠㣲沉醉不須籠畫燭自挑明月送郎帰其六梅山十年不謁五通仙自嘆何時揖聖顔此去行祠應不逺白雲深處是梅山其七水西詩道風光在水西水西我意未為竒若教南北東溪去更費詩人無限詩其八梅尋春不遇欲空歸竹外横斜恰一枝且喜東君有消息隔香應不怕疎籬其九寄書一書欲冩寄雲鬟更把春衫裹素蛮欲識相思誰最切泪痕今作鷓鴣斑其十自述蒼生千里望雲霓何事英雄去路迷見説九重新有夢濟川人在北岩西寄仵判院八首其一閑亭無日不相隨稍不相隨恨别離况是一秋無信息可無人寄問安詩其二自慚兒女縂江湖鴻鴈不來音訊疎且喜北堂珠玉眷團圞環誦道家書其三為期今己倍蓰何尚杳然折春諭空洞之音許以五百巻天音空洞豈虚傳許我琅函誦半千何事加持功已倍日邊消息尚茫然其四短牋封罷更重題生怕蒼頭去路迷説與不須多借問葛庐祇在白雲西其五紅猊消盡水生花清夜迢迢玉漏賖環珮不知何䖏去醉眠應是小卿家其六毫端風雨走蛟螭人物風流冠一時要向行雲問蹤跡青樓何䖏没新詞其七此去于門咫尺間樽罍無計得躋攀断魂欲伴行雲去犹恐歌喉誤小蛮其八錦牋牙軸白雲詞君外知音更有誰一榻何時對風雨与君聨臂話相思得金正將書海為盗配􅀠池州牢城復結連折金暉本名金軍三四四明人沿欲盡棄市翠㣲止之改竄建安翠㣲有南折徐三沈二等叛囚池守陳模池帥毛智通沿淮立功見任定海正將暉識洋島善波折征之役金應募上边作書薦之边帥續因海鄉導折濤可充沿八行黥墨笑金暉今亦提兵上海涯一介問安雖老畧感恩猶勝李申之莫出韓平原囚之囹圄自舍人張公提嶽閩折翠㣲謫居建安郡太守以下皆迎合乎权勢命不允至是有司尚有防閑之意折嶠特令自便丁卯边帥屢辟入幕西府以無事何須出短籬一關風月足朱扉幾回趿起芒鞋去帶得閑愁無限歸自喻呈趙明夫者遇時則無声折反舌禽之譊譊梁間燕子為喃喃故下珠簾未放還料得無声如反舌不應留落在人間惜秋二首秋之去次李忠朝韻成惜秋折予聞宋玉悲秋之來予独惜祝融嘘火扇驕陽北陸迎寒釀雪霜安得金風專嵗令四時心地有清凉詩到林頭落葉時眼前秋事已無幾何當領取秋容去收拾詩囊帶淂歸上運管張平國陽西樓酒官折平國初任池妙年司釀水邊州浪迹曾陪汗漫游紅粉夜嫌銀烛短醉和明月下西楼其二銅官宰折次任池陽大江南畔五松西潘岳風流梦有詩歸路經從定留挽莫教父老見旌旗其三潭皆池陽山水名折九子芙蓉上下雪雨洗芙蓉沃眼青雪潭澄月照人明銅民指㸃向民説未比當年令尹清其四居九華㕠峯其號折程廷老乃平國姪壻㕠峯十月客辝家廷老相期下九華檢旱不逢陶靖節喚船同過鯉魚沙其五紫樞黄閣搃青氊西掖東華墨尚鮮何事業獨公蓮幕恁淹延其六筆法安國折平國尤善閑將玉斧製羅紈醉引龍蛇竟筆端流落軸緑􅐼俱作画圖看其七漕管除龍舒守明年折野夫平國姪安國子路武城三載促公歸自合班行列禁闈計幕暫參知有在野夫曽此便横飛其八朱顔緑鬢富春秋家世才華二搃優不用寉裘兼映雪天然標格自風流其九雲衢從此喜通亨鳳閣鸞臺信脚行願把恩風散寰宇盛栽桃李作門生其十英雄三載謫東南二月東風始放還馬瘦尚嫌歸路窄願求屋上一青山再還建上舊居歸是秋復准部符再还建上折翠㣲嘉定乙巳仲春被命東翠㣲南征録卷之十一
