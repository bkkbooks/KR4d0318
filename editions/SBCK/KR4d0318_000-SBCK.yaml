body:
  text: 宋史本傳華岳字子西為武學生􅁿財好俠韓􅇑冑當國岳上書云云書奏􅇑冑大怒下大理貶建寕圜土中郡守傳伯成憐之命獄卒使岀入母繫伯成去又迕守李大異復寘獄􅇑冑誅放還復入學登第為殿前司官屬欝不得志謀去丞相史弥逺事覺下臨安獄獄具坐議大臣當死寕宗知岳名欲生之彌逺曰是欲殺臣者竟杖死東市
