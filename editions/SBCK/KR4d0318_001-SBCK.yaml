front:
  text: 翠㣲􅀯征録卷之一
  hash: sha256:7124661f41f2ece1f513dc071fececc0809ad1c79fbff367884a1f062ac5b251
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_SBCK_001-1a}
body:
  text: 書開禧元年四月二十七日上皇帝書四月􅁻日􅀦學發觧進士臣華岳謹熏沐百拜裁書獻于皇帝陛下臣聞職諌諍而不言有罪非諌諍而輙言有誅臣以一介草茅誤叨教飬非敢僣以求狂􅄭之誅誠以天下之大變􅀅形國家之大祸􅀅至有職守者不敢言無職守者不敢僣臣于此時不能剖露肺肝控告君父則不忠之罪不惟不逃而臣之身首􅀅異其䖏雖有粟烏得而食諸臣自旬月以来都城士民徬徨相頋若􅀅䘮其室家諸軍老小隐哭含悲若􅀅驅之水火闤闠藉藉欲語復噤駭于傳聞莫曉所謂臣徐考其所自則侍衛之兵日夜潜發樞機之逓星火交馳戎作之役倍于平時郵傳之程兼于疇昔乃知陛下􅀅有事于北征而為軍若民皆如是之皇皇也臣嘗聞之夷狄之于中國猶盗賊之于四民螟蟊之于五穀可謂不容並立矣士生斯時正冠履之分雪祖宗之仇掃山陵帰宗社所當講也然臣考之天時按之人事盖有大不然何者古之為夷狄者一今之為夷狄者五古之為中國者一今之為中國者三夷狄中國之皆多于古也夫􅇑胄以后族之親位居極品専執􅁠柄公取賄賂蓄飬無籍吏僕委以腹心賣名噐􅀻爵賞睥睨神噐窺覘宗社日益炎炎不敢嚮迩此夷狄之居吾腹心者也以庸瑣之資請姻師旦驟入政府以䛕佞之資阿附侂胄致身􅂋貴陳自強老不知恥貪不知止􅀻植黨羽隂結門第凡見諸行事惟知趁承侂胄一人而君父之不知有以保正耆長之材而鈞衡天下􅂦鼐四海此夷狄之居吾股肱者也爽奕汝翼諸李之貪懦無謀倪僎倬杲諸郭之膏粱無用諸吴之恃􅃂僣專彭之庸孱不肖皇甫斌魏友諒毛致通秦丗輔之彫瘵軍心瘡痍士氣以至陳孝􅂟夏興祖商榮田俊邁之徒皆以一卒之材各淂把麾専制平日剜膏刻血苞苴侂胄以致通􅂋飢寒之士咸願食其肉而不可淂萬一陛下付以大事彼之首領自不可保奚暇為陛下計哉此夷狄之居吾爪牙者也之納妾求知之售妹入府之獻妻求閣之貢子為􅀰之阿䛕僕􅀠之甘心鷹犬之庸駑充位之奴事姦􅁖之生事迎合之􅀻立異議此夷狄之居吾耳目者也蘇師旦以􅁾吏冒節鉞牙儈名爵周筠以􅀠卒冒戎鈐市易􅀅相此夷狄之扼吾咽喉者也吾之腹心吾之股肱吾之爪牙吾之耳目吾之􅍋喉而無非夷狄則彼之所謂夷狄者實未足憂而此之夷狄盖已周吾一身之間矣詎可捨吾身之夷狄而徒事于邊鄙之夷狄耶禮樂征伐自天子出所貴乎中􅀦者皆聴命于陛下也今也予奪之命黜陟之權又不出于陛下而出于侂胄是吾有二中􅀦也命又不出扵侂胄而出于蘓師旦周筠是吾有三中􅀦也夫虜人以一夷狄而猶能據吾之中原曽謂其有五夷狄而不能蹙吾之元氣乎虜人以區區関河之地犹能逼我淮漢曽謂夷狄之居吾腹心居吾股肱居吾爪牙居吾耳目居吾咽喉而不憑􅁜吾之宗庙社稷乎以一中國而撫四夷猶曰不可曽謂一家之中自為吴越一舟之中自為敵􅀦而能外制夷狄乎比年以来軍皆掊克而士卒自仇其􅀅佐民皆侵漁而百姓自叛其守令家自為争人自為􅀾此又啟吾􅀦中億萬之夷狄也今陛下不務去吾腹心股肱爪牙耳目咽喉与夫億萬之夷狄而欲空􅀦之師竭􅀦之財而与逺夷外戎相從于血刅相􅂗之地頋不外用其心欤臣自丱角以来推衍三式之書自去嵗上元甲子五福太乙􅀄度吴分四神直符對照荆椘始擊蜚符旁臨甌越青門直使交次于幽薊黑殺黄道正按于燕趙考之成法主筭最長客􅄸最短兵以先發為客後應為主自太嵗乙丑至丙寅丁夘戊辰已已庚午六年之間皆不利于先舉儻其叛盟犯義撓我疆埸至于事不獲已然後應之則反主為客猶曰庻幾萬一􅀦家自首其事自倡其謀則􅀅帥内暌士卒外叛􅂗炭萬民血刅千里其為應驗速若影響此天数之不利于先舉也億萬之夷狄乎吾之􅀦五者之夷狄周乎吾之身􅀅帥庸愚軍民怨懟馬政不講􅀐士不熟豪傑不出英雄不收餽粮不豊形便不因山寨不修堡壘不設吾雖帶甲百萬運粮千里而師出無功不􅀾自敗矣此人事之不利于先舉也湯武革命應天順人黄帝征伐天時人事臣願陛下誅吾腹心股肱爪牙耳目咽喉之夷狄盡其群黨而勿疑其濫異其身首而勿疑其􅆭吾􅀦中之夷狄既已誅矣然後公道開明正人登用法令自行紀綱自正豪傑自帰英雄自附侵疆自還中原自復天下自底于和平四海自躋于仁夀何俟乎兵革㦲不然則乱臣賊子毁冕裂冠哦九錫隆㤙之詩恃貴不可言之相􅀻妾内姬隂臣􅀅相魚肉􅀅士􅂗炭生􅂕墜百世之逺圖虧十庙之遺業陛下于此雖欲不与之偕亾則禍迫于身􅁠出于人俛首待終何臍可噬事之未然难以取信臣願以身属之廷尉待其行軍用師勞還奏凱則馘臣之首風逓四方以為天下欺君㒺上之戒儻􅂉干戈相尋敗亡相􅁇夷狄外攻姦臣内叛与臣所言盡相符契然後令臣帰老田里永為不齒之民實出天地父母生成之賜干冐天威罪當萬死不備岳百拜翠㣲南征録卷之一
