front:
  text: 翠㣲南征録􅃃之二古凨
  hash: sha256:d06ee2441b359b9ae24739e05e83d1e48227b2ebafff731d65c9d6a26622803a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_SBCK_002-1a}
body:
  text: 歸釣吟我生本是􅁝綸客嘗抱􅁝綸釣王國膠庠雖識姚有虞載車未遇周西伯抱琴歸去古江邉江頭凨月犹依然江凨刮㟁㟁如削江月照人人未眠沙平浪靜江天闊換酒捉魚魚撥剌有時醉椀和月吞有時醉棹和􅃄撥􅂉唱􅁔􅂉吹笛欵乃宫商人不識􅁔声喚徹􅃄水寒笛声清透雲霄碧不張帆任渠去去到雲山深䖏住雲山深䖏有􅀞圖添箇雲山画圖侣不撥棹任渠流流入玻瓈影􅂻頭玻瓈影􅂻迸珠玉千斛萬斛誰能收􅌒時眠醉時舞漁家自有神仙府睡時蝴蝶梦荘周舞䖏鷗鳶奏韶武自舉歸釣吟清江漠漠􅃄沉沉雲藏萬􅊤暗水尾風吹孤月摇天心翠微父翆㣲父和我行􅁔進南浦画橋流水抹晴􅃄殘照暮霞收宿雨水連天天似水一簑活計誰能比楓葉飄霜鱸鱠香楊花飛雪河魨美也不斈姜太公百年将至方非熊㑹湏年少遇真主恢我諸夏車書同也不學嚴子􅁜雲䑓不為魁殊勛中興只作釣臺侣胸中百萬知無兵我網不似漢漢網何太踈也曽漏却吞舟魚何當周宻如樞机直欲􅊏悉皆無遺我鈎不似吕吕鈎何太直除却文王有誰識争如猛曲一弯腰牽取星珠并月璧魚膠寒齒蒿剔蟹螯刺指和籠烹屠龍飪􅂦口不羙断鯨斫炙腸􅂓撑記梦來長空明月殊動故郷之思目成記梦折秋夜宿客邸劇梦為無槐大庭之㳺斍溪冷冷零折音皷􅕣􅕣虗堂淅瀝生寒風寒風綽我梦魂去飛颺直上蓬萊宫蓬莱宫殿女如玉霓裳羽扇環簾櫳月娥留我宴珠翠玳筵間列花叢叢酒酣萬象羅心胸舉盃話别殊怱怱青鵉命駕下空濶一聲璫珮鳴丁東􅀍衣起坐周四頋庭户悄悄無人蹤銀河萬里倒澄碧氷鑑半輪斜􅀝􅆰横江􅀌寉一声唳喚起郷心千萬重梅次壁間韵折椘東道中衰蘭枯荷了秋色幾向寒梢問消息溪橋交馬断腸時翠袖隹人日暮㱕玉靣亭亭漢宫様一見凨流慰心賞寒標孤絶太無情誰為移春上玉京月華凄切霜華白夜半飄香度簾額寄声横笛且休吹愁殺江南未歸客山水吟閩之山峨峨可以接穹蒼閩士孕其秀胸次尤難量閩之水滔滔可以烛妍醜閩士生其間其羙不容口君不見周家社稷生甫申崧岳當年曽降神又不見千里秀氣鍾三蘓眉山草木皆焦枯我生恨不由河洛虗負三光并五岳地􅂕人傑推江東人物凨流兼磊落頋此閩之東自古多英雄求其為絶称獨一忠穆公公今已即丗後丗誰可擬惟有詹仲通一人而已耳仲通何如人景星與鳳凰不險亦不深山高兮水長浴出浴覆衣淂詩筆以記折十月暇日醉于生春閣暄􅋵龍藩地暖冬無雪十月凨光似三月好凨不動綺羅塵人在繡幃簾半揭酒腸拍索能囬春春潮入面香熏熏香肌汗透披縠紋思淂滄海駈埃氛銀鍋蟹眼生春雪銀瓢棺破鍋心月流霞傾入碧琅玕香霧氤氲雲半掇花藤織出金芙蕖􅃄青霧紫堆雲衣一聲璫珮􅄕鈎垂皂􅐻捧出双明珠蠟花照入蘭湯閣珠玑体迸紅猊活鳳豁雲涛濯錦毛龍翻雪浪澆銀甲起拏裙霧圍春凨臙巾抹出桃花紅香泉入齒潄寒玉吐作氷雪飛長空蒼頭急把春衫換腕玉輕穿雲一片出門两腋生清凨月在嫦娥廣寒殿嘲􅀬南方有神名祝融髮赭面丹唇朱紅執鞭入海駈赤龍火車勒駕燒長􅆰千驂萬乗如聫轡烈㷔騰騰灼天地九霄烜赫皆甑蒸四海煎熬俱􅂦沸流金爍石氣不通天下俱在紅鑪中葛衫襟濕疑有雨羅紈柄折渾無凨祝融祝融母太酷天道炎凉尝反覆看看少皥催戍􅀲盡把凉颷散煩溽釣鰲行舎人名嗣古折上提刑左史張北風浩蕩滄溟闊十萬軍声夜潮聒翻􅆰濁浪皷雷霆舟子停蘭面如血龍門有客何猙獰弩目張膽殊不驚桅檣破浪裂津島直欲一舉􅆰蛟鯨我之釣兮非丗比新月為鈎素霞綺先抝虹蜺為釣竿却把鵾鵬作香餌欲垂未垂号鬼神星斗無光天地昏海灵乞命免生死一鈎連六酧啣㤙我公萬里凨􅃄伯度量汪汪寰海窄蟠胷高聳蓬萊山壮氣直吞雲梦澤㤙波萬壑奔洪流凨帆浪楫交觥籌金鱗照日巨如斗四海触物無虚舟我生本是釣鰲客几嵗灘頭望風色忽聞霹靂破崑崙便整絲綸駕航舶我今十轄迎公開㑹湏舉手生風雷不然長嘯謝水府明月滿船帰去耒上趙漕僉京弟子赴南宫文未上也先折名善宣喬松弟子見先生也先生尹由先生之境而不拜先生弟子罪也見先生折生每而進之㪯而送之予既德先生矣今道潔雨露清秀松徳也亦先生徳也萬木遜節折而無一言以寓其願見之誠亦罪也風霜髙氷霜亦犹先生之不畏彼強禦也松之詩所折三友同升松事也亦先生事也松之不畏于弟子耶其罪弟子耶折由作也不識先生其哂太山之巔有喬松凛凛千丈摩蒼􅆰風雲有㑹直相際轟雷掣電蟠蛟龍􅐻根錯節真天種卿月􅀰星伴辰拱髙凨蕭瑟涕清泉桃李無言漫丘壟南宫仙桂饒天香南國蔽芾􅁔甘棠大枝擎天作砥柱小枝駕海成虹梁六月無風天欲雨赤龍啣火燒􅆰宇亭亭横盖指扶桑萬􅊤千崖冷無暑大椿可􅀏欺荘周便指千嵗為春秋使民若􅀾夏后社以松折夏后氏用汝當作商川舟松舟折檜楫自慚藤蔓纒林壑未遂鷦鷯一枝樂􅐻桓已喜跨髙寒而􅐻􅁊折撫孤松更借扶摇薦鵰鶚我聞䖏士方綢繆䖏士折七松三友簡在公寕留蒼姬已託大夫䕃封折秦夫折為大赤子願陪丞相逰松子逰折子房從赤鄰女㮻綿吟一二􅈁僕向尝見撚綿紬者于此折建安西関鄰女善㮻木綿日可成因問女嵗可成几端女云每嵗可淂二十疋折頗􅁼然就手中提出便紡成􅁝与撚綿特異其半囙成鄰女搔綿折近以繡工妨迫不及閑􅆤日上三竿竹􅐼下嬌娥整輪輻匆匆未暇理雲鬟半朶青鵶􅀝紅玉青梢摘盡銀香囊画欄平􅀝斑筠筐時􅀅纎手翻雪霜蘇胸玉面同光􅉭捧帰細􅐈銀成索牽出鬆鬆雲一握珠唇呵挺􅂔温温鸚觜踏車声絡絡今年莫怪功績稀阿妳勤繡鴛鴦幃如今織出秋江練十月正好裁新衣客心聞此愁無着一夜清寒動寥寞明朝為問買一端剪做道􅂁披落魄送商府判入為審計折自劍津倅比年十月君􅀄耒梅花破雪迎君開自從佐剣壽民脉凋山瘵水皆春䑓去年七月君開府燕燕鶯鶯為君舞五日盡蟄潭底龍千里應無市中虎今年二月君􅀅帰凨牽囬栁萦君衣君衣不作囬栁轉直上雲端朝紫㣲紫㣲有舘名西掖珠玉羅鈿瞰金碧􅀰星卿月謾徘徊箇中自是神仙宅紫㣲有山名大坡烏飛豸立冠峨峨一声霹􅋬震天地萬里腥血流江河紫㣲有㫖垂丹冊二者于斯請君擇便湏東取元化鈞談􅀏從容正疆埸君家事業銘冠裳鵉鳯指日鳴朝陽伊洛諸公有政事洙泗諸子無文章禀違展轉情難䖏溪上㤙波湛今古東風吹恨入長亭零落桃花泪如雨平政橋為天下第一折水西有橋建水合流三百里直下冨沙如撚指溪東披拽䌫􅂈西千丈春風怒濤􅁸香輪不觧碾清江造舟貫索成河梁年年麥熟梅欲黄連城十里皆波光淳熈太守􅁨溱洧問津日夜思無計老農义手􅂅鳩工疊石中流便民濟金珠賣價不計緍鐫瑕断梓功方成功成燕雀賀新屋炳然萬棟輝丹青挿天螮蝀横江尾下􅐦寒潭碧無底市声不到画梁間秋色盡帰朱箔􅂻我行一月無風波今朝酔眼翻青羅金鰲背路客揮􅌱玉虹跨浪舟飛梭石唇噴盡寒崖雪雪中電掣金蛇赤両岸楼頭􅀅相家八州車馬神仙客人言辟人推政平故此特以平政名我聞政事平如水水到不平還作声贈陳道人画出錦軸求詩折道人陳守一喜君不見樵人王翰画山水一夜風雷揭􅐼􅁓又不見長沙洞清画尨蛇滿軸􅃄雲翻橪指二子相去数百年筆端妙意誰能傳双溪道人何所授一見筆法堪齊肩筆一淡輕􅃄映出垂楊岸逺山依約有還無斜照不紅秋水漫筆一濃黑雲萬叠翻狂凨江天日暮暗􅃄靄天地星斗皆昏朦瀟湘詩人不觧語􅀍君吐作無声句何時覔取綃一縑冩我英姿伴􅃄雨柴氏節婦一樽酒義士拜而受義士一首詩節婦㕠眉皺眉皺意何如有難難相救嘆我廊庙器淹囬在汚陋惠我􅈲且嘉慇懃推意厚吾今繫閩建家貧喜鄰冨青眼到朱扉白屋成華胄吾聞孤竹子周室三緘口又聞杞梁妻秦􅀖称烈婦此軰誠間生世代不常有如何天一方同時俱輻凑愧無八品珍草草具􅇼豆何當再拜摳我衣巵酒恭為児女壽傷春衣􅃑怯春寒春在江南岸我意正傷春復􅀍春萦絆一雨臙脂􅊜萬壑氷澌泮撩我惜春心与春傷爛熳栁垂不染􅁝織成愁一片杏吐無􅃄火燒碎腸千断憶昔腰如栁栁腰􅁿易按憶昔面如花花面嬌難喚人不似春芳随䖏得㸔翫囙春憶人人不見徒扼腕何時酔臥花栁中一􅀏千金不容換百舌為烏秀折福建号流鶯一去無消息燕怯春寒帰未得緑􅐼清晴静無人似把衷情訴知識上苑東凨二月春淡黄楊栁􅀄成隂觧􅀅一片無情舌學盡百般能語禽紅英紫蕚紛如雪萬姹千嬌縂饒舌莫嫌花外太啁啾黙黙難酧好時節湏㬰緑暗紅亦稀伯劳杜宇鷹鸇飛更兼獵弋恣羅網􅃃舌不語全毛衣堪嗟囯士徒切直不似幽禽明語黙何如鉗口帰山林莫問燕南并越北飲仙閣小峯王泰之作堂曰傾盖作閣曰飲仙廊庑瀟然有物外之有所得者以樂其身其㤗之之謂乎因作詩以􅇔歳月槽頭􅐦盡春山緑槽下真珠㵼醽醁騷人一􅀏傾盃􅐻滿面春風漲紅玉少陵淂此不欲言乃指八子為中仙主人傾盖慕此意一閣新構堂西偏于今丗態薄于帋何必劳心問青紫願君酔我金屈巵萬事􅂈耳同風飛醺醺和月上裁竹長嘯一声帰翠㣲贈祝跛武夷人折相者祝跛我生多蹇難事業冷于水内外両五行醜􅁖諱人㪯武􅆥有跛者抱術徧荆椘摳衣忽趋隅覿面便相許摇手無所需再拜拂毫楮一詩􅂓贈行無以壮箱筥他時了功名為結􅃄霞侣冨沙道中述懐玘韵折次王伯敗皷非全材毁瓦不自牧造物兒未戯達人火先撲卜不到渭濵人徒嗟海曲彼哉真彼哉伐尽牛山木驟雨壁間韵折次紫溪牛尾烏雲潑濃墨牛頭風雨翩車軸怒涛頃刻卷沙灘十萬軍声吼鳴瀑牧童家住溪西曲侵早騎牛牧溪北荒􅋉冒雨急渡溪雨势驟晴山又緑翠㣲南征録􅃃之二
