body:
  text: 翠㣲南征録巻四宋華岳撰五言排律次李信州七十韻挺挺萬人傑堂堂間世賢胸中兵十萬足下客三千揚賦希三嘆坡詩和百篇錦囊華似衮綵筆大如椽隨陸縱横舌良平左右肩兩驂公子服四牡魯侯畋量濶滄溟岸胸蟠泰華巔紅壇歌魯杏白社結陶蓮遣幣通秦好求姻托鄭㜕匣藏須虎兕冠飾待貂蟬幖自龍頭奪書由鴈足傳不侯􅅓李廣求使短張騫食客希毛遂茶僧集大顛詩材親子建字法邁公權黄貉䝉金絡青驄勒寶韉伐燕欺騎刼聘魯慢韓穿周室歌山甫齊人美仲連劒從豐水鑄碑向峴山鐫有頌褒唐太無詩刺衞宣檄堪傳代郡節可仗居延聽訟疎淹禁豐財剔冗員䇿從之反後鞭著祖生先孝有參而已忠如丘者焉春氷同皎潔秋月共嬋娟冡宰當鈞軸將軍事櫜鞬千官視標凖萬國倚陶甄多士圜冠帶諸侯執豆籩山期封泰岱石擬勒燕然禹甸欣環轍堯氓願受㕓明堂歌赤紱清廟頌朱絃臺閣皆三益盤盂記十愆片言能息訟隻手可旋乾公昔嘗推轂吾今尚食饘聞鷄效劉舞抱虎笑秦眠蘇子舌猶在邊韶腹尚便牛衣懷白璧虎節誓青氊飲馬量淝水屯兵料漢田鬢星飛汴洛血雨灑伊瀍伊五成湯就軻三孟母遷雲鋤翻楚嶠月纜繫秦川罋有扶頭酒厨無縮項鯿詞源慚子美詩社感庭堅水陸三千里炎凉二十年周田纔廢井秦陌已開阡夜月琴三弄春風詩一聨自稱山宰相人號地神仙扣馬罹三尺平戎授一編䑕投當忌器魚得偶忘筌避地思無所滔天罪莫湔梁鴻方北謫賈鵩已東旋孫刖難謀魏樊誅莫救燕江天驅鳥雀淮地迅鷹鸇日守娵訾分星流太白躔瘡痍連四境煨燼極三邊淮浪夜翻雪沙塵晝起煙二陵歸培塿百闕自撫劉生几誰思祖逖鞭戍方興頡利役莫闕宫昔嘗游泮陫今謾嘆圜豈知醫國手變作闕楚客弓雖失秦人璧幸全宦途良可畏吏鞅不闕世變言難盡民頑令不悛一千新楮劵三百舊銅錢駟馬涎流地羣烏翼蔽天人心徒擾擾王道自平平衞女歌淇澳曹人思下泉窮途惟自愧當路闕作俑宜元後追俘恐不前詩成何太喜舞袖欲褊􅝆丹青閣次朱載之韻未識丹青意凭欄試解嘲煙雲朝起陸汀渚暮生潮山卓數枝筆天横一幅綃霞收紅暈淺溪褪緑痕消箇裏風煙冷于中景物饒飛黄凌翠閣寒碧瞰紅橋酒盡香凝甕詩成錦掣幖朱衣扶客醉翠袖殢人嬌屛帳接千里畫圖連九霄長風來水尾斜日轉山腰赤脚支笻穩蒼頭控馬驕老臣今已矣兒女總金貂上韓平原君家勲業在盤盂莫把頭顱問钃鏤漢地不埋王莽骨唐天難庇禄山軀不隨召奭始求老便學孔明終托孤十廟英靈儼如在謾于宗社作穿窬清富樓小湖楞伽老作樓名清富求詩楞伽心地有瞿曇清富名樓足可觀買斷江山詩料足揭開風月畫圖寛都無一㸃紅塵到便作千雙白璧看我欲鞭驢快幽賞白鷗盟在不憂寒去年清富屢求詩今日凭闌約翠㣲山帶野花堪入畫水環汀草欲成圍一園黄菊有餘食兩頃白雲無限衣説與塵寰守錢虜不勞魂夢到禪扉出郭十客出郭中有自稱為隨佛下生者就嘲之十客聨鑣出北門馬蹄剜盡碧苔㾗從教管史占星聚且聽盃人和月吞我欲求仙問離坎君當隨佛整乾坤樽前慷慨休辭醉明日有懷誰共論舎後丈地令人植花種竹悶則邀清風明月盡醉而倒有地都來一丈餘墾鋤元不費工夫匝牆先種竹三本遶檻却栽花數株風伯喚來煩解珮月娥邀得醉擕壺慿君試向蓬萊問還有神仙似我無送周魁時周在閣門出疆是嵗元日立春昨夜霜風鼓萬兵今朝華節照邊庭人間元日是春日天上魁星為使星且向虎囊探寸尺却歸麟閣倣丹青離觴不是延清夜明日異邦長短亭二月二日即事次王德元韻春潮昨夜没平灘一雨催花色半含鴈喚元霄歸塞北燕銜新社到江南無歡不必遊花籍有病何須置藥籃只把公忠答天地從教兒女閙冠簪登樓晚望次曲溪韻曲溪方以棘丞求補外六曲朱闌瞰碧虚淡煙秋水接平蕪展開風月添詩料裝㸃江山歸畫圖舉足便堪馳駟馬折腰何必問雙鳬當年庾亮今還在定約樓前醉一壺訓㸑婢十載膠庠莫怪窮旅囊安得有從容無錢休欠牛羊債有酒只將魚蟹供班頷昔嘗肥似燕沈腰今已瘦如蜂從今莫恣肥甘口只擷清蔬祭豢龍别藍詳道詳道率昆玉送至横江以詩言别君在江東我水西君今北去我南歸竹孫和客凌風瘦梅子偏他得雨肥鶯囀好聲歸酒斚花分紅影上人衣相看莫作皺眉别期子秋髙賦式㣲傷春次賈武仲韻初入京華菊薦香途中今已過春芳十年恰走萬餘里兩鬢幾乎一半霜却酒不禁春黯淡落花愁對月昏黄不堪夜半歸心切更被杜鵑啼斷腸别子陳子寜州人向嘗識之宣城郡齋丙寅三月三十日天子檄我南國行蒲劒欲飛春漲急柳綿才脱曉寒輕事非得已初何好物到不平終作聲自古英雄總多難賈梁何必怨清明河魨有感次秦仲山韻形容初不類魚鰕偏稱蘆蒿與荻芽觸物可憐空怒腹囓人無計謾聱牙子排金粟真堪畏乳溜玉酥何足誇從此烹鮮督庖吏只將鮎鱯假名它自嘆次黄魁韻自嘆身謀我獨疎只貪風月恣歡娛盃盤遇客隨多寡囊槖何時問有無萬里梯航無骨罣十年牆屋有穿窬從今老去無他望緑綺一張醪一壺春日書懷次李次熊韻紫褪紅銷到海棠幾多遊俠為渠忙秋聲落盞鶯調曲春色惱人花鬬香羝乳雖能屈蘇武牛衣終不卧王章男兒多少英雄氣只對東風醉幾場過文脊山宣界有山曰文脊又曰百峯山之隂市曰版橋次壁間題韻百峯攢碧版橋西眼力増明步武遲紅映竹籬花笑客翠翻雲幕雨催詩蕡還及第吾何媿廣不封侯子未思凡物不齊皆有謂到頭忠義是男兒熱三衢道中訪周伯恭示詩次韻翠㣲家在大江東五月鞭驢入建中雲烈火車天欲雨汗淹香葛扇無風不求殿閣千間庇却喜巖泉一線通為汲滿盂清齒頰與君行盡夕陽紅有感次陳平仲韻十年憂患客江城雙鬢蕭蕭已不禁多病不逢醫國手感懐徒有濟時心西風吹夢夜寒悄黄葉滿堦秋意深休笑當年杜陵老白頭今亦不勝簪悶中賡趙丞韻壯士不同兒女曹誰云賦性太麄豪一編韜略進擒虎十轄絲綸學釣鼇劒口不磨韓信血鼎心須刮食其膏英雄多少不平氣一夜朔風爭怒號秋宵有感滿目秋容拂畫圖敗荷衰柳接平蕪西風刮地鴈聲落寒月滿天人影孤木耳有才持紫槖楮皮無計換青蚨不知此去功名事還許封彞見也無過羊腸嶺和壁間韻羊腸在於潛分水之間拂面東風吹夕陽路蟠千折過羊腸山疑隨馬囘囘見花欲撩人故故香世路與誰分曲直人情于我自炎凉何當更上風煙上為把窮途問彼蒼宿横溪橋横溪在淳安界夜宿横溪煙靄間眉頭歸路萬山攢連天麥浪波千頃撲地楊花雪一團餘鏹不供春後醖夾衾猶怯夜來寒征夫莫怪車音澁自是愁多行路難送倪尚書赴召守節如初未足觀毫釐終始實其艱鄭公勇却樞衡貴衞叔羞居荷槖班冷暖萬端炊飯頃是非一著奕棊間江湖無限孤髙客拭目看公此召還宿嚴瀨時迓王卿未至遐想髙風殊未厓艤舟夜訪子陵臺銜山西照情何限逝水東流夢不囘雙槳未聞卿月過一尊先為客星開東都人物俱煨燼獨有先生迹未灰題澤民廟時被命追囘生握藩旌死象梨澤民山下澤民谿蒼天九重開日月赤地千里興雲霓寐假商宗曽得説爵髙韓信屢封齊英雄不入蒼生眼願借髙風吹馬蹄早春即事次菊坡韻楊柳絲絲弄淡黄怯寒燕子未歸梁曉迷芳草騅騣濕夜宿閒花蝶翅香得句自慚非子美賞音猶恐誤中郎願言相約花前醉莫放春容過海棠早行述懷和壁間韻歸心夜半已飛揚喚僕吹燈促曉粧雞翅拍斜茅店月馬蹄剜破板橋霜二陵萬里埋荆棘十廟百年生稻梁安得有臣如祖逖慨然擊楫誓江長題易村次何貢元韻何兄以辛酉同請迂道半里訪之示詩賡韻路轉峯囘覺有村數間茅屋瞰山隂午炊已飽翻匙玉臘醖仍􅂸掛杖金窮去作文和鬼送興來得句倩蟬吟一聲横笛斜陽外吹起江湖萬里心述事次王夢與韻夢與好談物理之學因箴之心不融明遂啟疑源流本末致交馳谷何嘗響人相喚岸幾曾行舟自移枉直萬端明似鏡是非一著錯如棊磨心拔去誰能轉試問諸公知不知述懷次何德父韻我生不解覔冠裳滿目風波秪自傷楮劵不堪供嵗幣沙籌那解足軍糧人情在我隨多寡世態從他自短長只告天公乞安樂百年隨分老農桑寄劉浩然次浩然韻且勉以書中所喻之意樽酒檠窻鬢髮新别來驚見雪霜侵幾行淚滴風前燭一片心敲月下砧好德未聞如好色知人安得似知音一書欲寄南來鴈江濶天髙無處尋知遇閲韓信傳因傷今思古成知遇淮隂西漢一英雄史氏持衡論亦工不向追亡羡蕭相却于援死著滕公豈知並績三人傑皆自當時一語功後世人材自戕賊炎凉安得古人風和戎時有函首請成之議納幣求成事已非可堪函首獻戎墀一天共戴心非石九地皆塗血尚泥反漢須知為鼂錯成秦恐不在于期和戎自有和戎策却恐諸公未必知翠㣲南征録巻四
