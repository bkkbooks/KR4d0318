body:
  text: 翠㣲南征録巻三宋華岳撰古詩别王泰之次王養正韻黄塵漫漫小峯路白石齒齒茗坑渡相亭南來第一程人煙蕭條嵗云暮故人小隐三家村約我旗亭聊一樽相逢此地復相别明朝懷抱同誰論江上雙舟催發前帆風飽江天濶後帆半出疎林闕後帆招手呼前帆畫皷輕敲總催發前帆雪浪驚飛湍後帆䑨尾披銀山前帆漸緩後帆急相傍俱入蘆花灘島嶼縈回斷還續沙尾夕陽明屬玉望中醉眼昏欲花誤作閒窻小横軸慰吳吉甫縣尉吉甫縣尉有横逆之難兄嫂女皆死焉所可免者渠夫婦而已作詩慰之子鍼如京師一室膏鼎臠兄室雖被戕一妻猶可免伯奢事行役八子俱蹂踐兄家禍雖劇一女特婉孌女死固可傷殊未敵冠冕妻在固全軀喪女憂莫遣大厦旣灰飛豐儲皆席巻鶺鴒起嘆嗟鸞凰徒展轉我昔以難勤荷兄垂勸勉兄今以難告倍覺淚淟涊泛觀天之理禍福嘗相反有難旣不死他時非淺淺去兄一牛鳴為地良非逺不能見兄慰面目實有靦自料吾與兄氣量及者鮮胡為蒼者天與子獨羇蹇贈劉相士班超未侯漢誰識烏孫客韓信已王齊誰知長樂厄彼亦非異術忠䛕分黑白直道世且違彼亦何足責自古勲業人把鏡惟自索顧我灑落資足可振翰翮如何汗馬秋英雄尚南謫祗應捻胎鬼手段不合格古括子劉子閲人幾千百一見麞䑕質便許正疆埸知子忠且䛕愚固未暇擇萬一符子言亦可名簡册它時雙蹇驢約子訪黄石誚胡同巡同巡名瑾向與岳最善忽自潮陽囘見僕坐城旦之地遂不相遇以詩誚之岳昔游時卿兄嘗過敝廬捫心論事業耐久良非虚岳今𨽻城旦氣象誠慘舒髠黥塞糞壤敢辱長者車嘗聞古人交窮達無親疎富貴不相忘有終還有初與兄三載别無日不引裾中間喜一見欣慰云何如相去天一涯雲濤疏鴈魚忽聞風駕囘喜色喧門閭相聞即相别厥意良躊躇嘗聞郢中人結客于樵漁又聞淮南王受德于刑餘岳旣不自檢失身墮籧篨壯士視一死其猶爾欷歔勢分已霄壤孤托難相於願兄此召還巍然奉中除前巖與西閣談笑看連茹或過趙可父為岳聲起居薰風有良便當拜平安書送詹仲通縣尉秋郊送行色執别臨清流風神掣囘桞故故牽衣裘吟螿附草際催客登蘭舟問客何所之駕言京闕遊愚聞京闕間多難三春秋閫外炙魚肉闕内羅羊頭鼎却吠堯犬冠還沐楚猴和戎重輸費廊廟有隱憂賑荒少儲蓄郡國無良謀飛蝗蔽日月兆龜拆田疇君以經濟材抱負衝斗牛家傳醫國秘殊不諸子儔有用即隆平豈特為東周願君攄緒餘咳唾開冕旒管領一世雄克復歸神州賤子忝知遇脱網將從游相隨上凌煙也勝登瀛洲作詩告于君君其許之不上詹仲通縣尉某龜雀䝉恩犬馬誓報譬諸草木少見肺肝冀叨燭電之私但劇布雷之耻松竹不著花宻葉徒如帚江梅不藏葉寒花綴枯朽獨有龍焙茶花葉秀而耦氷霜著羣木凍死十八九惟此百草靈名可綴三友春雷迸雀舌夜雨滴龍口皆萌哺啜心誰假栽培手惟有秦端明識之在蒿蔌移根入北苑金碧煥星斗夸作龍鳳團封成獻元后問花何以報牙舌甘鼎臼他時子復生為公滌繁垢西風巻荷衣披披不成幅清霜拆蕙囊冽冽已成蓿如何獨東籬黄華笑寒菊物之有盛衰循環若推轂世事良亦然亦豈物所欲金鈿鎔落日零露灑寒玉人皆惜芳菲誰復念幽獨惟有陶淵明慇懃費培沃簪花從㡌落撚酒醉商陸從此擅秋芳芙桂非同録問花何以報剪首薦醽醁他時更粉軀為公采明目寄大庾郭縣尉前年建安縣始識韓荆州一見辱知遇許我嘗從游尋幽訪赤壁買笑陪青樓有酒即命駕夜飲忘觥籌雪香飄梅花歸駕仍遲留送君城北隅嵗事希一周告德雖未久有懷奚所投客來自錦溪知為藍田遊摳衣欲趨隅其奈風馬牛方圖拜尺紙文此不敏羞乃復三不緘獲戾于君侯謫客干典刑宜爾飡吳鈎幸不畀我死殘喘延俘囚搜索偏中外釋縛良無由始思鵾鵬翼庇我反手猶嘘燈拂毫楮尺素馳星流荷公三復還惻然添我憂許我京闕間與我為良謀于今秋復冬俟命猶置郵西風掠天宇魚鴈俱沉浮未審恩波中許我共濟不我材襪線短願公廣甄收他日賓幕府鏖戰當焚舟公兮不我援復駕言焉求嚴陵方市次方子嚴韻浮雲掃盡天宇清千花萬花開錦屏好風吹皺一池綠白鳥㸃破千山青客行五里復五里兩眼丹青間紅紫杖屨不知行路難人在江南圖畫裏月巖己巳春道廣信夜宿月巖邸中三客酌酒論詩拍掌擊案自謂得句且對岳自侈云我輩嘲風詠月自有所得勿怪狂妄因思月巖為山甚異午夜月出於巖之中桂影於月之上月有小大桂有廣狹此山之所以異詩之所由以作也然壁間集上留詠篇章無慮千萬求其絶稱盖亦鮮儷偶三客出天蟾字韻索筆和之三客頓首謝罪特疥壁以留嵗月六丁一鑿空雲烟滿窟勒駕驅神僊氷輪推出月中月玉斧劈開天外天便把嫦娥騎綵鳳却呼羽客烹銀蟾更邀王母瑶池酒今夜廣寒同醉眠熱中呈楚南僧時雩禱未應帝炎執鞭驅赤龍火車萬乘燒長空長空萬里俱藴隆流金爍石天地同我來亭亭日當午欲避驕陽竟無所願求一灑楊柳枝化作東閩萬家雨送春約友人李景山仍次其韻留春無計奈春何九十過眼如飛梭三分二分風雨爾十日九日愁悶呵風前飛絮政無數雨後落花全不多爭如買酒速相就君自起舞吾能歌僧畫王叔珍所收十軸乃政和僧人所畫叔珍欲増其價求一轉語于軸角萬景峯前老禪叔搜羅風月歸巖谷胸中有句吐無聲冩作生綃三四幅賀趙法曹趙可久入郡幕後兼漕僉紅日轉簷花飛鳴一聲鵲鵲翅未離簷有客拽鈴索呼童急啟户問客意何若客聞笑而言法曹參計鑰因知鵲之鳴報我良不惡知我門下人一揵聊相托如公材器大末掾豈能縛咫尺蓬萊宫左右芙蓉幕直入鳳凰池更上麒麟閣賤子無所需願作揚州鶴野菜吟芙蓉峯下揚雄宅路入城闉里三百有山無粟養鷄豚有水無人捕魚鼈山翁菜色流清涎齒頰連月無腥羶客來問我何所有手指萬壑煙霞邊青芹不似蘆蒿美石芥防風空剔齒蕨腦纔抽穉子拳蘆牙已迸佳人指兒童不待明朝陽花襟路濕爭慌忙擕籠拍塞貯不盡歸來滿袖春風香攬衣踏破青銅鏡挼動碧雲流一徑漉歸銀鼎作波濤無限春工上盤飣酒歌謝同舍葉南陵名英嘗聞子美清江曲日典春衣耽美禄又聞太白遊長安市上熏熏醉眠熟風流國裏太平時處處紅樓漾酒旗王孫公子恣行樂繁絃脆管相追隨誰知寥落天涯客笠頂清風秋挑月芒鞋踏徧山水雄奮身欲入黄金闕方嗟蕭索向西園刮面寒風雨漲天回頭忽喜黑衣至急破紅泥傾數船雖無皓齒歌金縷也掃新詩狂欲舞兒童拍手笑攔街應怪吳儂喜如許長江波浪巻銀山去去仍悲道路難只慿一醉進未得更借髙風吹片帆寄敬甫葉兄嵗次丁卯秋八月旣生魄于時謫建安脱去未有策忽覩星鳳光慨然陪履舄自謂入閩建閲人幾千百間有知功名所見復邪僻否則茍利禄鄙猥何足責獨我子敬甫挺挺出蠻貊舌端摇戈矛筆下羅疆埸扣以軍國秘歴歴有竒畫以此方定交歸心已翰翮送君東郭門握手不忍釋明年入中都首上平戎策甫結君相知便念長沙謫細草天子書願置孤臣驛論薦方躊躇倚門重垂白轍環温凊圍笑言方啞啞去我兩牛鳴恍若關山隔去年槐花黄郡國書貢籍若以經濟材俯亦從此役白屋寄簪纓青燈聨袵席談笑生風雷議論燦金碧雪香飛梅花歸鞍整南陌别後殊未幾拳拳在朝夕君腹坦東牀吾身繫西國從此嘆參商蓬瀛非咫尺尺紙雖屢投奥援不我索星次幾一周幸我安且釋嘗觀義與利更相為損益欲論古人交二者請君擇不惟眼獨青且要心同赤此身可虀粉此道不可易自料吾與君造物難棄擲胸次蓬萊山襟懷雲夢澤未説詩書帥休論文章伯堂堂大丈夫詎可虚竹帛但恨不振蹤尚此多扞格在君當先登挽囘二千石饑溺切君身推解過疇昔炎凉無異心始終無異迹庶幾吾二人交情可全璧記夢夜夢牛入室角折足跌因記諸紙夜漏徹三更夢牛入我屋有角斷而懸有足折而縮驚覺細思量䜟有何禍福兆者事之先形者心之屬事旣兆于心夢乃形于腹入屋牛有盖為牢事刑獄吾今尚縲囚其應已桎梏體具牢方具無足牢不足不足意無他示予可脱輻去盖只論牛其義尤可録牛足不下垂得一生可續牛角不上横得某去何速一旦忤君心吾罪當何贖生去氣横秋風馬不相逐下裂輿地圖上應周天宿崢嶸挽萬鈞其始播百穀身雖在籠檻志不經溝瀆寗戚不吾歌丙吉當吾哭安得如齊王過堂憐觳觫琴翠微得雷霹材斷曰天籟鐫二十八字于底月浸虚堂夜氣清起聽萬籟寂無聲輕輕拂動匣面塵玉笋不彈風自鳴苦蚊夏夜苦蚊書二十字于壁四壁人聲絶榻下蚊煙滅可憐翠㣲翁一夜敲打拍翠㣲南征録巻三
