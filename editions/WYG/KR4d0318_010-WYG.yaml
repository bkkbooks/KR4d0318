  text: 十
  hash: sha256:fc7edd399a5c4b93723eb0c091bf64e56e24c30195c1519067c68513a4d2c8fb
body:
  text: 宋華岳撰七言絶句白面渡在池陽之西五十里村人皆不曉白面之義因詩其事繫船白面問溪翁名不虛傳説未通秪恐當年溪上女浣沙時節懶勻紅田家十絶十幅生綃一墨池盡收好景入屏幃㑹須少緩丹青筆更倩牧童横笛歸其二農夫日炙面如煤絲婦繅成雪一堆早早安排了官税莫教耆長上門催其三老農鋤水子收禾老婦攀機女擲梭苖絹已成空對喜納官還主外無多其四雞唱三聲天欲明安排飯椀與茶瓶良人猶怒催耕早自扯蓬窻看曉星其五緋袴青衫紫繫腰攬衣隨過水平橋雖然不識風流事也向人前學逞嬌其六村獒奮迅出籬笆欲吠還休喚可拏不是忘機太馴狎那囘曾宿那人家其七畫眉無墨把燈燒豈識宫粧與翠翹堪笑東風也相謔暗牽裙帶纒去聲人腰其八臠魚炊糝作荷包宿飯無湯煖酒澆放椀出門行一匝小溪新漲已平橋其九麥飯𤓰虀及早催田夫雙眼望儂來油鹽不倩傍人帶日午癡兒猶未囘其十拂曉呼兒去採樵祝妻早辦午炊燒日斜枵腹歸家看尚有生枝炙未焦舂夫秕糠粒粒裹真珠玉杵舂來白有餘待問姮娥借金鼎等閒令汝作蟾蜍新市雜詠十首建安人物風流市井華麗紅紗翠葢常無異于花朝燈夕長篇短句形容一時之盛翠㣲之前未嘗見之惜藁帖散落不多見耳雲鬟煙鬢縷雙鴉一搦宫腰柳帶花試問行雲何處覔畫橋東畔是奴家其二翠翹佯醉倩人扶約我文君賣酒壚解珮向人陪笑問一盃容妾佐樽無其三恰把青荷挿髻鴉嗔人偷眠過窻紗一盤珠翠俱抛擲却向枝頭摘杏花其四遲遲蓮漏不相催亭館無人午夜開風欲捲簾花影動夢魂疑是故人來其五小橋相見便相親猶帶西湖陌上塵欲買一樽聊款曲歸遲還怕小蠻嗔其六不帶冠兒不挿花過門佯把扇兒遮嗔人貪數天邊鴈失記囘頭喚喫茶其七青衫揾淚向人啼妾本秦樓浪子妻流落南州歸不得青樓今在畫橋西其八一年不訪李紅娘今日過門意已忘嘶入畫橋東畔路紫騮猶記舊垂楊其九花牋得得寄瀛洲約我今宵特地留好笑蒼頭迷去路緑楊無處認青樓其十朱門粉壁謫仙家柳外鞦韆襯落霞一澗碧雲流不去木蘭舟繫木蘭花花村二首寧川花村初謂紅紫之地問山翁云村人花姓因曰花村問宿花村喜有餘已拚花下倩人扶牧童不見枝頭杏空向青帘問有無夜宿花村不見花數間茅屋瞰溪沙山翁不是通名姓幾誤河陽令尹家過番陽湖翠㣲訪趙貢元于番陽湖之中方及中流風濤大作篙師束手翠㣲恬然哦一絶而止北風翻雪鼓雷霆舟子停蘭亦斷魂看我金鱗三十六為君一躍上龍門嘲熱張季卿詩云廿傍青門學種𤓰次其韻赤帝乗龍駕火車晴空燒斷暮天霞流金爍石休相酷少皥看看催戍𤓰三友亭平山常有六客從游東館之集乃半不預其間非私故可議則炎凉世情之論又殆不免異日盧子彰作亭于松竹江梅之間命曰三友因次其韻聊及前日之意盖子彰與李伯雲皆平山客也老松疎竹間梅英三友如何獨擅名應是枇杷并檜栢當時無力預同盟青樓贈别次甘州老人韻笛聲吹徹玉樓寒金鴨香消更漏殘含淚欲揮羞不敢倩他銀燭向人彈枕上吟建邸曉風角畫角梅花吸曉寒數聲清徹碧雲端誰知有客愁無寐一掬鄉心不奈酸午枕醉中呼童索枕簟書忩間三盃未醒復三盃醉眼朦朧劈不開急辦藤牀并竹枕要隨蝴蝶到蓬萊香篆劉子源有香篆詩押灰字送至求和因次其韻輕覆雕盤一擊開星星㣲火自徘徊還同物理人間事歴盡﨑嶇心始灰􅲦齋雜詠二十首落花東風吹恨上眉頭兩岸桃花瞰碧流一片紅雲飛不起斷霞殘照落汀洲宿溪上夢囘斜月掛林端酒力初消怯夜寒何處客舟猶未泊一聲柔櫓過前灘漁兒無肉鸕鷀入水頻雙童聨網立沙濱問渠歸得魚多少纔可為羮了一人㑹王友聨翩屐齒破苔痕醉裏觥籌不計陳來日不須關太史五星令返聚甌閩宿茅亭投宿茅亭得夜凉鷓班摇落奏篔簹青簪擊破寒窻紙漏得山花一線香江濤曉鐘搥動巨鼇䟫音棖枕上春雷一夜轟應是金鱗三十六化龍頭角逞崢嶸月夜吟一聲殘角送黄昬獨倚闌干空斷魂竹影掃堦塵不動自挨明月閉柴門嘲染鬢者萬事關心兩鬢秋柳灰何用苦文羞無情霜雪催年少閒似青山猶白頭早春梅梢弄粉做新晴積雪殘雲没一星只把眼前春事卜麥坡已作佛頭青憶西湖十年南國嘆徘徊一片鄉心撥不開應是西湖花柳問風流何事未歸來問宿紫騮囘首客思歸萬里家山蝶夢迷問宿莫來林下邸夜深生怕杜鵑啼曉望長天萬里掃清秋宿霧朝雲寸不留向曉殘星猶未落一盤棋子倩誰收患瘡前回風疾徧身紅布褐因燒艶火烘兩腿熱瘡今又發休將紙被把頭䝉水禽一曲漁歌古渡頭幾多鷗鷺起汀洲西風吹㪚瑶池雪㸃破長天萬里秋獨宿朔風號木作嚴霜錦被重重凍欲僵夜半脚跟疑已割夢魂安得到髙堂幽居獨自清閒獨自忙杳無人迹到蕭牆眠時不用呼童僕自有清風為拂牀送行秋波春水照殘霞恨雨愁雲嚲髻鵶飛上領襟隨得去妾身安得似楊花春思東風吹恨入青樓滿目春容總是愁楊柳織成絲萬縷慿誰裁作翠茸裘小春閩南十月已春回無限風光暗裏催桃李海棠俱鬬艶誰云梅是百花魁上巳桃溪噴火柳拖烟如豆青梅已半酸燕子怯春歸未得一簾風雨杏花寒嘲賀將仕二首賀兄燕爾翠㣲繫獄不克詣賀以詩嘲之花何太喜誰能賦葉是良媒解寄詩但覺人間傳盛事不知天上集佳期吾身西圛拘猶少君腹東牀坦已多我欲屠牛窮建節君從歡燕小登科冬晴次孫子卿韻臘月南州不類冬梨花飄粉小桃紅未曽飛動遥山雪早有春三二月風夢謫仙夢駕白雲參謫仙謫仙留賦白雲篇醉將隻手拏虹筆便扯青霄作彩牋懷九江友人久不見榮樵仲似已罷釣線矣作詩訐之浪拍西風萬壑秋幾多香餌落金鈎無魚可釣渾閒事留得絲綸在即休
