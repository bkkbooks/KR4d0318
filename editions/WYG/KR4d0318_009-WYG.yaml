  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_WYG_009-1a, image: WYG1176/WYG1176-0671a.png}
body:
  text: 翠㣲南征録巻九宋華岳撰五言律詩􅲦齋西關屋最敝陋上不蔽風雨下不避塗潦其偏有數尺之室僅可置身簷厦去地不逺不能直腰而出目曰􅲦齋屋老塵生索椽低帳不縑炙燈煙染棟見客帽飜簷織壁慳三尺遮門斷半簾吾身交九四控制萬愁兼容膝􅲦齋之側有處曰容膝具體功非逺全軀恨已消安禪須促膝覔句敢成摇悔不身齊足時當事半腰行人只蒲伏何處得逍遥野飲呈祝山甫次祝山甫韻野景何須買山花不待培幕天分古木裀地得蒼苔酒上鶯調曲肴空鵲墮梅一壺隨所適何處問蓬萊題練省元壁次日出福建界脚債嗟猶欠心朋喜偶逢溪聲含客怒山色為誰濃古樹晴摇盖殘蟬晚帶鐘莫辭一樽酒明日是吳儂南浦客邸南浦客邸遇雨半月南浦半月雨溪流暗没沙斷橋虹散綺拍岸雪飛花孤館客無夢短蓬人未家何如擁紅日照我上筠車借景樓翠㣲居建新市萬花間之客至命酒則四壁笙簫之聲間發我坐馮著明目曰借景言其皆非我有也有詩次韻朱箔鈎新月平闌架落霞百錢呼酒炙四壁聽笙笳翠映誰家竹香飄何處花功名未歸我且此寄生涯宿水陸寺送陳二部上建陽届水陸寺蕭寺廊廡濶無人獨自行吳儂非好僻楚客為誰清花落慿風掃燈殘借月明江湖有烟浪且此寄餘生呈魯伯瞻伯瞻有詩次其韻信斷無青鳥盟寒有白鷗悶和詩作首愁聽闕水滴蓮花曉山空桂子秋功名有期㑹教闕浦城買舟菊節日買舟南下諸友皆届舟㣲雨催行斾西風送客舟菊闕浪激花翻雪山涵影浸秋前灘闕歸興呈吳夢祥次吳夢祥韻魚鴈音書少關山夢寐遥對花思粉面遇闕喜意鵲應報歸心馬更驕西風綽鞭􅌱飛闕秋晩即事次黄巨瞻韻秋宇清如洗秋宵分外長寒雞鳴午夜征鴈喚重陽楓葉已全赤菊花纔半黄不知秋幾許試與問蘇郎呈李景山次楊次杜韻居靜心嘗樂愁多鬢不禁買舟和月載把酒對花斟白水有深淺青山無古今從兹得真趣消盡利名心小圃舍後丈地闕作小圃舍北有餘隙平禠作小園花存四五本竹種兩三根風伯倩摇珮月娥煩佐尊誰知方大裏别有一乾坤村居次臧仲武韻時在雙瑞莫怪村居僻村居亦可嘉僕羸腰帶艾婢倩鬢簪花歌罷蛙催樂酒闌蜂報衙門前少車馬慚愧五侯家宣城道中次壁間韻恰到杏花天轉頭過禁煙燕歸纔數日蠶起又三眠少智慚樗里多材憶孟堅功名且隨分無苦自咨煎過新豐市懷古新豐乃太白舊游書堂今立道旁路出横江去虛堂立道偏雨聲楊柳外風色杏花前有淚沾詩宿無歌述酒仙采江千古恨號認向誰傳買舟浦城自浦城買舟入建得一小艇畏路逢危路尋舟得小舟始云為得計終乃復添憂艙狹難伸足篷低怎舉頭十圍無處著跼促向中流憩妙因寺次王有道先生韻蕭寺寒山外﨑嶇一徑幽斷雲迎客入曲水護堤流木石四時古軒忩五月秋午煩聊小憩拂石為支頭再繼前韻俗塵方倥偬得得訪清幽煙練素疑抹山屏翠欲流松筠掃日月藤蔓懸春秋物外有餘樂吾生空白頭七言絶句讀漢史閲紀信韓信傳漢將假帝為真帝齊乞真王作假王大抵紀韓皆是信不知誰短又誰長寄王五四將仕將仕乃清之弟寓廣信嵗在戊辰以其兄之事來告徘徊久之臨别以二絶餞行季叔青天轟霹靂屈原平地溺波濤從教晉楚多戕賊二子何曾損一毫周田且謂曾占易商野何嘗識夢書假使二君無感召不成終老在樵漁約叔真二首叔真孤髙山林自葛峯來見從游兩月徬徨不忍去作詩送之半間屋抵斗來大一箇身同山樣髙側坐斜眠俱不得煩君除去一牛毛厄堂有事留司馬凌閣無名問大宗我且盤桓君且去歸斯千載約芙蓉題窻間夜起讀書有感題窻陽虎不名真盗玉子張何事便書紳聖賢立論有㣲㫖精義當求妙入神過西溪道經西溪僕馬痡瘖解珮青帘一醉而去路隨馬足難知數山叠魚鱗不記名隔岸青帘人不渡一溪流水暮潮生題蓮華壁間次蓮華壁間李次高韻風外落花千萬片水邊啼鳥兩三聲無情驚起陽臺夢獨倚閒窻看月明贈吕元玘元玘居分水道旁周末見人歌采芑楚先聞客賦離騷胸中有氣不能吐空使虹蜺萬丈髙初抵富沙二首芳草不隨春水緑連山猶帶夕陽明人生有酒且行樂休向河梁問子卿鞭鐙兩三千里路樓臺數十萬人家長虹不吸秋江水一葉扁舟飛雪花呈周及之貢元及之居三衢山中留宿一頭却過六七嶺兩足幾乎百十斤恰喜故人能下榻檠窻樽酒細論文寧川冷渡次壁間韻峯囘路轉六七里林靜鳥啼三四聲游女不知行旅恨一茶留我話平生宿灌頭次壁間韻淡魚纔煑鹹魚熟白酒新篘紅酒香莫訝盃盤成草草一年忙處是蠶桑南浦水閣南浦橋之西有閣臨水同舍宴岳其中麗人不知行客南征之役乃有揷花臨水相朝之意成二十八字橋横南浦虹千丈柳護西溪翠一行佳麗不知滋味惡挿花臨水照紅粧秋晩獨步次劉彦禮韻十分秋色著嵓桂幾陣晚凉催井桐自恨異鄉知遇少一樽相屬與誰同後溪二首蓬窻夜雨短長夢啼鳥喚人新舊愁萬里論文一樽酒醉和明月上扁舟泉聲恰似世情惡山色不如歸興濃自恨十圍無處著何如瘦作束腰蜂楊花一絲不染湖光白萬㸃能囘山色青三月金明池上水與予同是一浮萍杜鵑殘月照愁人病酒好風吹夢客思家欲知亡國恨多少紅盡亂山無限花悶述二首鴈翎未忍刳丁謂虎口猶期脱蔡京何事姦邪皆倖免洛陽年少却南征有鼎不烹姦黨肉無刀可斷佞臣頭男兒此等不平氣空使衝冠射斗牛酒禁次項仲山韻嘲軍民不許交飲之禁將軍愛士民心失太守憂民士氣衰大抵軍民皆赤子如何從此便藩籬贈美人别次男氏䝉鼎才韻花臉送愁和露泣鶯聲傳恨向人嬌别情逺去尤難割相送不須離畫橋寄宗上人上人名正宗向以能詩得度牒今在投子我為扣閽拘狴犴汝將吟筆換袈裟别來猶記松窻外一掬清泉自㸃茶寄趙及父久不得及父安問忽有自楚東至者便以詩寄之欲邀詩社同蓮社為築將壇并杏壇圖得有材皆命世不隨風月報平安有感千囷未必將軍喜五斗難消令尹愁若使淵明逢魯肅折腰應到脚跟頭桃花紅雨隨風散落霞行人幾誤武陵家牧童若向青帘見應認枝頭作杏花弦月人間離别最堪憐天上嫦娥恐亦然昨夜廣寒分破鏡半奩飛上九重天翠㣲南征録巻九欽定四庫全書翠㣲南征録卷
