body:
  text: 翠微南征録别集類三宋提要臣等謹案翠微南征録十一巻宋華岳撰岳字子西貴池人為武學生開禧元年上書請誅韓侂胄蘇師旦下大理寺鞫治編管建寜侂胄誅放還登嘉定武科第一為殿前司官又謀去丞相史彌逺事覺下臨安獄杖死其集名南征者皆其竄建寜時所作翠微則其别號也此本巻首有新城王士禎題語曰宋華岳集十一巻名翠微南征録第一巻開禧元年上皇帝書請誅韓侂胄蘇師旦語最伉直餘詩十巻率麤豪使氣上侂胄詩云十廟英靈儼如在漫於宗社作穿窬及誅侂胄函首請和又有詩云反漢湏知為晁錯成秦恐不在於期皆不肯附和浮議盖陳東一流人如岳詩不以工拙論可也其持議頗允士禎又引吳興掌故云翠微集華亷字仲清著不知何據案岳名著史冊此集亦著録藝文志昭灼無疑華亷所著翠微集當别自一人一書與岳集不得相混士禎乃録以存疑則失於裁斷矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣
  hash: sha256:ebf13c9fb01177d3084207b2d245af6d761657feab6da7ab9710a1e319ace33c
