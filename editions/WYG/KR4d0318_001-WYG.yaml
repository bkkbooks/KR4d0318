front:
  text: 孫士毅
  hash: sha256:8356196d0378e2ceb8aacb2f9cdd07c83cde03f2b0b77ed2504c500090c9c745
body:
  text: 總校官臣陸費墀翠㣲南征録題語宋華岳集十一巻名翠㣲南征録第一巻開禧元年上皇帝書請誅韓侂胄蘇師旦語最伉直餘詩十巻率麤豪使氣上侂胄詩云十廟英靈儼如在漫於宗社作穿窬及誅侂胄函首請和又有詩云反漢須知為晁錯成秦恐不在於期皆不肯附和浮議蓋陳東一流人如岳詩不以工拙論可也又致呉興掌故云翠㣲集華㢘字仲清著漁陽山人記欽定四庫全書翠㣲南征録巻一宋華岳撰書開禧元年四月二十七日上皇帝書四月吉日國學發解進士臣華岳謹熏沐百拜裁書獻于皇帝陛下臣聞職諫諍而不言有罪非諫諍而輒言有誅臣以一介草茅誤叨教養非敢僭以求狂妄之誅誠以天下之大變將形國家之大禍將至有職守者不敢言無職守者不敢僭臣于此時不能剖露肺肝控告君父則不忠之罪不惟難逃而臣之身首將異其處雖有粟烏得而食諸臣自旬月以來都城士民徬徨相顧若將喪其室家諸軍老小隱哭含悲若將驅之水火闤闠籍籍欲語復噤駭于傳聞莫曉所謂臣徐考其所自則侍衞之兵日夜潛發樞機之遞星火交馳戎作之役倍于平時郵傳之程兼於疇昔乃知陛下將有事于北征而為軍若民皆如是之皇皇也然臣考之天時按之人事盖有大不然何者侂胄以后族之親位居極品専執權柄公取賄賂蓄養無籍吏僕委以腹心賣名器私爵賞睥睨神器窺覘宗社日益炎炎不敢嚮邇此外患之居吾腹心者也朝臣有以庸瑣之資請姻師旦驟入政府者有以䛕佞之資阿附侂胄致身顯貴者陳自强老不知恥貪不知止私植黨與隂結門第凡見諸行事惟知趨承侂胄一人而君父之尊彼反不知自以為保正耆長之材而鈞衡天下鼎鼐四海此外患之居吾股肱者也爽奕汝翼諸李之貪懦無謀倪僎倬杲諸郭之膏粱無用諸吳之恃寵僭専諸彭之庸孱不肖皇甫斌魏文諒毛致通秦世輔之彫瘵軍心瘡痍士氣以至陳孝慶夏興祖商榮田俊邁之徒皆以一卒之材各得把麾専制平日剜膏刻血苞苴侂胄以致通顯饑寒之士咸願食其肉而不可得萬一陛下付以大事彼之首領自不可保奚暇為陛下計哉此外患之居吾爪牙者也程松之納妾求知或以售妹入府或以獻妻入閣魯􅀈之貢子為郎富宫之庸駑充位此外患之居吾耳目者也蘇師旦以穢吏冒節鉞牙儈名爵周筠以𨽻卒冒戎鈐市易將相此外患之扼吾咽喉者也吾之腹心吾之股肱吾之爪牙吾之耳目吾之咽喉而無非外患則彼之所謂外患者實未足憂而此之外患盖已周吾一身之間矣詎可捨吾身之外患而徒事于邊鄙之外患耶禮樂征伐自天子出所貴乎中國者皆聽命于陛下也今也予奪之命黜陟之權又不出于陛下而出于侂胄是吾有二中國也命又不出于侂胄而出于蘇師旦周筠是吾有三中國也夫金人以一外患而猶能據吾之中原曽謂其有五外患而不能蹙吾之元氣乎金人以區區關河之地猶能逼我淮漢曾謂外患之居吾腹心居吾股肱居吾爪牙居吾耳目居吾咽喉而不憑陵吾之宗廟社稷乎以一中國而撫四夷猶曰不可曾謂一家之中自為吳越一舟之中自為敵國而能外制逺人乎比年以來軍皆掊克而士卒自仇其將佐民皆侵漁而百姓自叛其守令家自為爭人自為戰此又啓吾國中億萬之仇敵也今陛下不務去吾腹心股肱爪牙耳目咽喉與夫億萬之仇敵而欲空國之師竭國之財而與逺人相從於血刃相塗之地顧不外用其心歟臣自丱角以來推衍三式之書自去嵗上元甲子五福太乙初度吳分四神直符對照荆楚始擊蜚符旁臨甌越青門直使交次於幽薊黑殺黄道正按於燕趙者之成法主算最長客算最短兵以先發為客後應為主自太嵗乙丑至丙寅丁卯戊辰己巳庚午六年之間皆不利於先舉儻其叛盟犯義撓我疆埸至於事不獲已然後應之則反主為客猶曰庶幾萬一國家自首其事自倡其謀則將帥内暌士卒外叛塗炭萬民血刃千里其為應驗速若影響此天數之不利於先舉也矧將帥庸愚軍民怨懟馬政不講騎士不熟豪傑不出英雄不收餽糧不豐形勢不固山寨不修保壘不設吾雖帶甲百萬運糧千里而師出無功不戰自敗矣此人事之不利於先舉也湯武革命應天順人黄帝征伐天時人事臣願陛下誅吾腹心股肱爪牙耳目咽喉之外患盡其羣黨而勿疑其濫異其身首而勿疑其慘吾國中之外患既已除矣然後公道開明正人登用法令自行紀綱自正豪傑自歸英雄自附侵疆自還中原自復天下自底於和平四海自躋於仁夀何俟乎兵革哉不然則亂臣賊子毁冕裂冠哦九錫隆恩之詩恃貴不可言之相私妾内姬隂臣將相魚肉軍士塗炭生靈墜百世之逺圖虧十廟之遺業陛下於此雖欲不與之偕亡則禍迫於身權出於人俛首待終何臍可噬事之未然難以取信臣願以身屬之廷尉待其行軍用師勞還奏凱則梟臣之首風遞四方以為天下欺君㒺上者之戒儻或干戈相尋敗亡相繼強隣外攻姦臣内叛與臣所言盡相符契然後令臣歸老田里永為不齒之民實出天地父母生成之賜干冒天威罪當萬死不備岳百拜翠㣲南征録巻一
