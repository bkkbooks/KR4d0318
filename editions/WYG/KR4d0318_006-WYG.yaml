  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_WYG_006-1a, image: WYG1176/WYG1176-0654a.png}
body:
  text: 翠㣲南征録巻六宋華岳撰七言律詩題富沙廟丙寅七月晦富沙居民大延燒至平政橋煙熖環昭定王之祠吏民俱禱旋獲反風之應環祠民屋悉為煨燼而祠之簷桷無一焦因感神之威靈而詩之平政橋頭火爍空富沙宫殿烈煙中地形難撲徒臨水天意能囘遽反風十里爆雷驚客夢萬家全璧賴神㓛君王注意恢神武更乞威靈為寶冲次翁正叔溪山勝游之韻溪南風物照忩扉溪北蘭舟纜翠㣲雙槳碧雲苔浦合一簾紅雨杏花飛只知有酒酧佳景却恨無繩繫落暉更約風流衆年少明朝依舊莫相違春郊即事次王昭甫韻東風吹不斷輪蹄處處鞦韆環珮飛剪翠弄粧歸髻掠亂紅翻錦上屏幃花應笑我春嘗醉燕解嘲人夜不歸莫怪逢春太娛樂人生能有幾芳菲悶題作夀子同志不振所辱此心忠義出天資奴𨽻兒童莫强為燕雀不知鴻鵠志牛羊徒飾虎狼皮事當桀犬吠堯日書在塞鴻歸漢時拔劔問天天不語料天還愧負男兒呈陳平仲莆友送荸薺因以一盃為平仲夀反辱平仲分羮之惠示詩次韻以謝達人安分樂平生不與隂陽造化爭漢節有人恭且止楚盤無客遂當行薦公地栗三盃酒分我天香一味羮大抵有施須有報木桃瓊玖愧詩評紙帳劉大紙帳詩者絶矣鄧五九兄以劉大命來索詩因次軸間韻主人氷雪灑胸禖買宿銀城不計緡春草有詩皆白雪秋毫無夢到紅塵月娥好作雲間侣風伯不寒氷下人更喜五更忩外月梅梢分得一枝春兵施判院好談兵而不識形勢有佳作見教次其韻兵貴先人斯奪人莫教間諜漏真情漢因有備吳終退秦為無人楚始爭卦向爻中分損益棊於局上定輸贏不知都督三邊者還肯江湖問一聲自訟次溪南壁間韻我生素不事詼諧檐板方頭喚不囘遇事豈容無正論濟時未必有長材頭雖五鼎不辭劒口恐三緘合用枚不是生平太剛介有如蹤跡尚塵埃紀時陸大方名規江湖之士官途不得志隱于琴聞僕有建安之難來慰以詩次韻古今多少好英雄未必奸邪未必忠上黨鼎膏流地白長平坑血濺天紅三邊傳檄兵雖息二𣙜開埸貨未通更願年豐富金帛飽裝駞駕為和戎重九破㡌無情不受吹滿頭霜雪已如絲菊花笑我三秋客風物撩人九日詩三楚膏腴已煨燼二江皮肉更瘡痍子卿三月無音信鴻鴈南來何所之禱梅山初入建求䜟梅山告而不驗作詩告之許我登龍尚未還作詩更為謁梅山如何威惠推千載猶使英雄困八蠻神不提身歸虎帳鬼須擘口動龍顔聰明儻為扶宗社願借風雷頃刻間寄西山久不拜西山忽有陳武昌之便因作詩寄姓名久不到西山覔便無風鼻謾酸天塹有花春堰急地爐無火夜堂寒青燈昔記對牀臥白髮今羞把鏡看見説北歸常有鴈一書無惜報平安再禱梅山梅山昔扣五通仙曾許英雄第一籖恰遇塵埃當擾擾如何泥濘尚淹淹若非推入髙宗夢須是遥分太史占他日崧髙詠申甫一香先為大王拈怒題壯氣横秋面渥丹男兒未遇指休彈賣漿豈料周分國盗粟焉知漢築壇脛脡未甘纒吏鞅髑髏不信誤儒冠夜深踢起床頭婢和淚挑燈把劒看寄范茂卿茂卿家于北苑子識之于建西關因遣人市茶以詩嘲之社風吹迸雨前枝正是施工北苑時小胯未封纔入盝短鎗初拆半含旗一盆臘雪分龍井萬杵春雷入鳳池見說貢餘山似積小煎還肯換新詩題溪莊丁卯寒食約故人薛成伯父子遊溪莊成伯之子文仲雋逸為時髦重座間示詩因次其韻山擁青螺出粉牆水環銀帶挿溪莊一百五日雨翻浴三十六宫人鬬粧蝶翅拍花催舞袖鳳毛翻錦入詩囊新歡舊恨知多少且對東風醉幾場竒見施清叔邀出城西于小囿見一髽四圍皆歌鶯拍蝶翻思去京至此凡七換嵗籥方破天荒爾就借清叔韻以記其事紅牙催拍燕飛忙一片行雲遶畫堂眉黛蹙成游子恨臉紅燒斷故人腸榆錢不買千金笑柳帶何須百寶粧舞罷隔簾偷送目不知誰是楚襄王思故人予謫建不聞西北故人安否因以詩寄子明叔詢諸子動靜太乙年來落冀并幾多豪傑未成名堯天日月計和玉唐地山川知耀卿盧六驅風能破屋陳三平水可傾城年來幕府勤延攬何事諸兄未有聲呈古洲老人次周清之韻衞霍勳名李杜才纔過四十也心灰俗塵趂少便披拂詩料空多難剪裁時事謾提眉便皺家懷未説眼先開朱簾更倩梅香掛要放銀蟾入座來訓小童小童頑不可言欲撻之而不忍特作詩以訓之飯罷令人喚小童敢煩捉耳為開䝉芎茶不用焦湯㸃紙被還將艶火烘醉欲伴眠當倩月熱求揮汗合邀風它時我建清油幕亷汝封侯學衞公郊飲次孫子卿韻茅舍松棚隔小橋碧帘斜掛竹籬腰猪頭煑去和皮擘牛肉秤來帶骨燒村酒不圖邀客醉野花復喜向人嬌歸舟不用撑明月只倩西風借晩潮西爽小湖程正同作堂西偏以挹爽氣暇日約予同登未遂所請寄以五十六字客子東南不著家主人北里恣豪奢夜深常倩月移竹春老不煩風掃花暮雨送凉歸枕簟夕陽留客賦煙霞何時執手闌干外同把功名誓鏌鎁斗齋磻溪先生托廨大中僧室有齋名斗示詩次韻八方無處著瞿曇百合中間寄一龕滿挹酒漿供里北平量風月借和南腰如可折豈徒五涎若果流何待三更喜小窻能就拱夜寒江靜著山函呈楚南僧楚南名正椿記室大中嘗與台僧棠上座論詩剛腸未肯報平安擬把功名一擔擔方向杏壇逃敗北却于蓮社得和南香同世事炎還冷茶類人情苦始甘大抵久長同佛法此心何處不瞿曇山居次王山甫韻布作寛袍竹作冠蕭然萬慮不相關數聲横笛煙霄外一箇閒人天地間若遇急流須勇退從教倦鳥不知還百年富貴君休羡得似浮生半日閒吳伯叙伯叙嘗喫官鹽有司欲以為私販而籍其家贈以五十六字太平官府不停囚求劒烏衣欲刻舟私筴是鷄難做鶴公庭得馬便成牛不疑若受千金謗膠鬲當貽萬世羞見説明公在蓮幕不知能鑑此寃不讀史史筆如衡須正持莫教浮誕出無稽已成帝業從烹父未將王師休殺妻秦逸號眠為抱虎劉狂名舞作聞鷄麟經削後無全筆磨玷吾當問白圭建安暮秋次劉子嚴韻斜陽望斷水平橋古柳蕭疎已半彫魚躍浪花翻水面鴈拖煙練束林腰花時無鏹能追驥月夜有詩堪續貂回首故鄉多少恨亂山無數路迢迢三衢道中次毛子彰見賜元韻西風吹夢落青帘濁酒三盃路二千别岸舟行秋色裏故人家在夕陽邊嚢中有藥難醫國竿上無鈎可釣賢見説近來書籍貴監取唐漢莫論錢秋望有懷收張子明王清之書有感片雲如雨巻西風綽盡遮闌眼力雄逺水半連晴漢碧暮霞全借夕陽紅姓名未得聨諸子鬢髮皤然已一翁欲識翠㣲詩外意豈徒憂國願年豐送李子方子方以將家子不果用事業之秋溧流下僚方有求婚問舍之意作詩嘲之亂雲堆月上層樓樓上朱簾不下鈎雞翅拍開朱户鎖鴈聲喚上木蘭舟黄花撚酒留人醉紅葉題詩倩水流李廣不侯人不笑笑他人作爛羊頭寄兩庠同舍次鄭坡韻昔年槌皷扣天閽逺謫南州七度春大享有恩來北闕小囚無賂脱東閩烏衣座滿民流血畫燭簾深案積塵見説九重宵旰慮長沙猶有少年人呈沿漕宰向自京口泛舟入杭為邑纂所阻作詩訴之長亭不作馬蹄迂一葉孤蓬入帝都星布關津皆自放雷封纂節獨相拘可憐罔市千般有誰信虚舟一物無為祝琴堂早催發片帆連夜過姑蘇九日次趙叔仁韻禾落西風黄葉飛子卿無信鴈來遲凄凉自笑劉思父慷慨難追杜牧之歸興十分濃似酒愁腸一縷亂如絲慿君細把茱萸問此㑹明年健有誰戲呈趙可父可父以法曹入幕明年為鎖試第一是冬正欲遣使議和少年場屋擅詞鋒審讞無私只奉公夜月蘭宫無宿曜秋霜蓮幕有春風明堂難毁周公制鄉校猶存子産功文德自來能服逺更煩劉向為和戎挽吳夫人夫人少師孫女居蜀適王氏卒年十六葬于舒仙姑之山鸞驂不是厭塵凡王母瑶池促駕還家在兩三千里外人生一十六年間好隨神女游舒水難伴文君歸蜀山試向仙源問消息桃花零落水潺潺巖桂落英和郡楊伯宋有詩次韻凈掃庭堦襯落英西風吹恨入蓬瀛人從紫麝囊中過馬踏黄金屑上行眠醉不須鋪錦褥研香還解作珠纓宫娥未許填溝壑收拾流酥浸玉罌牢城述懷思冦平仲發書吳元白扣平仲動靜江外音書久不來重城昏皷又相催眼前螢掣簷前電耳底蚊轟屋底雷乃事類棊方入局此心如火已成灰慿君試問吳元白老冦東川囘未囘重午次鄧信甫送菖蒲釵符之韻虎眼龍鬚午未乾楚臣遺淚尚澘澘梅天有雨金丸重麥地無風翠浪閒蒲解梟風豈梟賊符能驅祟不驅姦一樽菖酒呼天問何事男兒鬢漸斑
