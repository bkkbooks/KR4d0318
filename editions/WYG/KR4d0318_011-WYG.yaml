  text: 翠㣲南征録巻十欽定四庫全書
  hash: sha256:03b4cfcdb192988c6efe32e436561f2b91fe0b16e8ca9fbe5e1420be9421a768
  markers:
  - {type: page-break, offset: 7, content: '', id: KR4d0318_WYG_011-1a, image: WYG1176/WYG1176-0681c.png}
body:
  text: 翠㣲南征録巻十一宋華岳撰七言絶句漁父廖叔陽漁父詩押花字求何明父和明父先送翠㣲翠㣲次韻逕還叔陽明父不及見也它日明父閔軸云老秋當退奕明父名于詩社嘆服如此江村水落富魚鰕半屬橋邊賣酒家莫訝鬢邊新有雪夜來沉醉宿蘆花寄趙德夫德夫雖入田幕卒不見用欲歸金陵復有徘徊之意作書見寄因以一絶贅楮尾男兒無路出邯鄲長鋏休從暗裏彈是處有魚堪下釣扁舟何獨子陵灘春閨雜詠十首問庖嫗溪館供庖獨有魚溪翁日日扣吾廬兒童不問無錢買便拽鈴兒喚小厨午枕午簟風清帳自開日斜雙鼻尚鳴雷不知蝴蝶何方去多少黄鸝喚不囘落花石痕新褪落溪毛應是春流昨夜潮紅雨入簾衣不濕玉人沾作鬢邊嬌巻簾眉帶遥山淡拂秋幾多春恨鎖重樓真珠半巻嬌無力須索偎人為上鈎酒醒宿酒初醒午夢回不欣梳掠傍粧臺曲肱斜把香腮托却訝荷花藕上開雪獅兒勸罷浮酥酒一巵殢人相伴塑獅兒却將凍手和衣拍笑我金鈴用橘皮醉歸紅猊燒盡夜堂寒銀燭生花玉漏殘沉醉歸來渾不記阿誰扶我上雕鞍買盆池蓮小罋栽成一把蓮問渠邀價勒三千主人不問成和否移向西窗畫舫前晚醉登樓鳳簫吹斷古梁州獨倚東風十二樓醉把朱簾和露巻恍疑新月是銀鈎帶花不整烏雲不畫眉天然標格自相宜梅花羞對傍人挿背倚屏山捻一枝夜有所聞建邸夜不安枕隣壁復有激人之離思者書二十八字于窗以愧之好風吹月上囘廊花壓䦨干子漏長天籟不鳴天外竹披衣潛起聽鴛鴦秋朝有感翠㣲在建屢准荆淮諸司奏辟西府初欲徴發終沮于平原之令十年版築嘆勤渠自笑青霄去路迂昨夜髙宗聞有夢不知曽到傅巖無聞有薦翠㣲者成二絶二袁吕布謾豺狼孟德仲謀那易量顧我未逢三顧主空教徐庶下南陽韜鈐鼎鼐本同倫後世人材自淺深相國若能擒項籍漢壇應不薦淮隂流螢二首池亭夜坐有星孛入燕翼之郊見于氷鑑起占躔度渾儀按堵久之乃知腐草之光誰將殘火曳流螢月黑星昏分外明老眼年來困躔度恍疑流彗入王城前年天狗落京西千里生靈血染衣子夜不知螢電過復憂天外一星飛早春十絶譏貴公子自嘆身如不繫舟幾年漂泊在南州柳絲只解弄春色不把紫光絆客愁層樓故山烟靄接層樓樓上離人淚欲流誰謂樓髙添望眼一層樓上一層愁麥坡雪滿遥山玉作堆幾多花柳望春回出門獨有平坡麥一𣲖生青熨不開楮衾夜來不敵楮衾多全勝吳綾與越羅好是玉人春睡起白雲堆裏見姮娥酒家青帘久不訪文姬樽酒慇懃欵翠㣲况醉不須籠畫燭自挑明月送郎歸梅山十年不謁五通仙自嘆何時接聖顔此去行祠應不逺白雲深處是梅山水西詩道風光在水西水西我意未為竒若教南北東溪去更費詩人無限詩梅尋春不遇欲空歸竹外横斜拾一枝且喜東君有消息隔香應不怕疎籬寄書一書欲冩寄雲鬟更把春衫裹素蠻欲識相思誰最切淚痕令作鷓鴣斑自迷蒼生千里望雲霓何事英雄去路迷見説九重新有夢濟川人在此巖西寄仵判院八首其一閒亭無日不相隨稍不相隨恨别離况是一秋無信息可無人寄問安詩其二自慚兒女總江湖鴻鴈不來音訊疎且喜北堂珠玉眷團圞環誦道家書其三春諭空洞之音許以五百巻為期今己倍蓰何尚杳然天音空洞豈虚傳許我琅函誦半千何事加持功已倍日邊消息尚茫然其四短牋封罷更重題生怕蒼頭去路迷説與不須多借問葛廬秖在白雲西其五紅猊消盡水生花清夜迢迢玉漏賖環珮不知何處去醉眠應是小卿家其六毫端風雨走蛟螭人物風流冠一時要向行雲問蹤跡青樓何處没新詞其七此去于門咫尺間樽罍無計得躋攀斷魂欲伴行雲去猶恐歌喉誤小蠻其八錦牋牙軸白雲詞君外知音更有誰一榻何時對風雨與君聨臂話相思得金正將書金暉本名金軍浙之四明人沿海為盗配𨽻池州牢城復結連徐三沈二等叛囚池守陳模池帥毛智通欲盡棄市翠㣲止之改竄建安翠㣲有南征之役金應募上邊作書薦之邊帥續因沿淮立功見任定海正將暉識洋島善波濤可充沿海鄉導八行黥墨笑金暉今亦提兵上海涯一介問安雖老畧感恩猶勝李申之莫出翠㣲謫居建安郡太守以下皆迎合乎韓平原囚之囹圄自舍人張公提嶽閩嶠特令自便丁卯邊帥屢辟入幕西府以權勢命不允至走有司尚有防閑之意無事何須出短籬一關風月足朱扉幾回趿起芒鞋去帶得閒愁無限歸自喻呈趙潤夫反舌禽之譊譊者過時則無聲梁間燕子為喃喃故下珠簾未放還料得無聲如反舌不應留落在人間惜秋二首子聞宋玉悲秋之來子獨惜秋之去次李忠朝韻成惜秋祝融嘘火扇驕陽北陸迎寒釀雪霜安得金風專嵗令四時心地有清凉詩到林頭落葉時眼前秋事已無幾何當領取秋容去收拾詩囊帶得歸上運管張平國平國初任池陽西樓酒官妙年司釀水邊州浪迹曾陪汗漫游紅粉夜嫌銀燭短醉和明月下西樓其二次任池陽銅官宰大江南畔五松西潘岳風流夢有詩歸路經從定留挽莫教父老見旌旗其三九子芙蓉上下雪潭皆池陽山水名雨洗芙蓉沃眼青雪潭澄月照人明銅民指㸃向民説未比當年令尹清其四程廷老乃平國姪壻居九華雙峯其號雙峯十月客辭家廷老相期下九華檢早不逢陶靖節喚船同過鯉魚沙其五紫樞黄閣總青氊西掖東華墨尚鮮何事闕業獨公蓮幕恁淹延其六平國尤善筆法安國閒將玉斧製羅紈醉引龍蛇競筆端流落闕軸緑窻俱作畫圖看其七野夫平國姪安國子路漕管除龍舒守明年武城三載促公歸自合班行列禁闈計幕暫參知有在野夫曽此便横飛其八朱顔緑鬢富春秋家世才華三總優不用鶴裘兼映雪天然標格自風流其九雲衢從此喜通亨鳳閣鸞臺信脚行願把恩風散寰宇盛栽桃李作門生其十英雄三載謫東南二月東風始放還馬瘦尚嫌歸路窄願求屋上一青山再還建上舊居翠㣲嘉定乙巳仲春被命東歸是秋復准部符再還建上門外梅花拔復栽囘時春去去春囘兒童拍手應相笑歸去賈生今又來羣鷗一聲漁笛發中流驚起平沙萬㸃鷗去盡青天囘欲集棃花無數落汀洲翠㣲南征録卷十一
