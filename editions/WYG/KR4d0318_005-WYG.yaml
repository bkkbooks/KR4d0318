  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_WYG_005-1a, image: WYG1176/WYG1176-0648c.png}
body:
  text: 翠㣲南征録巻五宋華岳撰七言律詩自寛次游少翁韻十事相尋九不諧骨窮更值五行乖人情厚薄且隨分世態炎凉休掛懷家欲自豐無楮幣㸑慿誰執有荆釵如今且任眼前過他日功名殊未涯黄氏三層樓束嘉焦次詹約妓登樓賦詩次韻瘦笻支我上髙寒風露淒清酒力慳千里人邀千里月一重樓見一重山筵前飛雪噴焦遂檻外行雲遏小蠻便好飜身駕黄鵠直將情枉扣天關幽居次陳吉父韻莫問門無長者車只圖深巷樂樵漁一園黄落食無限萬壑碧蓑衣有餘鴈足北來歸訊杳馬蹄南去故人疎東風看整朝天斾多少功名在故廬賀趙丞登第諱希洙授瑞金丞居延平要與宗盟立紀綱俯從多士較文章人材漏網無疏宻科目搜羅有短長蟾窟一枝分玉樹鳳池三浪出銀潢何當推解延豪傑為復中原萬里疆梅次稼軒香字韻一年無處覔春光杖䇿尋春特地忙牆角數枝偏冷淡江頭千樹欲昬黄梢横波面月摇影花落樽前酒帶香更仗西湖老居士為予收拾付詩囊捉月仙夜發雷江有捉月者出舟尾因酌以酒送之中流纜解西風拍岸顛鴈拖秋色上航船掛帆未作乗風客舉棹先驚捉月仙楚些有淵心石殞賀狂無井眼花眠慇懃為酹一杯酒斷送西江浪拍天呈寗次翁次翁以詩見慰次韻王謙不事富春侯自是薰蕕味不侔病體隔年留枉獄夢魂連夜逐歸舟可憐商木遷新令欲為韓門復舊讐但得此心無所愧為公一死亦何尤悶成次劉平甫韻平甫來自羅浮欲出江外訪武仲當楊叔源以詩言别勿憂李廣不封侯廣不封侯未足憂漢鼎不烹曹操肉吳鈎空斷伍員頭鴻門自昔推屠狗虎帳于今愧沐猴千萬南陽遇徐庶為言豪傑尚縲囚别館即事丁松老約出姑蘇有詩次韻十年客裏過春光客裏逢春分外狂半堵碧雲蝸路濕一簾紅雨燕泥香銜山西日辭春閣拍岸東風趂夜航莫向錢塘蘇小説東吳新髻李紅娘武興解舟時有北征之役西風落日楚江頭秋水已平鸚鵡洲煙樹接天迷送斾浪花飜雪噴行舟三盃萬事我已飽一日千里誰能留見説平戎新遣使班超投筆已封侯不遇次稼軒韻英雄不遇勿長吁茍遇風雲彼豈拘不向關中効蕭相便于江左作夷吾當知晉霸非由晉所謂虞亡豈在虞多少英靈費河嶽鍾予不遇獨何歟紀事翠㣲在建遇事即紀以詩鉗口刳腸未足殫窮原探本可觀瀾乞醯孰謂鄰非直反矢須知友必端暴虎欲從頭碎璧沐猴還慮髮衝冠積薪措火居其下試問賈生安未安冬日述懷次柳㙴韻寒入肌膚粟已生銀河凍合水無聲梅花漏泄春先到風色商量雪未成有愧何須問天理無求方始合人情男兒未際風雲㑹辜負胸中十萬兵暮春述懷次李子彰韻一年春事已差池又見楊花貼水飛梁燕不憂驚午枕箔蠶生怕誤春衣景逢佳處須行樂事到難時且式㣲幸有黄雞并濁酒且和風月醉柴扉幽居次陳百一兄狀元韻十頃平湖一簇山湖山佳處著朱闌分堦草色迎春緑漱石泉聲入夜寒不擾自然人事好有為方信世途難如今休説當年事只把心平氣定看謝二劉文卿挺卿惠然見慰且有米黍之辱時端節前一日鴈行臨慰暖如春玉粒金包即拜恩周粟不肥清聖肉楚絲難繫直臣魂二生在昔聞孤竹一死于今愧屈原圓簠下頒誠有謂此情兄外更誰論暮春述懷次羅廣文韻買春無計托花神費盡榆錢不計緡風絮飛成三徑雪雨犂飜動一園春有心報國從招禍無相封侯莫怨貧試問專壇與分社予何人彼亦何人呈諸同舍次黄浩然韻洛陽年少不知幾十載南州賦式㣲三舉不登黄甲去兩庠空笑白丁歸頭長賈昔過三尺腰大巨今徒十圍祗恐金鑾不前席誰云無䇿富王畿寄陳士元丁卯五月聞有符離之役郊野英雄不肯收膏梁芻豢有何謀邊人只怒馬黄弩公子當求狐白裘唐詔屢頒蕡不第漢壇纔築信當侯古今得喪同兒戲何必區區嘆白頭貧居次劉亞卿韻貧居不暇理椽茅只倩江山圍一遭林鳥樂時知地僻嶺雲閒處覺天髙春衫著破重車線臈酒擎乾獨醡糟且把盃盤聊自適不須平地起風濤呈魯功甫功甫元宵預有禁煙之約拂面東風二月天緑楊芳草暗平川花容著雨鬬飜錦春色惱人催禁煙燈夜雖然君有約花時却恐我無縁直須得暇來相訪當約嫦娥伴醉眠勉馮著明著明被西府檄押兵上淮著明病辭作詩勉之主憂臣辱已難堪國事顛危况未安溺嫂臨淵猶援手鬬人同室尚攖冠公如不唱從軍樂士亦恐歌行路難麟閣功名總勞苦莫將行役作辛酸藕花馮肖許有藕花詩和者盈軸其闕人送西社中名公見者莫不閣筆近有友至義不可却勉强續貂惜絲不肯織宫鞋花月仙人謫不來河伯借泥封玉腕風神飜浪沃香腮無房不許蜂留宿有葢嘗令鷺自開何事寃仇結青女一朝收拾付塵灰自勉次趙丞韻世態風波不可論且于閒處樂天真肥家無子堪登隴憂國有人休問津顔色雖䝉時借我脚跟那解日隨人客來若問當時事摇手無言對北鄰初夏即事次王剛叔韻隂晴未判落梅天柳巷無人絮撲氈滌器倒囊尋市醖喚船挑網得溪鮮鳥聲呼夢客千里山色撩人句一聨遐想故人應念我馬蹄何處夕陽邊呈鍾子嚴子嚴方有入荆之意因箴之那條路不通去聲長安莫把心腸獨自剜有釀何須兒索飲無殽徒勸客加餐千金不賞思歸楚萬戸無封願識韓大抵利名些子耳幾多豪傑被縈絆寄楊渭夫渭夫久于江湖近授陸安宰丁母夫人之艱忽辱以詩見寄次韻自愧材猷不足觀獨于忠義死難千二陵風雨誰思漢萬里烟塵期報韓眼到北盟常揾血話殘南渡欲衝冠如何一代名人傑稽首稱藩鼻不酸幽居次劉徳之韻瀟灑幽居屋一重入門花柳間青紅簾嘗礙月鈎嘗掛酒不逢花盞不空畏愛難全公子日雌雄誰識大王風且將酒貨遷詩料休問𣙜埸通未通呈王君庸君庸嵗有烹笋之集是春有納寵之慶示詩次韻主人意重出霓裳客子愁多欲斷腸眉黛暗傳春去恨臉紅猶帶夜來粧竹根穉子肌膚滑葉底荷花語笑香多少行雲在巫峽謾將詩思惱襄王寄西山西山以詩訊事次韻宫牆無地可穿窬猶幸先人有敝廬仕版可羞寧毁瓦儒冠曽誤枉收書供柴我合同收炭寄食君當自辦蔬此理曉然明似鏡何須足下肆耕鋤呈李朝舉朝舉談論慷慨居鄱陽有詩見寄次韻一片忠肝照日明濟時無策苦傷情聱牙拊几悔南渡和淚挑燈編北盟漢用檄招三十郡楚因歌散八千兵太平若鬬生靈肉何用生靈望太平小春言懷次項山甫韻桃李生香花滿谿南州十月尚襜衣春從酒罋榨將出秋在詩囊帶得歸弓射十分方破的棊髙一著便爭機勸君莫作等閒看毫髮差殊事已非春愁益公有萬事關心眼已昬之句次其韻十日春愁不出門出門春事已消魂摘花掀㡌倩人挿索酒得盃和月吞啼鳥聲中近寒食落花隂裏又黄昏春來春去總休問徃事悠悠付一樽呈徐商卿十年憂患謫東南萬事于心了不關病去只愁雙足軟老來且喜一身閒人情無處便生怨天道有時猶好還大抵久長居富貴到頭天意亦須慳春遊有感次王長卿賞春之韻上苑春工到海棠老夫隨分為春忙朱絃轉枕鶯催拍紅粉倚欄花鬬粧吾道幾時曾損益人心今日自炎凉願言相約花前醉一聽兒童號酒狂憂呈項山甫憂吾所謂果何憂憂國憂家卒未休坐法馬遷方去漢釋囚箕子未歸周西風萬籟聲聲恨夜雨疎桐㸃㸃愁有客不知吾所向却將米價問南州述懷陳子中自鄱陽一别不聞動靜近忽自廣信來慰我有詩次其韻我生胸次不塵埃不學兒曹剛自媒詩料雖慿風月製宦途還聽鬼神開十年教養猷初壯半世功名念已灰安得金鑾有清問賈生何事未歸來套筒黥卒以鐡圈竹筒貫索為繫囚之具因詩其狀作箇咿􅀈贅項咽箇中和我萬愁牽一筒作柄簫無竅雙鐡為圜扇有圈身拜却疑人是犬手擎還類筆如椽從今節節能通氣安得當為積蓄錢春郊即事次稼軒韻東風吹動綺羅塵翠葢紅纓處處新蝶翅拍開千樹雪鶯聲催老十洲春人生有酒須行樂吏禄無階且食貧歸客不須籠畫燭醉和明月上雕輪雪次吴子同酒價添字韻天低江濶水連天上下周囘一色兼撲雀獵鷹翻白縞得鱸漁父指青帘馬抛玉勒瓏瑓落獅欠金鈴橘柚添得句莫嫌呵凍筆明年嵗事已堪占翠㣲南征録巻五
