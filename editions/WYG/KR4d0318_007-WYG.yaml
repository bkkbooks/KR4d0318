body:
  text: 翠㣲南征録巻六欽定四庫全書翠㣲南征録巻七宋華岳撰七言律詩有觸述懷翠㣲以訐直取怒於人多矣士大夫有始若加禮而終乃恝然不顧者深切悼之英雄還要識英雄不識英雄總是空投䑕在人當忌器見鴻非我獨彎弓情從忠佞分輕重事戒恩威戾始終説與翠㣲休截截三緘從此更須工巖桂建人以盆蕙為重巖桂夾道動徹數里不絶仄以為常卉故貶而抑之西風吹老碧蓮房萬壑風流拆麝囊謾與籬花爭曉色肯教盆蕙壓秋芳月中有女曽分種世上無花敢鬬香要識仙根逈然别一枝開傍郄家牆偶成一别京華近十年此心無日不悠然嗅梅得句天然巧把酒開懷地自偏鐵硯不須兵十萬銅盤何用客三千功名自有風雲㑹不遇風雲毋自煎寄王士貴士貴别去一載不聞動履之詳客自小峯來知近况甚佳作詩寄之畫橋相送百花春轉眼孤鴻逐斷雲别後有誰能顧我客中無日不思君風前花影嘗興念月下桐聲久不聞見説近來多好况一書無惜寄云云發書與幼弟及坦齋次寗子剛韻風煙世事不堪聽勿謂封侯勝白丁老眼隔年新舊厯歸心連夜短長亭一聲蜀鳥驚胡蝶十幅蠻花寄鶺鴒更向坦齋夫子道近來雙鬢已星星寄王清之清之名度入吳德夫幕置句漢上項平甫疾之清之贅于長沙間整歸鞍故有相勉推輓之意封書漢上寄清之却恐清之漢上歸千里謾懷明月共寸心常伴白雲飛湘妃有淚能斑竹周士無心戀采薇安得一緘飛海嶠與兄聨轡上淮淝感應王祠翠㣲繫牢城凡一嵗籥城中有感應祠至靈遇有禍福神夜預告有若響應因捐囊繪靈神之容儀而祠奉之如神正直獲縲囚當代公卿總合羞疏紙未燒謀已遂爐香方爇病先瘳乞靈屢假三更寐釋縛常封萬户侯待得有勳書竹帛一封當為薦宸旒寄張舍人時舍人挺本路獄事萬寃無計徹天衢三尺金科謾巻舒公不戴星馳駟馬民將指日就枯魚黄堂宴妓不加意丹陛慮囚空有書見説羣烏廣瞻聽如何公論尚躊躇禱富沙欲發部使者書致禱十年蹤跡淖泥沙為炷靈香禱富沙萬里無由詣霜闕一書聊欲為星槎解驂許我來齊晏釋縛從君問左車他日横飛上麟閣行祠當為建京華謝劉判院判院以綿衾見惠細軸濃雲寄􅲦齋蒲團和氣忽驚囘一牀浪捲芙蓉皺十幅香重錦繡開不怕夜寒侵斗帳却愁春夢到陽臺感恩未作瓊瑶報先把新詩寄小梅寄苕溪故人昔年分袂霅川東繫馬花梢撲亂紅解珮送行情怏怏舉盃言别恨匆匆中人以上誰知我北斗以南惟有公此去東閩有良便一書無惜慰羇窮不禱收宗卿書江淮有檄不至扣之廟食者不驗不炷靈香不誦經兆盃籖榜總欺人窮通只合從天地禍福何須問鬼神命到死時生莫倖事當直處曲還伸從今若問開先事桃李無言二月春送提舉陳工部自福建召入溪風拂拂巻征衣溪上攀轅恨馬避蝗不入閩今已矣碑無留峴古求之泉知送客聲猶咽燭昧留人淚謾垂願速長沙還賈誼為公江上斬鯨鯢悉事僉幕諸丈不能奉朝㫖作詩愧之欲歸未去兩紛拏何事回天力未加九牧誰為十羊主百冠當念一人髽肘邊有石心雖切腰下無錢手謾叉千萬有人逢伯樂為言龍種尚盤車呈陳信父用信父生朝韻老來百計總無成當路時官懶問名國事只將心事比今人難作古人評蒼頭笑我樽無佐白髮欺人鑷又生惟有建溪知客意過灘時作不平鳴寄江子崗秋中拜書子崗至節無報作詩訊之秋夜封書上子崗别來化日又舒長只知電燭兩經月不覺星毛半欲霜竹葉照人凝盞滑梅花撩客透籬香知他詩債曽償未料得尋春日日忙書太乙編年巻尾編年自紹興上元甲子始至今中元甲子截日其餘皆未來厯年來太乙犯咸池三式編年事可疑西北膏腴從脯腊東南皮肉恐瘡痍堯天日月期無已邊地煙雲嵗有之更向江湖問同志中原何日是歸期怒成在建聞侂胄自怒師旦舌端豪氣吐長虹四海一身無處容不向北山求刺虎便從南海學屠龍鼎須劉闢方成器劔到魏齊那是鋒欲抱不平朝玉帝夢魂飛上祝融峯楮衾次劉子長韻霜風剪水作氷花織出吳綾不用梭十幅曉雲藏處士一牀秋水浸嫦娥直疑天上無青女却信人間有睡魔更向屛山畫梅竹紅塵還有此風麽勉趙法曹法曹以詞賦明經屢首監漕初尉贑之石城比嵗不登茶冦鹽商在在嘯集法曹招集豪傑分道掩捕雷馳電掃隨即撲滅因識江湖之士次任達安法曹明年復為南省鎖試第一不願易授持終建安任又明年發兵上邊時卿有薦趙于幕府者江湖之士多歸之銀潢河海浸崆峒君獨軒昻萬𣲖中北鄙虎牢今子産東山狼跋古周公固知魯衛封同姓合向燕秦策異功我欲誓江同擊楫中流不惜伴英雄獄中責廷尉廷尉黨權勢而無公論以詩責之重門有路透泉關便合摳衣問比干愧我直言難媚竈從渠怒髮自衝冠烏臺有月身何及犴獄無天淚謾彈自恨不逢包孝肅此身那許報平安吾巾不是不冠儒曽被儒冠幾誤予鐵硯不磨天地軸毛錐難復帝王居當傳衛霍無傳秘却著韓曹不著書堪笑蒼生無眼力不知豪傑在樵漁挽戚虚中虚中嘗從老氏之學無嵗不為廬山之遊治生仰給於藥府與翠㣲有林泉之契夢裏匡廬興未闌轉頭世事已辛酸肥家有術疑非藥漉酒從人笑不冠鴈序向人羣已失鳳雛過眼影何單不堪囘首原頭路一塢松楸生暮寒寄盧進士盧子防有能問二十年之契近忽以詩自廣信見慰丈夫策定在吳鈎浪把橋門作勝遊綵筆誤人隨驥尾錦標還我占鼇頭關山夢寐三千里竹帛功名四十秋安得九重容借箸盡將軍國為前籌九日言懷次劉功父韻功父為江湖領袖初有聨韀之約旣而蜚符入淦不識所在至是方以詩見貽次韻報之凄凄天氣間炎凉破帽翻風客鬬狂酒味暗消黄蘂辣鴈聲喚得菊花香三京昔擬恢同軌九日今猶客異鄉更仗阿誰上沙漠為予申意郭汾陽呈鄱陽趙及甫及甫慷慨為江湖稱名在宗室七英之列不學炎凉不自謀動和權勢作仇讐筆鋒帶怒摇山岳劒氣銜寃射斗牛龍虎榜中當擢第麒麟閣上合封侯功名未入男兒手誰肯甘為郡督郵九日溪樓逺望故人王仲格有詩次韻西風寥落做重陽人在東南水一方地僻阻它鴻鴈信天寒撩我菊萸觴江澄素練魚翻赤葉剪紅綃蟹結黄不是倚闌迷望眼欲慿歸鴈問蘇郎訴董寺丞董詣獄問囚翠㣲款以一詩董揮淚而出神首羅㬋欲蝕天彎弓直造玉皇前九重不忍誅林甫一札翻令囿馬遷投䑕固知當忌器得魚誰敢便忘筌吾今一死初無憾願把孤忠托孟堅寄小王徐子晉子晉去唐城二百餘里托拜書二潘十載長沙路二千歸心日夜在長安居家有譽眉空白戀闕無謀心謾丹獲鴈不聞蘇子信沐猴徒笑楚人冠馬蹄恐有唐城便為把功名問二潘獄中作壯士剛腸不受寃髑髏可斷志難干越仇未報薪當卧漢賊猶存鋏謾彈情款不從囚口責炙漿難塞吏腸寛何當盡瀝姦邪血染作衣裳看孟安池亭即事蘭坡有心字韻和者百餘人索賽以此塞責春風恰恰破桃李池館無人一徑深鷗刷斷翎飜水面蝶抛殘粉出花心詩懷攪我丹心破節物催人白髮侵流水伯牙今已矣世間那復有知音南劒水閣次權府郎中韻欲向津頭問鏌鋣一潭秋水漫煙霞畫屏對客景藏景芳樹壓溪花照花有策廷爭慚賈誼無功廟食笑張華夜深霹靂轟雙劒驚起延平十萬家丹青閣辛稼翁三十餘客登髙賦詩為樂閣上闌干紫翠環閣中身世異塵寰長虹吸月印秋水孤鶩伴霞量晩山萬里風煙屏帳裏一時人物畫圖間凌烟須是男兒事却恐功名未放閒折桂園友人宴當塗郡圃名折桂同舍宴餞于中達旦而别次申無咎韻牆頭羅綺碧雲濃牆外鞦韆電掣空蝴蝶拍開花面粉鷓鴣吹落杏腮紅翠裀不巻珠簾月蠟燭還摇錦袖風醉眼不知塵世有直疑身在廣寒宫夜步水西建邸未嘗出郛至是方有水西之行半趿音颯芒鞋過水西樓臺燈火未多時山羞見我頭頭轉月怕抛人步步隨楓葉巻愁秋去早溪聲翻笑夜歸遲柴門只解關煙雨不隔離愁些子兒酒樓秋望西風吹客上闌干萬里無雲宇宙寛秋水碧連天一色暮霞紅映日三竿花摇舞帽枝猶軟酒入詩腸句不寒古徃今來恨多少一時收拾付盃盤臨清閣臨清老球上人素有風月之譽因以箴之闌干古木瑣青葱闌外簷花灼半空萬里好山春黛碧一溪流水暮霞紅窻疎不礙東西月帆過始知南北風試問支郎一樽酒好天良夜與誰同思故人翠㣲在建思蜀道襄漢故人作十載無人問益之誰于欬唾覔珠璣雨三千里家何在三十六峯人未歸將謂抱薪能救療果然畫餅不充饑東川恐遇連榮祖一笑不須論是非
