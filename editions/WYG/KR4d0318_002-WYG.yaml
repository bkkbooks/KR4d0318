body:
  text: 翠㣲南征録巻二宋華岳撰古詩歸釣吟我生本是絲綸客嘗抱絲綸釣王國膠庠雖識姚有虞載車未遇周西伯抱琴歸去古江邊江頭風月猶依然江風刮岸岸如削江月照人人未眠沙平浪靜江天濶換酒捉魚魚撥剌有時醉椀和月吞有時醉棹和煙撥或唱歌或吹笛欸乃宫商人不識歌聲喚徹煙水寒笛聲清透雲霄碧不張帆任渠去去到雲山深處住雲山深處有畫圖添箇雲山畫圖侣不撥棹任渠流流入玻瓈影裏頭玻瓈影裏迸珠玉千斛萬斛誰能收倦時眠醉時舞漁家自有神仙府睡時蝴蝶夢莊周舞處鷗鳶奏韶武自舉歸釣吟清江漠漠煙沉沉雲藏萬壑暗水尾風吹孤月摇天心翠㣲父翠㣲父和我行歌進南浦畫橋流水抹晴煙殘照暮霞收宿雨水連天天似水一蓑活計誰能比楓葉飄霜鱸鱠香楊花飛雪河魨美也不學姜太公百年將至方非熊㑹須年少遇真主恢我諸夏車書同也不學嚴子陵雲臺不為冠殊勲中興只作釣臺侣胷中百萬知無兵我網不似漢漢網何太疎也曾漏却呑舟魚何當周宻如樞機直欲纎悉皆無遺我鈎不似吕吕鈎何太直除却文王有誰識爭如猛曲一彎腰牽取星珠并月璧魚膠寒齒闕蒿剔蟹螯刺指和籠烹屠龍飪鼎口不美斷鯨斫炙腸聊撑記夢秋夜宿客邸劇夢為無懷大庭之游覺來長空明月殊動故郷之思因成記夢溪泠泠音零皷􅕣􅕣虚堂淅瀝生寒風寒風繞我夢魂去飛颺直上蓬萊宫蓬萊宫殿女如玉霓裳羽扇環簾櫳月娥留我宴珠翠玳筵閒列花叢叢酒酣萬象羅心胸舉盃話别殊匆匆青鸞命駕下空濶一聲璫珮鳴丁東被衣起坐周四顧庭户悄悄無人蹤銀河萬里倒澄碧氷鑑半輪斜倚空横江孤鶴一聲唳喚起鄉心千萬重梅楚東道中次壁間韻衰蘭枯荷了秋色幾向寒梢問消息溪橋交馬斷腸時翠袖佳人日暮歸玉面亭亭漢宫樣一見風流慰心賞寒標孤絶太無情誰為移春上玉京月華凄切霜華白夜半飄香度簾額寄聲横笛且休吹愁殺江南未歸客山水吟閩之山峨峨可以接穹蒼閩士孕其秀胸次尤難量閩之水滔滔可以燭妍醜閩士生其間其美不容口君不見周家社稷生甫申崧岳當年曽降神又不見千里秀氣鍾三蘇眉山草木皆焦枯我生恨不由河洛虚負三光并五岳地靈人傑推江東人物風流兼磊落顧此閩之東自古多英雄求其為絶稱獨一忠穆公公今已即世後世誰可擬惟有詹仲通一人而已耳仲通何如人景星與鳳凰不險亦不深山髙兮水長浴十月暇日醉于生春閣暄燥出浴覆衣得詩援筆以記龍藩地暖冬無雪十月風光似三月好風不動綺羅塵人在繡幃簾半揭酒腸拍索能囘春春潮八面香熏熏香肌汗透披縠紋思得滄海驅埃氛銀鍋蟹眼生春雪銀瓢捾破鍋心月流霞傾入碧琅玕香霧氤氲雲半掇花藤織出金芙蕖烟青藕紫堆雲盂一聲璫珮簾鈎垂皂盤捧出雙明珠蠟花照入蘭湯閣珠璣體迸紅猊活鳳豁雲濤濯錦毛龍翻雪浪澆銀甲起拏裙霧圍春風臙巾抹出桃花紅香泉入齒潄寒玉吐作氷雪飛長空蒼頭急把春衫換腕玉輕穿雲一片出門兩腋生清風身在嫦娥廣寒殿嘲熱南方有神名祝融髮赭面丹唇朱紅執鞭入海驅赤龍火車勒駕燒長空千驂萬乘如聨轡烈焰騰騰灼天地九霄烜赫皆甑蒸四海煎熬俱鼎沸流金爍石氣不通天下俱在紅爐中葛衫襟濕疑有雨羅紈柄折渾無風祝融祝融毋太酷天道炎凉嘗反覆看看少皥催戍𤓰盡把凉風散煩溽釣鼇行上提刑左史張舍人名嗣古北風浩蕩滄溟濶千萬軍聲夜潮聒飜空濁浪皷雷霆舟子停蘭面如血龍門有客何崢獰弩目張膽殊不驚桅檣破浪裂洋島直欲一舉空蛟鯨我之釣兮非世比新月為鈎索霞綺先拗虹蜺為釣竿却把鵾鵬作香餌欲垂未垂號鬼神星斗無光天地昏海靈乞命免生死一鈎連六酧銜恩我公萬里風煙伯度量汪汪寰海窄蟠胸髙聳蓬萊山壯氣直吞雲夢澤恩波萬壑奔洪流風帆浪楫交觥籌金鱗照日巨如斗四海觸物無虚舟我生本是釣鼇客幾嵗灘頭望風色忽聞霹靂破崑崙便整絲綸駕航舶我今十轄迎公開㑹須舉手生風雷不然長嘯謝水府明月滿船歸去來上趙漕名善宣喬松弟子見先生也先生尹石城來京弟子赴南宫文未上也先生與而進之舉而送之亦旣德先生矣今道由先生之境而不拜先生弟子罪也見先生而無一言以寓其願見之誠亦罪也風霜髙潔雨露清秀松德也亦先生德也萬木遜節三支同升松事也亦先生事也松之不畏于氷霜亦猶先生之不畏彼强禦也松之詩所由作也不識先生其哂弟子耶其罪弟子耶太山之巔有喬松凛凛千丈摩蒼空風雲有㑹直相際轟雷掣電蟠蛟龍盤根錯節真天種卿月郎星伴辰拱髙風蕭瑟涕清泉桃李無言謾丘壟南宫仙桂饒天香南國蔽芾歌甘棠大枝擎天作砥柱小枝駕海成虹梁六月無風天欲雨赤龍銜火燒空宇亭亭横盖指扶桑萬壑千崖冷無暑大椿可笑欺莊周便指千嵗為春秋使民若戰夏后社夏后氏以松用汝當作商川舟檜楫松舟自慚藤蔓纒林壑未遂鷦鷯一枝樂盤桓已喜跨髙寒撫孤松而盤桓更借扶摇薦鵰鶚我聞處士方綢繆七松處士三友簡在公寧留蒼姬已托大夫䕃秦封為大夫赤子願陪丞相遊子房為赤松子遊鄰女搔綿吟建安西關鄰女善搔木綿日可成一二縷僕向嘗見撚綿紬者于此頗類然就手中提出便紡成絲與撚綿特異因問女嵗可成幾端女云每嵗可得二十疋近以繡工妨迫不及其半因成鄰女搔綿閒窻日上三竿竹窻下嬌娥整輪輻匆匆未暇理雲鬟半朶青鵶倚紅玉青梢摘盡銀香囊畫欄平倚斑筠筐時將纎手翻雪霜酥胸玉面同光芒捧歸細捲銀成索牽出鬆鬆雲一握珠唇呵挺氣温温鸚觜踏車聲絡絡今年莫怪功績稀阿嬭勒繡鴛鴦幃如今織出秋江練十月正好裁新衣客心聞此愁無著一夜清寒動寥寞明朝為問買一端剪做道袍披落魄送商府判自劒津倅入為審計比年十月君初來梅花破雪迎君開自從佐劔壽民脉凋山瘵水皆春臺去年七月君開府燕燕鶯鶯為君舞五日盡蟄潭底龍千里應無市中虎今年二月君時歸風牽囘柳縈君衣君衣不作囘柳轉直上雲端朝紫㣲紫㣲有館名西掖珠玉羅鈿瞰金碧郎星卿月謾徘徊箇中自是神仙宅紫㣲有山名大坡烏飛豸立冠峨峨一聲霹靂震天地萬里腥血流江河紫㣲有㫖垂丹册二者于斯請君擇便須東取元化鈞談笑從容正疆埸君家事業銘冠裳鸞鳳指日鳴朝陽伊洛諸公有政事洙泗諸子無文章禀違展轉情難處溪上恩波湛今古東風吹恨入長亭零落桃花淚如雨平政橋水西有橋為天下第一建水合流三百里直下富沙如撚指溪東披拽纜過西千丈春風怒濤起香輪不解碾清江造舟貫索成河梁年年麥熟梅欲黄連城千里皆波光淳熙太守憂溱洧問津日夜思無計老農乂手願鳩工疊石中流使民濟金珠賣價不計緡鐫瑕斷梓功方成功成燕雀賀新屋炳然萬煉輝丹青挿天螮蝀横江尾下壓寒潭碧無底市聲不到畫梁間秋色盡歸朱箔裏我行一月無風波今朝醉眼翻青羅金鰲背路客揮􅌱玉虹跨浪舟飛梭石唇噴盡寒崖雪雪中電掣金蛇赤兩岸樓頭將相家八州車馬神仙客人言辟人推政平故此特以平政名我聞政事平如水水到不平還作聲贈陳道人道人陳守一善畫出錦軸求詩君不見樵人王翰畫山水一夜風雷揭忩紙又不見長沙洞清畫龍蛇滿軸煙雲翻撚指二子相去數百年筆端妙意誰能傳雙溪道人何所授一見筆法堪齊肩筆一淡輕煙映出垂楊岸逺山依約有還無斜照不紅秋水慢筆一濃黑雲萬疊翻狂風江天日暮暗煙靄天地星斗皆昬朦瀟湘詩人不解語被君吐作無聲句何時覔取綃一縑冩我英姿伴煙雨柴氏節婦一樽酒義士拜而受義士一首詩節婦雙眉皺眉皺意何如有難難相救嘆我廊廟器淹囘在汚陋惠我㫖且嘉慇懃推意厚吾今繫閩建家貧喜鄰富青眼到朱扉白屋成華胄吾聞孤竹子周室三緘口又聞杞梁妻秦邦稱烈婦此輩誠間生世代不常有如何天一方同時俱輻湊愧無八品珍草草具籩豆何當再拜摳我衣巵酒恭為兒女壽傷春衣袂怯春寒春在江南岸我意正傷春復被春縈絆一雨臙脂濕萬壑氷澌泮撩我惜春心與春傷爛漫柳垂不染絲織成愁一片杏吐無煙火燒碎腸千斷憶昔腰如柳柳腰野易按憶昔面如花花面嬌難喚人不似春芳隨處得看翫因春憶美人不見徒扼腕何時醉卧花柳中一笑千金不容換百舌福建號為烏秀流鶯一去無消息燕怯春寒歸未得緑窻清晝靜無人似把衷情訴知識上苑東風二月春淡黄楊柳初成隂解將一片無情舌學盡百般能語禽紅英紫蕚紛如雪萬姹千嬌總饒舌莫嫌花外太啁啾黙黙難酧好時節須臾緑暗紅亦稀伯勞杜宇鷹鸇飛更兼獵弋恣羅網巻舌不語全毛衣堪嗟國士徒切直不似幽禽明語黙何如鉗口歸山林莫問燕南并越北飲仙閣小峯王泰之作堂曰傾盖作閣曰飲仙廊廡瀟然有物外之致有所得者以樂其身其泰之之謂乎因作詩以留嵗月槽頭壓盡春山緑槽下真珠㵼醽醁騷人一笑傾葢盤滿面春風漲紅玉少陵得此不欲言乃指八子為中仙主人傾葢慕此意一閣新構堂西偏于今世態薄于紙何必勞心問青紫願君醉我金屈巵萬事過耳同風飛醺醺和月尚栽竹長嘯一聲歸翠㣲贈祝跛相者祝跛武夷人我生多蹇難事業冷於水内外雨五行醜惡諱人舉武夷有跛者抱術徧荆楚摳衣忽趨隅覿面便相許摇手無所需再拜拂毫楮一詩聊贈行無以壯䈰筥他時了功名為結煙霞侣富沙道中述懷次王伯玘韻敗皷非全材毁瓦不自牧造物兒未戲達人火先撲卜不到渭濱人徒嗟海曲彼哉真彼哉伐盡牛山木驟雨次紫溪壁間韻牛尾烏雲潑濃墨牛頭風雨翩車軸怒濤頃刻巻沙灘十萬軍聲吼鳴瀑牧童家住溪西曲侵早騎牛牧溪北慌忙冒雨急渡溪雨勢驟晴山又緑翠㣲南征録巻二
