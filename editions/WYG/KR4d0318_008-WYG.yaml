body:
  text: 翠㣲南征録巻七欽定四庫全書翠㣲南征録巻八宋華岳撰七言律詩有激呈江聖與判院次聖與韻不郊不國不吾廬兀兀騰騰十載餘頸昔已逃三尺劒腹今猶秘九疇書齊牛難爇吳元濟賈鵩何慚董仲舒只合三緘且鉗口一蓑歸去伴樵漁與楞伽老瑛上人久不得楞伽書遣人問訊終有覔柴度臘之詩勿謂年來世道艱都縁彼此不相參一生知已有千萬十事從人無二三紅杏無氊堪拱北白蓮有社結和南扁舟若有東歸便斷竹枯松寄一擔呈王子䝉隱者子䝉賜詩次韻國士還須為國憂肯同兒女作身謀存無補世亡無異生不驚人死不休秦鹿須還屠狗逐楚猴猶為爛羊羞如今若論西都事却與中唐風馬牛夜讀離騷次陳德欽韻楮衾封冷白凝霜展轉無眠夜未央風欲送愁先巻帳雨嫌多夢故敲忩自慚鼓瑟投齊好謾接歌輿效楚狂起把離騷讀幽悶楚詞還似楚江長倪尚書生祠翠㣲以丙寅春被命南下建安守王君告老别駕兼領都事四戎兩院淹禁數百人因思先生不復至此自惜其下文不早亡也謹以五十六字汙壁聞説先生入建都一年民樂吏清癯四廂夜月封朱户兩院春風鎖翠蕪一旦有書追駟馬萬寃無計徹羣烏焚香再拜祝公壽問有清朝賞罰無秋晚述懷呈薛子長九江薛子長訪以詩見慰次韻一罋香醪一曲琴得相尋處且相尋盃寛却怪青山小坐久不知黄葉深當路星軺已鉗口異鄉風物更闗心何時繫艇秋江上醉卧蘆花雪滿襟雙桂堂江頴伯有堂名雙桂詩多矣求和謹次其韻月姊親移入慶門廣寒今是並肩人分他蟾窟雌雄種作我螢忩南北隣傲竇雖慳三樹玉比詵飜剰一枝春主人便好鞭黄鵠斫取魁梢謝紫宸憶弟妹入建三載烽火轉徙不聞動靜别來三載客東南始信人生聚首難眼底不聞鴻鴈信鼻頭常為鶺鴒酸問天不語語徒厲驀地上心心類剜安得春風吹馬首卧聽行列報平安責逋二首邑宰欠鹽直千緍漕追甚急欲以三分之一塞責蓮幕有黨宰者反十邑帑之虚乃作詩以記其事索逋無術謁公門豈謂公門反愴神令尹幸酧三百索癡兒猶戀一千緡如今索手方知錯自此甘心莫怨貧不是恩波不旁洽五窮無奈苦隨人刳腸植粟餧官牛牛骨成塵粟未酧何事蓮參猶閣筆反憐花縣若虚舟季公素重千金諾膠鬲當貽萬世羞願効相如還趙璧莫教顔色嘆牀頭送趙右秋二首殊右秋婺州人立志孤髙當時公卿無推轂成就之者因惜其無知遇而去特作二律以送之梅花飛雪滿霜洲洲上行人去莫留蠟炬結花催管籥鴈聲喚客上蘭舟莫嫌氷炭情難入自是薰蕕味不侔執節從教少知遇勿于世路學沉浮閩藩齊指右參軍玉骨清無半㸃塵一味恤刑常召禍十年游宦只憂貧圜􅩪月照金波夜寒谷花開玉樹春客子與君雖素昧一時聊記子張紳牢城言懷建人吳子彰以詩見慰次韻重城不隔世間塵箇裏無花别有春寃鬼夜隨風雨泣病囚時作犬羊呻雷霆不霹欺君賊彗孛偏凌為國人欲問老天天已老料應無説為敷陳贈楞伽老瑛上人楞伽瑛常以詩稱于諸卿向遇之于西關老復以詩來見因次其韻無聊斷梗撥寒灰門掩霜風客自推急下火壚叉手接便將布袋解頭開拂牀展巻呈詩藁炙盞分茶當酒盃别後逢人須問訊楞伽曽倩寄書來謝仵判院惠米仵文諱彦輝任建安府屬向以事繫牢城復被檄還任不相忘以米見惠作詩謝之溝壑膏粱總自招仲尼陳蔡亦囂囂不逢魯肅千囷指空折淵明五斗腰孤竹二饑知我意蒼梧一飽為君謡從今隻手摩挲腹却向顔門問一瓢除夜大雪丙寅除夜得春瑞雪大作時有襄淮之衂因記夜半入蔡之事使人振腕不寐時在建三除夜矣青帝明朝下玉京先教滕六掩車塵梅花笑我三年臘椒葉爭他一夜春烏角觸簷鞭墮玉馬蹄印路椀抛銀何當夜縛吳元濟去作中興社稷臣呈毛南仲南仲之居名曰沙坑在松溪浦城之間南仲賢者好賓客有鄉里之譽因由江水遇門南仲出見有終夜之歡呼二子聴琴翌日而别作詩南仲感謝暮宿東溪一草堂倦和衣屨卧繩牀夢隨鸞去遼天濶夜到雞鳴剗地長早起不須禽為喚多憂誰謂草能忘清閒却愧毛南仲醉卧西忩一枕凉除夜二首丁卯嵗夜坐齋閣因思二年以來除夕皆坐不辜之獄復事君子道長即有拔茅連茹之慶纔辱東皇造化工便隨飛鵲報簾櫳人間狴犴知無所天上蓬萊還有宫酒色半澄春後緑蠟花全折夜來紅從今泰道能連茹願駕蒼蟠躍震風吳鈎不是怒鯨鯢夜半劉琨屢舞雞十載載春游太學二年年夜宿圜􅩪楚盤未必資毛遂周粟如何飽叔齊塵世功名儻來爾無言桃李自成蹊呈富大卿大卿名琯鄭公六世孫詣獄以詩示之卿為感嘆垂淚司農未曉報龍樓昨夜中天貫索流石父不逢齊子相馬遷空作漢家囚銅壺滴碎短長夢鈴索拽翻新舊愁安得君王賜歸騎一㕓投老大江頭雪中呈劉子冲子冲嘗為東山之游因嘲之朔風巻水入天渠剪作飛花散六虚竹本無聲縁葉宻梅因有影怕花疎路從玉鑑上頭過家在氷壺裏面居欲作一詩撩謝女不知為况近何如雪中有戲是嵗有神馬坡樊城之役辱桐栢柳元用賜書以寄之一夜風神揭海神盡將純素掩丹青四圍白壁成千嶂萬里紅塵没一星搭岸柳條横玉帶壓牆梅蕚上銀屏好將今日平淮䇿説與當年李愬聽憂世寄清溪友人丙寅冬任建聞逺音作廟堂無計息干戈國士銜寃未汨羅尺五指天均日月八千里地舊山河人無逺慮心徒切里有新喪巷不歌况是十年芹泮客倚闌尤覺淚滂沱嘲曹掾友人曹掾有友人者每對客云待次幾年所費錢千偶承恵詩時次其韻㣲寓箴切之意世態年來日日新宦途澆薄更驚人闕期動徹連三政選調無疑費百緡是吏有囊盛短巻非財無藥療長貧參軍也勝陶彭澤且糶官糧醉幾巡囚中記貧翠㣲在西關有客送僧字韻詩求和方思索間同邸有陳子昭者語及世故渠有志公不是閒和尚之語就􅆳其韻英雄不遇不憂貧獄吏從教喚不應煑飯只燒沽酒鑵讀書權借守囚燈堪嗟世事危如卵無怪人情冷似氷勿謂功名成倖致志公終不是閒僧送倪尚書歸霅川尚書自三山罷歸筆麟圖鳳久無聲何事權輿復見今魯祭不因夫子肉齊卿難奪孟軻心我公去就何為重吾道興亡所繫深安得斯文天未喪載歌狼跋繼遺音五言律詩宣城道中次壁石湖宣界地名間韻躍馬上宣城千山翠欲顰蕙風輕巻舌櫻雨細沾唇柳絮難驅臘榆錢不買春何如澆一斗爛醉石湖濱當塗道中次為子楊新林韻春晴不慷慨十日九清隂蝶宿花留粉鶯眠柳借金邊塵方障眼漢壁尚關心醒去愁無奈盃行滿滿斟壽昌道中别劉仲方仲方以詩言别次韻山斷疑無路林開覺有村饑牛戀茅壠吠犬護柴門悶去詩千首愁來酒一尊明朝南去路懷抱與誰論别王泰之道自小峯謁泰之翌日以詩言别風神戀行客吹柳纒簪纓傍水鳥多白近山蟬更清别腸雲閣淚歸路月關情告德無多日清觴聊一傾遊溪西寺次府判湯丈韻寺覺重遊好僧期後㑹賖青蟲彫病葉白鳥篆平沙水瘦石生齒山寒梅未花功名今有待且謁惠公茶登樓晚望次宋帥幾韻疎雨洗空碧晩晴人倚樓稻花千頃浪楓葉一簾秋逺岸明殘日孤村認小舟溪山如愛我相見亦囘頭安分呈李竹齋次李竹齋韻風雨思君子煙霞憶舊遊一區山水國萬里帝王州臘罋香浮玉春旗雪滿甌安貧隨處樂此外復何求拜茶漕建者貢茶于京城則率百官拜之北苑春將半星槎欲奏功杵鳴千臼雪鎗巻一旗風盖錦鸚毛翠簽羅象眼紅封成拜𤣥鶴飛上紫㣲宫邸食責庖者建安邸中㸑者不善治食陋邸已無味庖人更不材盫炊全做粥燒鮝半成灰添醋酸綿齒研椒辣木腮何時聳堂臠香霧靄樽罍秋意次項子禮韻木剪空山瘦西風掃落黄荷殘簪失盖菊老餅還香詩盡情尤濶愁多夜更長悶懷無處著隨鴈落瀟湘書堂遇雨翠㣲向有書堂遇雨押承字韻和者盈軸近承菊峯送至復有􅆳韻風叠雲成片溝搓水作層濕書移案避添硯就簷承瓦擊聲疑雹忩低暗欲燈須臾西漏日晴意慢騰騰翠㣲南征録卷八
