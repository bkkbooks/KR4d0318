front:
  text: 翆㣲南征録卷之六
  hash: sha256:dceef196d62dc3011db4e9b98284ef837d88454d87569919d266c76adbd44de0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_SBCK_006-1a}
body:
  text: 律詩題冨沙庙政橋烟㷔環昭㝎王之祠吏民俱祷折丙寅七月晦冨沙居民火延燒至平之簷捔無一焦因感神之威灵而以詩紀之折旋獲反凨之應環祠民屋悉為煨燼而祠平政橋頭火爍空冨沙宫殿烈烟中地形難撲徒􅎔水天意能囬遽反凨十里爆雷驚客梦萬家全璧頼神㓛君王注意恢神武更乞威灵為宝冲次翁正叔溪山勝㳺之韵溪南凨物照窓扉溪北蘭舟䌫翆㣲双槳碧雲苔莆合一簾紅雨杏花飛只知有酒酹佳景却恨無䋲繫落暉更約凨流衆年少明朝依旧莫相違春郊即事東風吹不断輪蹄䖏䖏鞦韆環珮飛剪翆㺯粧帰髻掠乱紅翻錦上屏幃花應笑我春尝酔燕觧嘲人夜不帰莫怪逄春太娛楽人生能有幾芳菲悶題此心忠義出天資奴隷兒童莫強為燕雀不知鴻鵠志牛羊徒飾虎狼皮事當桀犬吠堯日書在塞鴻帰漢時㧞剣問天天不語料天还愧負男兒呈陳平仲反辱平仲分羮之惠示詩次韵以謝折莆友送荸薺囙以一盃為平仲寿逹人安分楽平生不与隂陽造化争漢節有人恭且止椘􅐻無客遂當行荐公地栗三盃酒分我天香一味羔大抵有施湏有報木桃瓊玖愧詩評𥿄帳主人氷雪洒胷襟買宿銀城不計緡春草有詩皆白雪秋毫無梦到紅塵月娥好作雲間侣凨伯不寒氷下人更喜五更􅐼外月梅梢分淂一枝春兵兵貴先人斯奪人莫教間諜漏真情漢因有偹胡終退秦為無人椘始争卦向爻中分損益棊于局上㝎輸嬴不知都督三边者还肯江湖問一声自訟我生素不事詼諧檐板方頭喚不囬遇亊豈容無正論済時未必有長材頭雖五鼎不辝剣口恐三緘合用枚不是生平太剛介如有蹤跡尚塵埃紀時于琴間僕有建安之難耒慰以詩次韵折陸大方名規江湖之士宦途不淂志隐古今多少好英雄未必奸邪未必忠上黨鼎膏流地白長平坑血濺天紅三邉傳檄兵雖息二榷開埸貨未通更願年豊冨金帛飽装駞駕為和戎重九破㡌無情不受吹滿頭霜雪已如絲菊花笑我三秋客凨物撩人九日詩三椘膏腴已煨燼二江皮肉更瘡痍子卿三月無音信鴻雁南耒何所之禱梅山而不騐作詩告之折𥘉入建求䜟梅山吉許我登龍尚未还作詩更為謁梅山如何威惠推千載犹使英雄困八蛮神不提身帰虎帳鬼湏擘口動龍顔聪明傥為扶宗社願借凨雷頃刻間寄西山武昌之便因作詩寄折乆不拜西山忽有陳姓名乆不到西山覔便無凨鼻謾酸天塹有花春堰急地爐無火夜坣寒青灯昔記對床臥白髮今羞把鏡㸔見說北帰常有㕍一書無惜報平安再祷梅山梅山昔扣五通仙曽許英雄第一籖恰遇塵埃常優優如何泥濘尚淹淹若非推入高宗梦湏是駈成太史占他日崧高詠申甫一香先為大王拈怒題壮氣横秋靣握丹男兒未遇指休弹賣漿豈料周分國盗粟焉知漢築壇胫脡未甘纒吏鞅髑髏不信誤儒冠夜深踢𧺫床頭婢和淚挑灯把劔㸔寄范茂卿西関因遣人市茶以詩貽之折茂卿家于北苑予識之于建之社凨吹迸雨前枝正是施工北苑時小胯未封纔入盝短鎗𥘉拆半含旗一盆臘雪分龍井萬杵春雷入鳯池見貢餘山積小煎还肯換新詩題溪荘山擁青螺出粉墻水環銀帶挿溪荘一百五日雨翻浴三十六宫人閗粧蝶翅拍花催舞䄂鳳毛翻錦入詩囊新歡舊恨知多少且對東凨酔幾場竒見皆歌鶯拍蝶番思去京至此凡七換歲折施清叔折出城西于小圃見一髽四圍清叔韵以記其事折籥方破天荒爾就借紅牙催拍燕飛忙一片行雲遶畵坣眉黛蹙成㳺子恨臉紅燒断故人腸榆錢不買千金笑栁帶何湏百宝粧舞罷隔簾偷送目不知誰是椘㐮王思故人大乙年耒落冀并幾多豪傑未成名堯天日月計和玉胡地山川知耀卿盧六駈凨能破屋陳三平水可傾城年耒幕府勤延攬何事諸兄未有声呈古洲老人衞霍勲名李杜才纔過四十也心灰俗塵趂少便披拂詩料空多難剪裁時事謾提眉便皺家懐未說眼先開朱簾更倩梅香掛要放銀蟾入座耒訓小童飯罷令人喚小童敢煩提耳為開䝉芎茶不用焦湯点𥿄𬒳还将艶火烘酔欲伴眠當倩月热求揮汗合􅌽凨它時我建清油幕亷汝封侯學衞公郊飲茅舍松棚隔小橋碧帘斜掛竹籬腰猪頭煮去和皮擘牛肉秤耒帶骨燒村酒不圖􅌽客酔野花𣸪喜向人嬌帰舟不用撑明月只倩西凨借晩潮西爽客子東南不着家主人北里恣豪奢夜深常倩月移竹春老不煩凨掃花暮雨送凉帰枕簟夕陽留客賦烟霞何時執手闌干外同把功名誓鏌鎁斗齋室有斋名斗示詩次韵折磻溪先生托𪠘大中僧八方無䖏着瞿曇百合中間寄一龕滿挹酒漿供里北平量凨月借和南腰如可折豈徒五涎若果流何待三更喜小􅐼能就供夜寒江静着山函呈椘南僧剛腸未肯報平安擬把功名一擔擔方向杏壇迯敗北却于蓮社得和南香同丗事炎还冷茶類人情苦始甘大􅔰乆長同佛法此心何処不瞿曇山居布作寛𫀆竹作冠䔥然万慮不相関数声横笛烟霄外一箇閑人天地間若遇急流湏勇退從教􅌒鳥不知还百年冨貴君休羡得似浮生半日閑吳伯叙販而籍其家贈以五十六字折伯叙尝喫官塩有司欲以為私太平官府不停囚求剣烏衣欲刻舟私䇲是鳮難做寉公庭得馬便成牛不疑若受千金謗膠鬲當貽万丗羞見說明公在蓮幕不知能鑑此冤不讀史史筆如衡湏正持莫教浮誕出無稽已成帝業從烹父未将王師休殺妻秦逸号眠為抱虎劉狂名舞作聞鳮麟經削後無全筆磨玷吾當問白圭建安暮秋斜陽望断水平橋古栁䔥踈已半彫魚躍浪花翻水面㕍拖烟練束林腰花時無鏹能追驥月夜有詩堪續貂囬首故郷多少恨乱山無数路迢迢三衢道中西凨吹梦落青帘濁酒三盃路二千别岸舟行秋色裡故人家在夕陽邉嚢中有薬難医國竿上旡鈎可釣賢見說近耒書籍貴監唐川漢莫論錢秋望有懐清之書有感折收張子明王片雲和雨卷西凨綽盡遮闌眼力雄逺水半連晴漢碧暮霞全借夕陽紅姓名未淂聫諸子鬂髮皤然已一翁欲識翆㣲詩外意豈圖憂囯願年豊送李子方漂流下僚方有求婚間舍之意作折子方以将家子不果用事業之秋之折詩嘲乱雲推月上層楼楼上朱簾不下鈎鳮翅拍開朱户鎖雁声喚上木蘭舟黄花撚酒留人酔紅葉題詩倩水流李廣不侯人不笑笑他人作爛羊頭寄兩庠同舍昔年槌皷扣天閽逺謫南州七度春大享有㤙耒北闕小囚無賂脫東閩烏衣座滿民流血画烛簾涤桉積塵見說九重霄旰慮長沙犹有少年人呈㳂漕宰長亭不作馬蹄迂一葉孤蓬入帝都星布関津皆自放雷封纂節独相拘可憐罔市千般有誰信虗舟一物無為祝琴坣早催發片帆連夜過姑蘇九日仁韵折次趙叔木落西凨黄葉飛子卿旡信雁耒遅凄凉自笑刘思父慷慨難追杜牧之帰㒷十分濃似酒愁腸一縷乱如絲慿君細把茱萸問此㑹明年健有誰戲呈趙可父試第一是冬正欲遣使議和折可父以法曺入幕明年為鎖少年場屋擅詞鋒審讞無私只奉公夜月蘭宫無宿曜秋霜蓮幕有春凨明堂難毁周公制郷校犹存子産功文徳自耒能服逺更煩劉向為和戎挽吳夫人卒年十六葬于舒仙姑之山折夫人少師孫女居蜀適王氏鵉驂不是厭塵凡王母瑶池促駕还家在両三千里外人生一十六年間好随神女㳺舒水難伴文君㴆蜀山試向仙源問消息桃花零落水潺潺岩桂落英有詩次韵折和郡楊伯宗净掃庭堦襯落英西凨吹恨入蓬瀛人從紫麝囊中過馬踏黄金屑上行眠酔不須鋪錦褥研香還觧作珠纓宫娥未許填溝􅊤收拾流酥浸玉􅎆牢城述懐元白扣平仲動静折思冦平仲發書吳江外音書乆不耒重城昏皷又相催眼前螢掣簷前電耳底蚊轟屋􅔄雷乃事類棊方入局此心如火已成灰憑君試問吴元白老㓂東川囬未囬重午蒲釵符之韻折次鄷信甫送菖虎眼龍鬚午未乾楚臣遺淚尚潸潸梅天有雨金丸重麥地無風翠浪閑蒲解梟風豈梟賊符能驅祟不驅姦一樽菖酒呼天問何事男兒鬢已斑翠㣲南征録卷之六
