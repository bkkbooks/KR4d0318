front:
  text: 翆微南征録卷之六
  hash: sha256:c35658d2127e014b9e1fb9a5db2c6361767ebeeb558fed18aae45363fe75546c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_SBCK_006-1a}
body:
  text: 律詩題冨沙廟政橋烟㷔環昭㝎王之祠吏民俱禱折丙寅七月晦冨沙居民火延燒至平之簷捔無一焦因感神之威靈而以詩紀之折旋獲反凨之應環祠民屋悉為煨燼而祠平政橋頭火爍空冨沙宫殿烈烟中地形難撲徒􅎔水天意能回遽反凨十里爆雷驚客夢萬家全璧賴神㓛君王注意恢神武更乞威靈為寶冲次翁正叔溪山勝遊之韵溪南凨物照窗扉溪北蘭舟纜翆微雙槳碧雲苔莆合一簾紅雨杏花飛只知有酒酹佳景却恨無繩繫落暉更約凨流衆年少明朝依舊莫相違春郊即事東風吹不斷輪蹄處處鞦韆環珮飛剪翆㺯粧歸髻掠亂紅翻錦上屏幃花應笑我春嘗醉燕解嘲人夜不歸莫怪逄春太娛樂人生能有幾芳菲悶題此心忠義出天資奴隸兒童莫強為燕雀不知鴻鵠志牛羊徒飾虎狼皮事當桀犬吠堯日書在塞鴻歸漢時拔劍問天天不語料天還愧負男兒呈陳平仲反辱平仲分羮之惠示詩次韵以謝折莆友送荸薺因以一杯為平仲壽逹人安分樂平生不與隂陽造化爭漢節有人恭且止椘􅐻無客遂當行荐公地栗三杯酒分我天香一味羔大抵有施須有報木桃瓊玖愧詩評𥿄帳主人氷雪灑胸襟買宿銀城不計緡春草有詩皆白雪秋毫無夢到紅塵月娥好作雲間侣凨伯不寒氷下人更喜五更􅐼外月梅梢分淂一枝春兵兵貴先人斯奪人莫教間諜漏真情漢因有偹胡終退秦為無人椘始爭卦向爻中分損益棊于局上㝎輸嬴不知都督三邊者還肯江湖問一聲自訟我生素不事詼諧檐板方頭喚不回遇事豈容無正論濟時未必有長材頭雖五鼎不辝劍口恐三緘合用枚不是生平太剛介如有蹤跡尚塵埃紀時于琴間僕有建安之難耒慰以詩次韵折陸大方名規江湖之士宦途不淂志隱古今多少好英雄未必奸邪未必忠上黨鼎膏流地白長平坑血濺天紅三邉傳檄兵雖息二榷開埸貨未通更願年豐冨金帛飽裝駝駕為和戎重九破帽無情不受吹滿頭霜雪已如絲菊花笑我三秋客凨物撩人九日詩三椘膏腴已煨燼二江皮肉更瘡痍子卿三月無音信鴻雁南耒何所之禱梅山而不驗作詩告之折𥘉入建求䜟梅山吉許我登龍尚未還作詩更為謁梅山如何威惠推千載猶使英雄困八蠻神不提身歸虎帳鬼須擘口動龍顔聰明儻為扶宗社願借凨雷頃刻間寄西山武昌之便因作詩寄折久不拜西山忽有陳姓名久不到西山覔便無凨鼻謾酸天塹有花春堰急地爐無火夜坣寒青燈昔記對床臥白髮今羞把鏡看見說北歸常有㕍一書無惜報平安再禱梅山梅山昔扣五通仙曽許英雄第一籖恰遇塵埃常優優如何泥濘尚淹淹若非推入高宗夢須是驅成太史占他日嵩高詠申甫一香先為大王拈怒題壯氣橫秋靣握丹男兒未遇指休彈賣漿豈料周分國盜粟焉知漢築壇脛脡未甘纒吏鞅髑髏不信誤儒冠夜深踢起床頭婢和淚挑燈把劔看寄范茂卿西關因遣人市茶以詩貽之折茂卿家于北苑豫識之于建之社凨吹迸雨前枝正是施工北苑時小胯未封才入盝短鎗𥘉拆半含旗一盆臘雪分龍井萬杵春雷入鳯池見貢餘山積小煎還肯換新詩題溪莊山擁青螺出粉墻水環銀帶插溪莊一百五日雨翻浴三十六宫人閗粧蝶翅拍花催舞䄂鳳毛翻錦入詩囊新歡舊恨知多少且對東凨醉幾場竒見皆歌鶯拍蝶番思去京至此凡七換歲折施清叔折出城西于小圃見一髽四圍清叔韵以記其事折籥方破天荒爾就借紅牙催拍燕飛忙一片行雲繞畫坣眉黛蹙成遊子恨臉紅燒斷故人腸榆錢不買千金笑栁帶何須百寶粧舞罷隔簾偷送目不知誰是椘襄王思故人大乙年耒落冀并幾多豪傑未成名堯天日月計和玉胡地山川知耀卿盧六驅凨能破屋陳三平水可傾城年耒幕府勤延攬何事諸兄未有聲呈古洲老人衛霍勳名李杜才才過四十也心灰俗塵趂少便披拂詩料空多難剪裁時事謾提眉便皺家懷未說眼先開朱簾更倩梅香掛要放銀蟾入座耒訓小童飯罷令人喚小童敢煩提耳為開䝉芎茶不用焦湯點𥿄𬒳還將艷火烘醉欲伴眠當倩月熱求揮汗合􅌽凨它時我建清油幕亷汝封侯學衛公郊飲茅舍松棚隔小橋碧帘斜掛竹籬腰猪頭煮去和皮擘牛肉稱耒帶骨燒村酒不圖􅌽客醉野花𣸪喜向人嬌歸舟不用撑明月只倩西凨借晚潮西爽客子東南不著家主人北里恣豪奢夜深常倩月移竹春老不煩凨掃花暮雨送凉歸枕簟夕陽留客賦烟霞何時執手闌干外同把功名誓鏌鎁斗齊室有斋名斗示詩次韵折磻溪先生托𪠘大中僧八方無處著瞿曇百合中間寄一龕滿挹酒漿供里北平量凨月借和南腰如可折豈徒五涎若果流何待三更喜小􅐼能就供夜寒江靜著山函呈椘南僧剛腸未肯報平安擬把功名一擔擔方向杏壇逃敗北却于蓮社得和南香同丗事炎還冷茶類人情苦始甘大􅔰久長同佛法此心何處不瞿曇山居布作寬𫀆竹作冠䔥然万慮不相關數聲橫笛烟霄外一箇間人天地間若遇急流須勇退從教􅌒鳥不知還百年冨貴君休羡得似浮生半日間吳伯叙販而籍其家贈以五十六字折伯叙嘗喫官鹽有司欲以為私太平官府不停囚求劍烏衣欲刻舟私䇲是雞難做寉公庭得馬便成牛不疑若受千金謗膠鬲當貽万丗羞見說明公在蓮幕不知能鑑此冤不讀史史筆如衡須正持莫教浮誕出無稽已成帝業從烹父未將王師休殺妻秦逸號眠為抱虎劉狂名舞作聞雞麟經削後無全筆磨玷吾當問白圭建安暮秋斜陽望斷水平橋古栁䔥踈已半雕魚躍浪花翻水面㕍拖烟練束林腰花時無鏹能追驥月夜有詩堪續貂回首故鄉多少恨亂山無數路迢迢三衢道中西凨吹夢落青帘濁酒三杯路二千别岸舟行秋色裡故人家在夕陽邉囊中有藥難醫國竿上旡鈎可釣賢見說近耒書籍貴監唐川漢莫論錢秋望有懷清之書有感折收張子明王片雲和雨卷西凨綽盡遮闌眼力雄逺水半連晴漢碧暮霞全借夕陽紅姓名未淂聫諸子鬢髮皤然已一翁欲識翆微詩外意豈圖憂國願年豐送李子方漂流下僚方有求婚間舍之意作折子方以將家子不果用事業之秋之折詩嘲亂雲推月上層樓樓上朱簾不下鈎雞翅拍開朱户鎖雁聲喚上木蘭舟黃花撚酒留人醉紅葉題詩倩水流李廣不侯人不笑笑他人作爛羊頭寄兩庠同舍昔年槌鼓扣天閽逺謫南州七度春大享有恩耒北闕小囚無賂脫東閩烏衣座滿民流血畫燭簾滌桉積塵見說九重霄旰慮長沙猶有少年人呈㳂漕宰長亭不作馬蹄迂一葉孤蓬入帝都星布關津皆自放雷封纂節獨相拘可憐罔市千般有誰信虗舟一物無為祝琴坣早催發片帆連夜過姑蘇九日仁韵折次趙叔木落西凨黃葉飛子卿旡信雁耒遲凄凉自笑劉思父慷慨難追杜牧之歸興十分濃似酒愁腸一縷亂如絲慿君細把茱萸問此㑹明年健有誰戲呈趙可父試第一是冬正欲遣使議和折可父以法曺入幕明年為鎖少年場屋擅詞鋒審讞無私只奉公夜月蘭宫無宿曜秋霜蓮幕有春凨明堂難毁周公制鄉校猶存子産功文德自耒能服逺更煩劉向為和戎挽吳夫人卒年十六葬于舒仙姑之山折夫人少師孫女居蜀適王氏鵉驂不是厭塵凡王母瑶池促駕還家在兩三千里外人生一十六年間好隨神女遊舒水難伴文君㴆蜀山試向仙源問消息桃花零落水潺潺岩桂落英有詩次韵折和郡楊伯宗净掃庭階襯落英西凨吹恨入蓬瀛人從紫麝囊中過馬踏黃金屑上行眠醉不須鋪錦褥研香還解作珠纓宫娥未許填溝􅊤收拾流酥浸玉􅎆牢城述懷元白扣平仲動靜折思冦平仲發書吳江外音書久不耒重城昏鼓又相催眼前螢掣簷前電耳底蚊轟屋􅔄雷乃事類棊方入局此心如火已成灰憑君試問吳元白老寇東川回未回重午蒲叉符之韻折次鄷信甫送菖虎眼龍鬚午未乾楚臣遺淚尚潸潸梅天有雨金丸重麥地無風翠浪間蒲解梟風豈梟賊符能驅祟不驅姦一樽菖酒呼天問何事男兒鬢已斑翠微南征録卷之六
