  text: 宋史本傳華嶽字子西為武學生輕財好俠韓托胄當國嶽上書云云書奏托胄大怒下大理貶建寧圜土中郡守傳伯成憐之命獄卒使出入母繫伯成去又忤守李大異復置獄托胄誅放還復入學登第為殿前司官屬鬱不得志謀去丞相史彌逺事覺下臨安獄獄具坐議大臣當死寧宗知嶽名欲生之彌逺曰是欲殺臣者竟杖死東市
