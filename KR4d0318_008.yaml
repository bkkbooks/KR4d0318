front:
  text: 翠微南征録卷之八
  hash: sha256:48988d1ece03fdfe825d67748056b9de9b3cad5a4499a970d592dd127f047d67
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_SBCK_008-1a}
body:
  text: 律詩有激呈江聖與判院不郊不國不吾廬兀兀騰騰十載餘頸昔已逃三尺劒腹今猶祕九疇書齊牛難爇吳元濟賈鵩何慚董仲舒只合三緘且鉗口一蓑歸去伴樵漁與楞珈老瑛上人勿謂年來世道艱都緣彼此不相參一生知已有千萬十事從人無二三紅杏無壇堪拱北白蓮有社結和南扁舟若有東歸便斷竹枯松寄一擔呈王子蒙隱者國士還須為國憂肯同兒女作身謀存無補世亡無異生不驚人死不休秦鹿須還屠狗逐楚猴猶為爛羊羞如今若論西都事却與中唐風馬牛夜讀離騷楮衾封冷白凝霜展轉無眠夜未央風欲送愁先卷帳雨嫌多夢故敲􅐼自慚鼓瑟投齊好謾接歌輿效楚狂起把離騷讀幽悶楚詞還似楚江長倪尚書生祠駕兼領都事四戎兩院淹禁數百人因思先生不折翠微以丙寅春被命南下建安守王君告老别謹以五十六字汚壁折復至此自惜其下文不早辨也聞説先生入建都一年民樂吏清癯四廂夜月封朱户兩院春風鎖翠蕪一旦有書追駟馬萬寃無計徹羣烏焚香再拜祝公壽問有清朝賞罰無秋晚述懷呈薛子長一甕香醪一曲琴淂相尋處且相尋杯寬却怪青山小坐久不知黃葉深當路星軺已鉗口異鄉風物更關心何時繫艇秋江上醉卧蘆花雪滿襟雙桂堂月姊親移入慶門廣寒今是並肩人分他蟾窟雌雄種作我螢􅐼南北鄰傲竇雖慳三樹玉比詵翻剩一枝春主人便好鞭黃鵠斫取魁梢謝紫宸憶弟妹别來三載客東南始信人生聚首難眼底不聞鴻鴈信鼻頭常為鶺鴒酸問天不語語徒厲驀地上心心類剜安得春風吹馬首卧聽行列報平安責逋索逋無術謁公門豈謂公門反愴神令尹幸酬三百索癡兒猶戀一千緡如今縮手方知錯自此甘心莫怨貧不是恩波不旁洽五窮無奈苦隨人刳腸植粟餧官牛牛骨成塵粟未酬何事蓮參猶閣筆反憐花縣若虛舟季公素重千金諾膠鬲當貽萬世羞願勤相如還趙璧莫教顔色嘆床頭送趙右秋梅花飛雪滿霜洲洲上行人去莫留蠟炬結花催管籥堆聲喚客上蘭舟莫嫌氷炭情難入自是薰蕕味不侔執節從教少知遇勿于世路學沉浮閩藩齊指右參軍玉骨清無半點塵一味恤刑常召禍十年遊宦只憂貧圜􅩪月照金波夜寒谷花開玉樹春客子與君雖素昧一詩聊記子張紳牢城言懷重城不隔世間塵箇裡無花别有春寃鬼夜隨風雨泣病囚時作犬羊呻雷霆不霹欺君賊彗孛偏凌為國人欲問老天天已老料應無説為敷陳贈楞珈老瑛上人無聊斷梗撥寒灰門掩霜風客自推急下火壚叉手接便將布袋解頭開拂床展卷呈詩藁炙盞分茶當酒杯别後逢人須問訊楞珈曽倩寄書來謝仵判院惠米溝壑膏粱總自招仲尼陳蔡亦囂囂不逢魯肅千囷指空折淵明五斗腰孤竹二飢知我意蒼梧一飽為君謡從今隻手摩挲腹却向顔門問一瓢除夜大雪青帝明朝下玉京先教滕六掩車塵梅花笑我三年臘椒葉爭他一夜春烏角觸簷鞭墮玉馬蹄印路碗拋銀何當夜縛吳元濟去作中興社稷臣呈毛南仲好賓客有鄉里之譽巨出江水過門南仲求見有折南仲之居名曰沙坑在松溪浦城之間南仲賢者日而别作詩南仲感謝折終夜之欵呼二子聽琴翌暮宿東溪一草堂􅌒和衣屨卧胡床夢隨鵉去遼天闊夜到雞鳴剗地長早起不須禽為喚多憂誰謂草能忘清間却愧毛南仲醉卧西忩一枕涼除夜二首才辱東皇造化工便隨飛鵲報簾櫳人間狴犴知無所天上蓬萊還有宫酒色半澄春後緑蠟花全折夜來紅從今泰道能連茹願駕蒼蟠躍震風吳鈎不是怒鯨鯢夜半劉琨屢舞雞十載載春遊大學二年年夜宿圜􅩪楚盤未必資毛遂周粟如何飽叔齊塵世功名儻來爾無言桃李自成蹊呈富大卿以詩示之卿為感嘆垂泪折大卿名琯鄭公六世孫詣獄司晨未曉報龍樓昨夜中天貫索流石父不逢齊子相馬遷空作漢家囚銅壺滴碎短長夢鈴索拽翻新舊愁安得君王賜歸騎一㕓投老大江頭雪中呈劉子沖朔風卷水入天渠剪作飛花散六虛竹本無聲緣葉密梅因有影怕花疏路從玉鑑上頭過家在氷壺裡面居欲作一詩撩謝女不知為况近何如雪中有戲桐柏栁元用賜書以寄之折是嵗有神馬坡樊城之後辱一夜風神揭海神盡將純素掩丹青四圍白壁成千嶂萬里紅塵沒一星搭岸柳條橫玉帶壓墻梅蕚上銀屏好將今日平淮䇿説與當年李訴聽憂世寄清溪友人廟堂無計息干戈國士􅋦寃未汨羅尺五指天均日月八千里地舊山河人無逺慮心徒切里有新喪巷不歌况是十年芹泮客倚闌尤覺泪滂沱嘲曹掾友人世態年來日日新宦途澆薄更驚人闕期動徹連三政選調無疑費百緡是吏有囊盛短卷非財無藥療長貧參軍也勝陶彭澤且糶官糧醉幾巡囚中記貧和方思索間同邸有陳子昭者語折翠微在西關有客送僧字韻詩求間和尚之語就𢋫其韻折及世故渠有志公不是英雄不遇不憂貧獄吏從教喚不應煮飯只燒沽酒罐讀書權借守囚燈堪嗟世事危如卵無怪人情冷似氷勿謂功名成幸致志公終不是間僧送倪尚書歸霅川筆麟圖鳳久無聲何事權輿復見今魯祭不因天子肉齊卿難奪孟軻心我公去就何為重吾道興亡所繫深安得斯文天未喪載歌狼跋繼遺音五言律詩宣城道中間韻折次壁折石湖宣界地名躍馬上宣城千山翠欲顰蕙風輕卷舌櫻雨細沾唇柳絮難驅臘榆錢不買春何如澆一斗爛醉石湖濱當塗道中春晴不慷慨十日九清隂蝶宿花留粉鶯眠柳借金胡塵方障眼漢壁尚關心醒去愁無奈杯行滿滿斟壽昌道中次韻折别劉仲方山斷疑無路林開覺有村飢牛戀茅壠吠犬護柴門悶去詩千首愁來酒一尊明朝南去路懷抱與誰論别王泰之風神戀行客吹柳纒簪纓傍水鳥多白近山蟬更清别腸雲閣泪歸路月關情告德無多日清觴聊一傾遊溪西寺寺覺重遊好僧期後會賖青蟲雕病葉白鳥篆平沙水瘦石生齒山寒梅未花功名今有待且謁惠公茶登樓晚望疏雨洗空碧晚晴人倚樓稻花千頃浪楓葉一簾秋逺岸明殘日孤村認小舟溪山如愛我相見亦回頭安分呈李竹齋韻折次風雨思君子煙霞憶舊遊一區山水國萬里帝王州臘甕香浮玉春旗雪滿甌安貧隨處樂此外復何求拜茶城則率百官之折漕建者貢茶于京北苑春將半星槎欲奏功杵鳴千臼雪鎗卷一旗風盝錦鸚毛翠簽羅象眼紅封成拜玄寉飛上紫微宫邸食責庖者者不善治食折建安邸中㸑陋邸已無味庖人更不材盫炊全做粥燒鮝半成灰添醋酸綿齒研椒辣木腮何時聳堂臠香霧靄樽罍秋意禮韻折次項子木剪空山瘦西風掃落黃荷殘簪失盍菊老餅還香詩盡尤濶愁多夜更長悶懷無處著隨雁落瀟湘書堂遇雨者盈軸近承菊峯送至𣸪自𢋫韻折翠微向有書堂遇兩押承字韻和風疊雲成片溝搓水作層濕書移案避添硯就簷承瓦擊聲疑雹􅐼低暗欲燈須臾西漏日晴意慢勝翠微南征録卷之八
