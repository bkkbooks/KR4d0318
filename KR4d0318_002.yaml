front:
  text: 翠微南征録卷之二古凨
  hash: sha256:b4d75510c094b1286e40c677918d585d237c5887af99a887bb74359cefe2c65b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_SBCK_002-1a}
body:
  text: 歸釣吟我生本是絲綸客嘗抱絲綸釣王國膠庠雖識姚有虞載車未遇周西伯抱琴歸去古江邉江頭凨月猶依然江凨刮岸岸如削江月照人人未眠沙平浪靜江天闊換酒捉魚魚撥剌有時醉碗和月吞有時醉棹和煙撥或唱歌或吹笛欵乃宫商人不識歌聲喚徹煙水寒笛聲清透雲霄碧不張帆任渠去去到雲山深處住雲山深處有畫圖添箇雲山畫圖侣不撥棹任渠流流入玻璃影裡頭玻璃影裡迸珠玉千斛萬斛誰能收􅌒時眠醉時舞漁家自有神仙府睡時蝴蝶夢莊周舞處鷗鳶奏韶武自舉歸釣吟清江漠漠煙沉沉雲藏萬􅊤暗水尾風吹孤月搖天心翠微父翆微父和我行歌進南浦畫橋流水抹晴煙殘照暮霞收宿雨水連天天似水一簑活計誰能比楓葉飄霜鱸鱠香楊花飛雪河魨美也不學薑太公百年將至方非熊會須年少遇真主恢我諸夏車書同也不學嚴子陵雲臺不為魁殊勛中興只作釣臺侣胸中百萬知無兵我網不似漢漢網何太踈也曽漏却吞舟魚何當周密如樞機直欲􅊏悉皆無遺我鈎不似吕吕鈎何太直除却文王有誰識爭如猛曲一彎腰牽取星珠并月璧魚膠寒齒蒿剔蟹螯刺指和籠烹屠龍飪鼎口不美斷鯨斫炙腸聊撑記夢來長空明月殊動故鄉之思目成記夢折秋夜宿客邸劇夢為無槐大庭之遊覺溪冷冷零折音鼓􅕣􅕣虗堂淅瀝生寒風寒風綽我夢魂去飛揚直上蓬萊宫蓬萊宫殿女如玉霓裳羽扇環簾櫳月娥留我宴珠翠玳筵間列花叢叢酒酣萬象羅心胸舉杯話别殊匆匆青鵉命駕下空濶一聲璫珮鳴丁東𬒳衣起坐周四顧庭户悄悄無人蹤銀河萬里倒澄碧氷鑑半輪斜倚空橫江孤寉一聲唳喚起鄉心千萬重梅次壁間韻折椘東道中衰蘭枯荷了秋色幾向寒梢問消息溪橋交馬斷腸時翠袖隹人日暮歸玉靣亭亭漢宫樣一見凨流慰心賞寒標孤絶太無情誰為移春上玉京月華凄切霜華白夜半飄香度簾額寄聲橫笛且休吹愁殺江南未歸客山水吟閩之山峨峨可以接穹蒼閩士孕其秀胸次尤難量閩之水滔滔可以燭妍醜閩士生其間其美不容口君不見周家社稷生甫申嵩嶽當年曽降神又不見千里秀氣鍾三蘇眉山草木皆焦枯我生恨不由河洛虗負三光并五嶽地靈人傑推江東人物凨流兼磊落顧此閩之東自古多英雄求其為絶稱獨一忠穆公公今已即丗後丗誰可擬惟有詹仲通一人而已耳仲通何如人景星與鳳凰不險亦不深山高兮水長浴出浴覆衣淂詩筆以記折十月暇日醉于生春閣暄􅋵龍藩地暖冬無雪十月凨光似三月好凨不動綺羅塵人在繡幃簾半揭酒腸拍索能回春春潮入面香熏熏香肌汗透披縠紋思淂滄海驅埃氛銀鍋蟹眼生春雪銀瓢棺破鍋心月流霞傾入碧琅玕香霧氤氲雲半掇花藤織出金芙蕖煙青霧紫堆雲衣一聲璫珮簾鈎垂皂􅐻捧出雙明珠蠟花照入蘭湯閣珠璣體迸紅猊活鳳豁雲濤濯錦毛龍翻雪浪澆銀甲起拏裙霧圍春凨胭巾抹出桃花紅香泉入齒潄寒玉吐作氷雪飛長空蒼頭急把春衫換腕玉輕穿雲一片出門兩腋生清凨月在嫦娥廣寒殿嘲熱南方有神名祝融髮赭面丹唇朱紅執鞭入海驅赤龍火車勒駕燒長空千驂萬乘如聫轡烈焰騰騰灼天地九霄烜赫皆甑蒸四海煎熬俱鼎沸流金爍石氣不通天下俱在紅爐中葛衫襟濕疑有雨羅紈柄折渾無凨祝融祝融母太酷天道炎涼嘗反覆看看少皥催戍瓜盡把涼颷散煩溽釣鰲行舍人名嗣古折上提刑左史張北風浩蕩滄溟闊十萬軍聲夜潮聒翻空濁浪鼓雷霆舟子停蘭面如血龍門有客何猙獰弩目張膽殊不驚桅檣破浪裂津島直欲一舉空蛟鯨我之釣兮非丗比新月為鈎素霞綺先拗虹霓為釣竿却把鵾鵬作香餌欲垂未垂號鬼神星斗無光天地昏海靈乞命免生死一鈎連六酬銜恩我公萬里凨煙伯度量汪汪寰海窄蟠胸高聳蓬萊山壯氣直吞雲夢澤恩波萬壑奔洪流凨帆浪楫交觥籌金鱗照日巨如斗四海觸物無虛舟我生本是釣鰲客几嵗灘頭望風色忽聞霹靂破崑崙便整絲綸駕航舶我今十轄迎公開會須舉手生風雷不然長嘯謝水府明月滿船歸去耒上趙漕僉京弟子赴南宫文未上也先折名善宣喬松弟子見先生也先生尹由先生之境而不拜先生弟子罪也見先生折生每而進之舉而送之豫既德先生矣今道潔雨露清秀松德也亦先生德也萬木遜節折而無一言以寓其願見之誠亦罪也風霜髙氷霜亦猶先生之不畏彼強禦也松之詩所折三友同升松事也亦先生事也松之不畏于弟子耶其罪弟子耶折由作也不識先生其哂太山之巔有喬松凛凛千丈摩蒼空風雲有會直相際轟雷掣電蟠蛟龍􅐻根錯節真天種卿月郎星伴辰拱髙凨蕭瑟涕清泉桃李無言漫丘壟南宫仙桂饒天香南國蔽芾歌甘棠大枝擎天作砥柱小枝駕海成虹梁六月無風天欲雨赤龍銜火燒空宇亭亭橫蓋指扶桑萬􅊤千崖冷無暑大椿可笑欺莊周便指千嵗為春秋使民若戰夏后社以松折夏后氏用汝當作商川舟松舟折檜楫自慚藤蔓纒林壑未遂鷦鷯一枝樂􅐻桓已喜跨髙寒而􅐻桓折撫孤松更借扶搖薦雕鶚我聞處士方綢繆處士折七松三友簡在公寧留蒼姬已託大夫蔭封折秦夫折為大赤子願陪丞相逰松子逰折子房從赤鄰女㮻綿吟一二縷僕向嘗見撚綿紬者于此折建安西關鄰女善㮻木綿日可成因問女嵗可成几端女云每嵗可淂二十匹折頗類然就手中提出便紡成絲與撚綿特異其半因成鄰女搔綿折近以繡工妨迫不及間窗日上三竿竹􅐼下嬌娥整輪輻匆匆未暇理雲鬟半朵青鴉倚紅玉青梢摘盡銀香囊畫欄平倚斑筠筐時將纎手翻雪霜蘇胸玉面同光􅉭捧歸細􅐈銀成索牽出鬆鬆雲一握珠唇呵挺氣溫溫鸚觜踏車聲絡絡今年莫怪功績稀阿妳勤繡鴛鴦幃如今織出秋江練十月正好裁新衣客心聞此愁無著一夜清寒動寥寞明朝為問買一端剪做道𫀆披落魄送商府判入為審計折自劍津倅比年十月君𥘉耒梅花破雪迎君開自從佐劍壽民脈凋山瘵水皆春臺去年七月君開府燕燕鶯鶯為君舞五日盡蟄潭底龍千里應無市中虎今年二月君將歸凨牽回栁縈君衣君衣不作回栁轉直上雲端朝紫微紫微有館名西掖珠玉羅鈿瞰金碧郎星卿月謾徘徊箇中自是神仙宅紫微有山名大坡烏飛豸立冠峨峨一聲霹靂震天地萬里腥血流江河紫微有旨垂丹册二者于斯請君擇便須東取元化鈞談笑從容正疆埸君家事業銘冠裳鵉鳯指日鳴朝陽伊洛諸公有政事洙泗諸子無文章稟違展轉情難處溪上恩波湛今古東風吹恨入長亭零落桃花泪如雨平政橋為天下第一折水西有橋建水合流三百里直下冨沙如撚指溪東披拽纜過西千丈春風怒濤起香輪不解碾清江造舟貫索成河梁年年麥熟梅欲黃連城十里皆波光淳熙太守憂溱洧問津日夜思無計老農義手碩鳩工疊石中流便民濟金珠賣價不計緍鐫瑕斷梓功方成功成燕雀賀新屋炳然萬棟輝丹青插天螮蝀橫江尾下􅐦寒潭碧無底市聲不到畫梁間秋色盡歸朱箔裡我行一月無風波今朝醉眼翻青羅金鰲背路客揮鐙玉虹跨浪舟飛梭石唇噴盡寒崖雪雪中電掣金蛇赤兩岸樓頭將相家八州車馬神仙客人言辟人推政平故此特以平政名我聞政事平如水水到不平還作聲贈陳道人畫出錦軸求詩折道人陳守一喜君不見樵人王翰畫山水一夜風雷揭􅐼𥿄又不見長沙洞清畫尨蛇滿軸煙雲翻橪指二子相去數百年筆端妙意誰能傳雙溪道人何所授一見筆法堪齊肩筆一淡輕煙映出垂楊岸逺山依約有還無斜照不紅秋水漫筆一濃黑雲萬疊翻狂凨江天日暮暗煙靄天地星斗皆昏朦瀟湘詩人不解語𬒳君吐作無聲句何時覔取綃一縑寫我英姿伴煙雨柴氏節婦一樽酒義士拜而受義士一首詩節婦雙眉皺眉皺意何如有難難相救嘆我廊廟器淹回在汚陋惠我旨且嘉殷勤推意厚吾今繫閩建家貧喜鄰冨青眼到朱扉白屋成華胄吾聞孤竹子周室三緘口又聞杞梁妻秦邦稱烈婦此輩誠間生世代不常有如何天一方同時俱輻湊愧無八品珍草草具籩豆何當再拜摳我衣巵酒恭為兒女壽傷春衣𬒮怯春寒春在江南岸我意正傷春復𬒳春縈絆一雨胭脂􅊜萬壑氷澌泮撩我惜春心與春傷爛熳栁垂不染絲織成愁一片杏吐無煙火燒碎腸千斷憶昔腰如栁栁腰輕易按憶昔面如花花面嬌難喚人不似春芳隨處得看玩因春憶人人不見徒扼腕何時醉臥花栁中一笑千金不容換百舌為烏秀折福建號流鶯一去無消息燕怯春寒歸未得緑􅐼清晴靜無人似把衷情訴知識上苑東凨二月春淡黃楊栁𥘉成隂解將一片無情舌學盡百般能語禽紅英紫蕚紛如雪萬姹千嬌總饒舌莫嫌花外太啁啾默默難酬好時節須臾緑暗紅亦稀伯勞杜宇鷹鸇飛更兼獵弋恣羅網卷舌不語全毛衣堪嗟國士徒切直不似幽禽明語默何如鉗口歸山林莫問燕南并越北飲仙閣小峯王泰之作堂曰傾蓋作閣曰飲仙廊廡瀟然有物外之有所得者以樂其身其泰之之謂乎因作詩以晉歲月槽頭􅐦盡春山緑槽下真珠㵼醽醁騷人一笑傾杯􅐻滿面春風漲紅玉少陵淂此不欲言乃指八子為中仙主人傾蓋慕此意一閣新構堂西偏于今丗態薄于紙何必勞心問青紫願君醉我金屈巵萬事過耳同風飛醺醺和月上裁竹長嘯一聲歸翠微贈祝跛武夷人折相者祝跛我生多蹇難事業冷于水內外兩五行醜惡諱人舉武夷有跛者抱術遍荆椘摳衣忽趨隅覿面便相許搖手無所需再拜拂毫楮一詩聊贈行無以壯箱筥他時了功名為結煙霞侣冨沙道中述懷玘韻折次王伯敗鼓非全材毁瓦不自牧造物兒未戲達人火先撲卜不到渭濵人徒嗟海曲彼哉真彼哉伐盡牛山木驟雨壁間韻折次紫溪牛尾烏雲潑濃墨牛頭風雨翩車軸怒濤頃刻卷沙灘十萬軍聲吼鳴瀑牧童家住溪西曲侵早騎牛牧溪北荒忙冒雨急渡溪雨勢驟晴山又緑翠微南征録卷之二
