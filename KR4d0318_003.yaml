front:
  text: 翆微南征録卷之三
  hash: sha256:2bbc70bebd2b2e06509001036b67b2ee0dc12df47febf7af8a13a5290fd666d9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_SBCK_003-1a}
body:
  text: 古詩别王泰之正韻折次王飬黃塵漫漫小峯路白石齒齒茗坑渡相亭南耒第一程人煙蕭條歲云暮故人小隱三家村約我旗亭聊一樽相逢此地復相别明朝懷抱同誰論江上雙舟催發前帆凨飽江天濶後帆半出踈林闕後帆招手呼前帆畫鼓輕敲總催發前帆雪浪驚飛湍後帆舵尾披銀山前帆漸緩後帆急相傍俱入蘆花灘島嶼縈回斷還續沙尾夕陽明屬玉望中醉眼昏欲花誤作間􅐼小橫軸慰吳吉甫縣尉女皆死焉所可免者渠夫婦折吉甫縣尉有橫逆之難兄嫂詩慰之折而已作子針如京師一室膏鼎臠兄室雖𬒳戕一妻猶可免伯奢事行役八子俱蹂踐兄家禍雖劇一女特婉孌女死固可傷殊未敵冠冕妻在固全軀喪女憂莫遣大厦既灰飛豐儲皆席卷鶺鴒起嘆嗟鵉鳯徒展轉我昔以難動荷兄垂勸勉兄今以難告倍覺泪淟涊泛觀天之理禍福嘗相反有難既不死他時非淺淺去兄一牛鳴為地良非逺不能見兄慰面目實有靦自料吾與兄氣量及者鮮胡為蒼者天與子獨羈蹇贈劉相士班超未侯漢誰識烏孫客韓信已王齊誰知長樂厄彼亦非異術忠諛分黑白直道丗且違彼亦何足責自古勳業人把鏡惟自索顧我灑落資足可振翰翮如何汗馬秋英雄尚南謫祗應捻胎鬼手假不合格古括子劉子閲人幾千百一見麞鼠質便許正疆埸知子忠且諛愚固未暇擇萬一符子言亦可名簡册它時雙蹇驢與子訪黃石誚胡同巡回見僕坐城旦之地遂不相過以折同巡名瑾向與嶽最善忽自潮陽之折詩誚嶽昔遊時卿兄嘗過弊廬捫心論事業耐久良非虛嶽今隸城旦氣象誠慘舒髠黥塞糞壤敢辱長者車嘗聞古人交窮逹無親疏冨貴不相忘有終還有𥘉與兄三載别無日不引裾中間喜一見欣慰云向如相去天一涯雲濤疏雁魚忽聞夙駕回喜色喧門閭相聞即相别厥意良躊躇嘗聞郢中人結客于樵漁又聞淮南王受德于刑餘嶽既不自檢失身墮籧篨壯士視一死其猶爾欷􅒣勢分已霄壤孤托難相于願兄此召還巍然奉中除前巖與西閣談笑看連茹或遇趙可父為嶽聲起居薰凨有良便當拜平安書送詹仲通縣尉秋郊送行色執别臨清流凨神掣回栁故故牽衣裘吟螿附草際催客登蘭舟問客何所之駕言京闕逰愚聞京闕間多難三春秋閫外炙魚肉闕內羅羊頭鼎却吠堯犬冠還沐椘猴和戎重輸費廊廟有隱憂賑荒少儲蓄郡國無良謀飛蝗蔽日月兆龜拆田疇君以經濟材抱負衝斗牛家傳醫國祕殊不諸子侔有用即降平豈特為東周碩君開冕旒管折攄緒餘咳唾領一丗雄克復歸神州賤子忝知遇脫網將從遊相隨上凌煙也勝登瀛洲作詩告于君君其許之不上詹仲通縣尉木少見肺肝兾叨燭電之私但折某龜雀蒙恩犬馬誓報譬諸草之耻折劇布雷松竹不著花密葉徒如帚江梅不藏葉寒花綴枯朽獨有尨焙茶花葉秀而耦氷霜著群木凍死十八九惟此百草靈名可綴三友春雷迸雀舌夜雨滴尨口皆萌哺啜心誰假栽培手惟有蔡端明識之在蒿蔌移根入北苑金碧煥星斗夸作尨鳯團封成獻元后門花何以報牙舌甘鼎臼他時子𣸪生為公滌繁垢西凨卷荷衣破破不成幅清霜折蕙囊冽冽已成蓿如何獨東籬黃華笑寒菊物之有盛衰循環若推轂丗事良亦然亦豈物所欲金鈿鎔落日零露灑寒玉人皆惜芳菲誰𣸪念幽獨惟有陶淵明殷勤費培沃簮花從帽落撚酒醉商陸從此擅秋芳芙桂非同録問花何以報剪首薦醽醁他時更粉軀為公明采目寄大庾郭縣尉前年建安然始識韓荆州一見辱知遇許我嘗從遊尋幽訪赤壁買笑陪青樓有酒即命駕夜飲忘觥籌雪香飄梅花歸駕仍遲留送君城北隅歲事希一周告德雖未久有懷奚所投客來自錦溪知為藍田逰摳衣欲趍隅其奈凨馬牛方啚拜尺𥿄文此不敏羞乃復三不緘獲戾于君侯謫客干典刑冝爾餐吳鈎幸不畀我死殘喘延俘囚搜索編中外釋縛良無由始思鵾鵬翼庇我反手猶噓燈拂毫楮尺素馳星流荷公三復還惻然添我憂許我京闕間與我為良謀于今秋𣸪冬俟命猶置郵西凨掠天宇魚堆俱沉浮未審恩波中許我共濟不我材襪線短願公廣甄收他日賔幕府鏖戰當焚舟公兮不我援復駕言焉求嚴陵方市嚴韻折次方子浮雲掃盡天宇清千花萬花開錦屏好凨吹皺一池緑白鳥點破千山青客行五里復五里兩眼丹青間紅紫杖屨不知行路難人在江南圖畫裡月岩酒論詩拍掌擊案自謂淂句且對嶽自折己巳春道廣信夜宿月岩邸中三客酌因思月岩為山甚異午夜月出于岩之中折侈云我輩嘲凨詠月自有所淂勿怪狂妄之所以異詩之所由以作也然壁間集上折桂影于月之上月有小大桂有廣狹此山偶三客出天蟾字韻索筆和之三客頓首折留詠萹章無慮千萬求其絶稱蓋亦鮮儷以留嵗月折謝罪特疥壁六丁一鑿空雲煙滿窟勒駕驅神仙氷輪推出月中月玉斧劈開天外天便把嫦娥騎綵鳳却呼羽客烹銀蟾更􅌽王母瑶池酒今夜廣寒同醉眠熱中呈椘南僧未應折時雩禱帝炎執鞭驅赤龍火車萬乘燒長空長空萬里俱藴隆流金爍石天地同我耒亭亭日當午欲避驕暘竟無所願求一灑楊栁枝化作東閩萬家雨送春山仍次其韻折約友人李景留春無計奈春何九十過眼如飛梭三分二分凨雨爾十日九日愁悶呵凨前飛絮政無數雨後落花全不多爭如買酒速相就君自起舞吾能歌僧畫叔珍欲增其價求一轉語于軸角折王叔珍所收十軸乃政和僧人所畫萬景峯前老禪叔搜羅凨月歸岩谷胸中有句吐無聲寫作生綃三四幅賀趙法曹幕後兼漕僉折趙可久入郡紅日轉簷花飛鳴一聲鵲鵲翅未離簷有客拽鈴索呼童急啓户問客意何若客聞笑而言法曹參計鑰因知鵲之鳴報我良不惡知我門下人一揵聊相託如公材器大末掾豈能縛咫尺蓬䒹宫左右芙蓉幕直入鳳凰池更上麒麟閣賤子無所需願作楊州寉野菜吟芙蓉峯下楊雄宅路入城闉里三百有山無粟飬雞豚有水無人捕魚鱉山翁菜色流清涎齒頰連月無腥羶客來問我何所有手指萬􅊤煙霞邊青芹不似蘆蒿美石芥防凨空剔齒蕨腦才抽稚子拳蘆牙已迸佳人指兒童不待明朝陽花襟路􅊜爭荒忙携籠拍塞貯不盡歸耒滿袖春凨香攬衣踏破青銅鏡挼動碧雲流一徑漉歸銀鼎作波濤無限春工上􅐻飣酒歌南陵名英折謝同舍葉嘗聞子美清江曲日典春衣耽美醁又聞太白逰長安市上熏熏醉眠熟凨流國裡太平時處處紅樓漾酒旗王孫公子恣行樂繁絃脆管相追隨誰知寥落天涯客笠頂清凨秋挑月􅉭鞋踏編山水雄奮身欲入黃金闕方嗟蕭索向西園刮面寒凨雨漲天回頭忽喜黑衣至擊破紅泥傾數船雖無皓齒歌金縷也掃新詩狂欲舞兒童拍手笑攔街應怪吳儂喜如許長江波浪卷銀山去去仍悲道路難只􅑀一醉進未得更借髙凨吹片帆寄敬甫葉兄歲次丁卯秋八月既生魄于時謫建安脫去未有䇿忽覩星鳯光慨然陪履舄自謂入閩建閲人几千百間有知功名所見復邪僻否則苟利祿鄙猥何足責星次幾一周幸我安且懌嘗觀義與利更相為損益欲論古人交二者請君擇不惟眼獨青且要心同赤此身可虀粉此道不可易自料吾與君造物難棄擲胸次蓬䒹山襟懷雲夢澤未説詩書帥休論文章伯坣坣大丈夫詎可虛竹帛但恨不振蹤尚此多扞格在君當先登挽回二千石飢溺切君身推解過疇昔炎涼無異心始終無異迹庶幾吾二人交情可全璧記夢足跌因記諸低折夜夢牛入室角折夜漏徹三更夢牛入我屋有角斷而懸有足折而縮驚覺細思量讖有何禍福兆者事之先形者心之屬事既兆于心夢乃形于腹入屋牛有蓋為牢事刑獄吾今尚縲囚其應已桎梏體具牢方具無足牢不足不足意無他示豫可脫輻去蓋只論牛其義尤可録牛足不下垂淂一生可續牛角不上橫淂某去何速一旦忤君心吾罪當何贖生去氣橫秋凨馬不相逐下裂輿地圖上應周天宿峥嶸挽萬鈞其始播百穀身雖在籠檻志不徑溝瀆寧戚不吾歌丙吉當吾哭安淂如齊王過坣憐觳觫琴籟鐫二十八字于底折翠微淂雷霹材斷曰天月浸虗坣夜氣清起聽萬籟寂無聲輕輕拂動匣面塵玉笋不彈風自鳴苦蚊四壁人聲絶榻下蚊煙滅可憐翠微翁一夜敲打拍翠微南征録卷之三
