front:
  text: 翠微南征録卷之一
  hash: sha256:0fc177a47b20f43899f11e27d24bc9ab16aa58fe64b53f647efd18b978236242
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_SBCK_001-1a}
body:
  text: 書開禧元年四月二十七日上皇帝書四月吉日國學發解進士臣華嶽謹熏沐百拜裁書獻于皇帝陛下臣聞職諌諍而不言有罪非諌諍而輒言有誅臣以一介草茅誤叨教飬非敢僣以求狂妄之誅誠以天下之大變將形國家之大禍將至有職守者不敢言無職守者不敢僣臣于此時不能剖露肺肝控告君父則不忠之罪不惟不逃而臣之身首將異其處雖有粟烏得而食諸臣自旬月以來都城士民倣徨相顧若將喪其室家諸軍老小隱哭含悲若將驅之水火闤闠藉藉欲語復噤駭于傳聞莫曉所謂臣徐考其所自則侍衛之兵日夜潜發樞機之遞星火交馳戎作之役倍于平時郵傳之程兼于疇昔乃知陛下將有事于北征而為軍若民皆如是之皇皇也臣嘗聞之夷狄之于中國猶盜賊之于四民螟蟊之于五穀可謂不容並立矣士生斯時正冠履之分雪祖宗之仇掃山陵歸宗社所當講也然臣考之天時按之人事蓋有大不然何者古之為夷狄者一今之為夷狄者五古之為中國者一今之為中國者三夷狄中國之皆多于古也夫托胄以后族之親位居極品専執權柄公取賄賂蓄飬無籍吏僕委以腹心賣名器私爵賞睥睨神器窺覘宗社日益炎炎不敢嚮邇此夷狄之居吾腹心者也以庸瑣之資請姻師旦驟入政府以諛佞之資阿附托胄致身顯貴陳自強老不知恥貪不知止私植黨羽隂結門第凡見諸行事惟知趁承托胄一人而君父之不知有以保正耆長之材而鈞衡天下鼎鼐四海此夷狄之居吾股肱者也爽奕汝翼諸李之貪懦無謀倪僎倬杲諸郭之膏粱無用諸吳之恃寵僣專彭之庸孱不肖皇甫斌魏友諒毛致通秦丗輔之雕瘵軍心瘡痍士氣以至陳孝慶夏興祖商榮田俊邁之徒皆以一卒之材各淂把麾専制平日剜膏刻血苞苴托胄以致通顯飢寒之士咸願食其肉而不可淂萬一陛下付以大事彼之首領自不可保奚暇為陛下計哉此夷狄之居吾爪牙者也之納妾求知之售妹入府之獻妻求閣之貢子為郎之阿諛僕隸之甘心鷹犬之庸駑充位之奴事姦惡之生事迎合之私立異議此夷狄之居吾耳目者也蘇師旦以穢吏冒節鉞牙儈名爵周筠以隸卒冒戎鈐市易將相此夷狄之扼吾咽喉者也吾之腹心吾之股肱吾之爪牙吾之耳目吾之咽喉而無非夷狄則彼之所謂夷狄者實未足憂而此之夷狄蓋已周吾一身之間矣詎可捨吾身之夷狄而徒事于邊鄙之夷狄耶禮樂征伐自天子出所貴乎中國者皆聽命于陛下也今也豫奪之命黜陟之權又不出于陛下而出于托胄是吾有二中國也命又不出于托胄而出于蘇師旦周筠是吾有三中國也夫虜人以一夷狄而猶能據吾之中原曽謂其有五夷狄而不能蹙吾之元氣乎虜人以區區關河之地猶能逼我淮漢曽謂夷狄之居吾腹心居吾股肱居吾爪牙居吾耳目居吾咽喉而不憑陵吾之宗廟社稷乎以一中國而撫四夷猶曰不可曽謂一家之中自為吳越一舟之中自為敵國而能外制夷狄乎比年以來軍皆掊克而士卒自仇其將佐民皆侵漁而百姓自叛其守令家自為爭人自為戰此又啓吾國中億萬之夷狄也今陛下不務去吾腹心股肱爪牙耳目咽喉與夫億萬之夷狄而欲空國之師竭國之財而與逺夷外戎相從于血創相塗之地顧不外用其心歟臣自丱角以來推衍三式之書自去嵗上元甲子五福太乙𥘉度吳分四神直符對照荆椘始擊蜚符旁臨甌越青門直使交次于幽薊黑殺黃道正按于燕趙考之成法主算最長客算最短兵以先發為客後應為主自太嵗乙丑至丙寅丁卯戊辰已已庚午六年之間皆不利于先舉儻其叛盟犯義撓我疆埸至于事不獲已然後應之則反主為客猶曰庶幾萬一國家自首其事自倡其謀則將帥內暌士卒外叛塗炭萬民血創千里其為應驗速若影響此天數之不利于先舉也億萬之夷狄乎吾之國五者之夷狄周乎吾之身將帥庸愚軍民怨懟馬政不講騎士不熟豪傑不出英雄不收餽糧不豐形便不因山寨不修堡壘不設吾雖帶甲百萬運糧千里而師出無功不戰自敗矣此人事之不利于先舉也湯武革命應天順人黃帝征伐天時人事臣願陛下誅吾腹心股肱爪牙耳目咽喉之夷狄盡其群黨而勿疑其濫異其身首而勿疑其慘吾國中之夷狄既已誅矣然後公道開明正人登用法令自行紀綱自正豪傑自歸英雄自附侵疆自還中原自復天下自底于和平四海自躋于仁夀何俟乎兵革㦲不然則亂臣賊子毁冕裂冠哦九錫隆恩之詩恃貴不可言之相私妾內姬隂臣將相魚肉將士塗炭生靈墜百世之逺圖虧十廟之遺業陛下于此雖欲不與之偕亡則禍迫于身權出于人俯首待終何臍可噬事之未然難以取信臣願以身屬之廷尉待其行軍用師勞還奏凱則馘臣之首風遞四方以為天下欺君罔上之戒儻或干戈相尋敗亡相繼夷狄外攻姦臣內叛與臣所言盡相符契然後令臣歸老田里永為不齒之民實出天地父母生成之賜干冒天威罪當萬死不備嶽百拜翠微南征録卷之一
