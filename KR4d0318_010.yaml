front:
  text: 翠微南征録卷之十
  hash: sha256:02f8c914e84604fc01739835c5ef9ba6bfd85567f581f3b4dbe944cac0d7b432
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_SBCK_010-1a}
body:
  text: 七言絶句白面渡不曉白面之義因詩其事折在池陽之西五十里村人皆繫船白面問溪翁名不虗傳說未通秪恐當年溪上女浣紗時節懶勻紅田家十絶十幅生綃一墨池盡收好景入屏幃㑹須少緩丹青筆更倩牧童橫笛歸其二農夫日炙面如煤絲婦繅成雪一堆早早安排了官稅莫教耆長上門催其三老農鋤水子收禾老婦攀機女擲梭黃絹已成空對喜納官還主外無多其四雞唱三聲天欲明安排飯碗與茶瓶良人猶恐催耕早自扯蓬􅐼看曉星其五緋袴青衫紫繫腰攬衣隨過水平橋雖然不識風流事也向人前學逞嬌其六村獒奮迅出籬笆欲吠還休喚可拏不是忘機太馴狎那回曾宿那人家其七畫眉無墨把燈燒豈識宫粧與翠翹堪笑東風也相謔暗牽裙帶纒聲折去人腰其八臠魚炊糝作荷包宿飯無湯暖酒澆放碗出門行一匝小溪新漲已平橋其九麥飯瓜虀及早催田夫雙眼望儂來油鹽不倩傍人帶日午癡兒猶未回其十拂曉呼兒去採樵祝妻早辦午炊燒日斜枵腹歸家看尚有生枝炙未焦舂夫秕穅粒粒裹真珠玉杵舂來白有餘待問常姮借金鼎等間令汝作蟾蜍新市雜詠十首紗翠蓋常無異于花朝燈夕折建安人物風流市井華麗紅未嘗見之惜藁帙散落不多見耳折長篇短句形容一時之盛翠微之前雲鬟烟鬢縷雙鴉一搦宫腰柳帶花試問行雲何處覔畫橋東畔是奴家其二翠翹佯醉倩人扶約我文君賣酒壚解珮向人陪笑問一杯容妾佐樽無其三恰把青荷插髻鴉嗔人偷眠過􅐼紗一盤珠翠俱拋擲却向枝頭摘杏花其四遲遲蓮漏不相催亭館無人午夜開風欲捲簾花影動夢魂疑是故人來其五小橋相見便相親猶帶西湖陌上塵欲買一樽聊欵曲歸遲還怕小蠻嗔其六不帶冠兒不插花過門佯把扇兒遮嗔人貪數天邊雁失記回頭喚喫茶其七青衫揾淚向人啼妾本秦樓浪子妻流落南州歸不得青樓今在畫橋西其八一年不訪李紅娘今日過門意已忘嘶入畫橋東畔路紫騮猶記舊垂楊其九花箋得得寄瀛洲約我今宵特地留好笑蒼頭迷去路緑楊無處認青樓其十朱門粉壁謫仙家柳外鞦韆襯落霞一澗碧雲流不去木蘭舟繫木蘭花花村二首山翁云村人花姓因曰花村折寧州花村初謂紅紫之地問問宿花村喜有餘已拚花下倩人扶牧童不見枝頭杏空向青帘問有無夜宿花村不見花數間茅屋瞰溪沙山翁不是通名姓幾誤河陽令尹家過番陽湖及中流風濤大作篙師束手翠微折翠微訪趙貢無于畨陽湖之中方絶而止折恬然哦一北風翻雪鼓雷霆舟子停蘭亦斷魂看我金鱗三十六為君一躍上龍門嘲熱門學種瓜次其韵折張季卿詩云甘傍青赤帝乘龍駕火車晴空燒斷暮天霞流金爍石休相酷少皥看看催戍瓜三友亭不預其間非私故可議即炎凉世情折平山常有六客從遊東館之集乃半江梅之間命曰三友回次其韵聊及前日折之論人殆不免異日盧子彰作亭于松竹伯雲皆平山客也折之意蓋子彰與李老松疏竹間梅英三友如何獨擅名應是枇杷并檜柏當時無力預同盟青樓贈别老人韵折次甘州笛聲吹徹玉樓寒金鴨香消更漏殘含淚欲揮羞不敢倩他銀燭向人彈枕上吟凨聞角折建邸曉畫角梅花吸曉寒數聲清徹碧雲端誰知有客愁無寐一掬鄉心不奈酸午枕三杯未醒復三杯醉眼朦朧劈不開急辦藤床并竹枕要隨蝴蝶到蓬萊香篆字送至求和因次其韵折劉子源有香篆詩押灰輕覆雕盤一擊開星星微火自徘徊還同物理人間事歷盡﨑嶇心始灰􅲦齊雜詠二十首其一落花東風吹恨上眉頭兩岸桃花瞰碧流一片紅雲飛不起斷霞殘照落汀洲其二宿溪上夢回斜月掛林端酒力初消怯夜寒何處客舟猶未泊一聲柔櫓過前灘其三漁兒無肉鸕鷀入水頻雙童聨網立沙濱問渠掃得魚多少才可為羮了一人其四㑹五友聨翩屐齒破苔痕醉裡觥籌不計陳來日不須關太史五星令返聚甌閩其五宿茅亭投宿茅亭得夜凉鷓班搖落奏篔簹青簪擊破寒窗紙漏淂山花一線香其六江濤曉鐘捶動巨鰲䟫棖折音枕上春雷一夜轟應是金鱗三十六化龍頭角逞崢嶸其七月夜吟一聲殘角送黃昏獨倚闌干空斷魂竹影掃階塵不動自挨明月閉柴門其八嘲染鬢者萬事關心兩鬢秋柳灰何用苦文羞無情霜雪催年少間似青山猶白頭其九早春梅梢弄粉做新晴積雪殘雲沒一星只把眼前春事卜麥坡已作佛頭青其十憶西湖十年南國嘆徘徊一片鄉心撥不開應是西湖花柳問風流何事未歸來其十一問宿紫騮回首客思歸萬里家山蝶夢迷問宿莫耒林下邸夜深生怕杜鵑啼其十二曉望長天萬里掃清秋宿霧朝雲寸不留向曉殘星猶未落一盤棊子倩誰收其十三患瘡前回風疹遍身紅布褐因燒艷火烘兩腿熱瘡今又發休將紙被把頭䝉其十四水禽一曲漁歌古渡頭幾多鷗鷺起汀洲西風吹散瑶池雪點破長天萬里秋其十五獨宿朔風號木作嚴霜錦被重重凍欲僵夜半腳跟疑已割夢魂安得到髙堂其十六幽居獨自清間獨自忙杳無人迹到蕭墻眠時不用呼童僕自有清風為拂床其十七送行秋波春水照殘霞恨雨愁雲嚲髻鴉飛上領襟隨得去妾身安得似楊花其十八春思東風吹恨入青樓滿目春容總是愁楊柳織成絲萬縷􅑀誰裁作翠茸裘其十九小春閩南十月已春回無限風光暗裡催桃李海棠俱閗艷誰云梅是百花魁其二十上巳桃溪噴火柳拖烟如豆青梅已半酸燕子怯春歸未得一簾風雨杏花寒嘲賀將仕二首不克詣賀以詩嘲之折賀兄燕爾翠微繫獄花何太喜誰能賦葉是良媒解寄詩但覺人間傳盛事不知天上集佳期其二吾身西圛拘猶少君腹東床坦已多我欲屠牛窮建節君從歡燕小登科冬晴卿韵折次孫子臘月南州不類冬梨花飄粉小桃紅未曽飛動遙山雪早有春三二月風夢謫仙夢駕白雲參謫仙謫仙留賦白雲篇醉將隻手拏虹筆便扯青霄作彩箋懷九江友人罷釣線矣作詩訐之折久不見榮仲樵似聞巳浪拍西風萬􅊤秋幾多香餌落金鈎無魚可釣渾間事留得絲綸在即休翠微南征録卷之十
