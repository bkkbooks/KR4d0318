front:
  text: 翠㣲南征録巻之七
  hash: sha256:faf75e2b8b74398460f2787b067d2f8ad498ec041b77cce3a567db3583df1e64
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_SBCK_007-1a}
body:
  text: 律詩有觸述懷始若加礼而終乃者深切悼之折翠㣲以訐直取怒于人多矣士大夫有英雄還要識英雄不識英雄搃是空投䑕在人當忌器見鴻非我獨弯弓情從忠佞分輕重事戒恩威戾始終説与翠㣲休截截三緘從此更誰工岩桂反以為常卉故貶而抑之折建人以盆蕙為重岩桂夾道西風吹老碧蓮房万壑風流拆麝囊謾与籬花爭曉色肯教盆蕙壓秋芳月中有女曽分種世上無花敢闘香要識仙根逈然别一枝開傍郄家墻偶成一别京華近十年此心無日不悠然嗅梅得句天然巧把酒開怀地自偏鐵硯不須兵十万銅􅐻何用客三千功名自有風雲㑹不遇風雲毋自煎寄王士貴畫橋相送百花春轉眼孤鴻逐斷雲别後有誰能頋我客中無日不思君風前花影尝興念月下桐声久不聞見説近來多好况一書無惜寄云云發書与幼弟及坦齋風煙世事不堪聽勿謂封侯勝白丁老眼隔年新旧暦歸心連夜短長亭一声蜀鳥驚胡蝶十幅蛮花寄鶺鴒更向坦齋夫子道近來双鬂已星星寄王清之項平甫疾之清之贅于長沙間整折清之名度入吳德夫幕置局漢上勉推挽之意折歸鞍故有相封書漢上寄清之却恐清之漢上歸千里謾懷明月共寸心常伴白雲飛湘妃有泪能斑竹周士無心恋采薇安得一緘飛海嶠与兄聨轡上淮淝感應王祠應祠至灵遇有禍福神夜預告有折翠㣲繫牢城凡一嵗籥城中有感神之容儀而祠奉之折若響應因捐囊繪灵如神正直䕶縲囚當代公卿總合羞疏紙未燒謀已遂炉香方爇病先瘳乞灵屢假三更寐釋縛當封万户侯待得有勳書竹帛一封當為薦宸旒寄張舍人本路獄事折時舍人提萬寃無計􅐦天衢三尺金科謾巻舒公不戴星馳駟馬民將指日就枯魚黄堂宴妓不加意丹陛慮囚空有書見説羣烏廣瞻聽如何公論尚躊躇禱富沙者書致禱折欲發部使十年蹤跡淖泥沙為炷灵香禱富沙萬里無由詣霜闕一書聊欲為星槎解驂許我來齊晏釋縛從君問左車他日横飛上麟閣行祠當為建京華謝劉判院衾見恵折判院以綿細軸濃雲寄􅲦齋蒲團和氣忽驚囘一床浪捲芙蓉皱十幅香重錦綉開不怕夜寒侵斗帳却愁春夢到陽臺感恩未作瓊瑶報先把新詩寄小梅寄苕溪故人昔年分袂霅江東繫馬花梢撲乱紅解珮送行情怏怏舉盃言别恨匆匆中人以上誰知我北斗以南惟有公此去東閩有良便一書無惜慰羇穷不禱不炷灵香不誦經兆盃籖牓搃欺人窮通只合從天地禍福何須問鬼神命到死時生莫倖事當直䖏曲还伸從今若問開先事桃李無言二月春送提舉陳工部召入折自福建溪風拂拂巻征衣溪上攀轅恨馬遅蝗不入閩今已矣碑無留峴古求之泉知送客声犹咽烛昧留人泪謾垂願速長沙还賈誼為公江上斬鯨鯢悉事朝㫖作詩愧之折金幕諸丈不能奉欲歸未去兩紛拏何事回天力未加九牧誰為十羊主百冠當念一人髽肘边有石心雖切腰下無錢手謾叉千萬有人逢伯樂為言尨種尚鹽車呈陳信父老來百計縂無成當路時官懶問名國事只將心事比今人難作古人評蒼頭笑我樽無佐白髮欺人鑷又生惟有建溪知客意過灘時作不平鳴寄江子崗秋夜封書上子崗别來化日又舒長只知電烛兩經月不斍星毛半欲霜竹葉照人凝盞滑梅花撩客透籬香知他詩債曽償未料得尋春日日忙書太乙編年巻尾始至今中元甲子截日折編年自紹興上元甲子未耒暦折其餘皆年來太乙犯咸池三式編年事可疑西北膏腴從脯腊東南皮肉恐瘡痍堯天日月期無已胡地烟雲嵗有之更向江湖問同志中原何日是歸期怒成自師旦折在建聞侂胄舌端豪氣吐長虹四海一身無處容不向北山求刺虎便從南海學屠龍鼎須刘闢方成器劍到魏齊那是鋒欲抱不平朝玉帝梦魂飛上祝融峯楮衾霜風剪水作氷荷織出吳綾不用梭十幅曉雲藏䖏士一床秋水浸常娥直疑天上無青女却信人間有睡魔更向屛山畫梅竹紅塵還有此風麽勉趙法曹贑之石城比嵗不登茶冦塩商在折法曹以詞賦明經屢貢監漕初尉掃隨即撲滅因識江湖之士次任達安法折在嘯集法曹招集豪傑分道掩捕雷馳電終建安任又明年發兵上边時卿有薦趙折曹明年𣸪為南省鎖試第一不願易授特之士多歸之折于幕府者江湖銀潢河海浸崆峒君独軒昻萬派中北鄙虎牢今子産東山狼跋古周公固知魯衛封同姓合向燕秦策異功我欲誓江同擊楫中流無惜伴英雄獄中責廷尉公論以詩責之折廷尉党權勢而無重門有路透泉關便合摳衣問比干愧我直言難媚灶從渠怒髮自衝冠烏臺有月身何及犴獄無天泪謾彈自恨不逢包孝肅此身那許報平安吾巾不是不冠儒曽被儒冠几誤予鉄硯不磨天地軸毛錐難復帝王居當傳衛霍無傳秘却著韓曹不著書堪笑蒼生無眼力不知豪傑在樵漁挽戚虚中遊治生仰給于藥府与翠㣲有林泉之契折虚中尝從老氏之斈無嵗不為庐山之梦裡匡庐興未闌轉頭世事已辛酸肥家有術疑非藥漉酒從人笑不冠雁序向人羣已失鳳雛過眼影何單不堪囘首原頭路一塢松楸生暮寒寄盧進士丈夫策定在吳鈎浪把橋門作勝遊綵筆誤人隨驥尾錦標還我占鰲頭關山夢寐三千里竹帛功名四十秋安得九重容借箸盡將軍囯為前籌九日言懷有聨鑣之約旣而飛符入金不識折次刘功父韵功父為江湖領袖初見貽次韵報之折所在至是方以詩凄凄天氣間炎凉破帽翻風客鬬狂酒味暗消萸蘂辣鴈声喚淂菊花香三京昔擬恢同軌九日今犹客異鄉更仗阿誰上沙漠為予申意郭汾陽呈畨昜趙及甫不學炎凉不自謀動和權勢作仇讐筆鋒帶怒摇山岳劍氣㗸寃射斗牛龍虎榜中當擢第麒麟閣上合封侯功名未入男兒手誰肯甘為郡督郵九日溪樓逺望西風寥落做重陽人在東南水一方地僻阻它鴻鴈信天寒撩我菊萸觴江澄素練魚翻赤葉剪紅綃蟹結黄不是倚闌迷望眼欲􅑀歸雁問蘇郎訴董寺丞以一詩董揮泪而出折董詣獄問囚翠㣲款神首羅㬋欲蝕天彎弓直造玉皇前九重不忍誅林甫一札翻令囿馬迁投䑕固知當忌器淂魚誰敢便忘筌吾今一死初無憾願把孤忠托孟堅寄小王徐子晉餘里托拜書二潘折子晉去唐城二百十載長沙路二千歸心日夜在長安居家有譽眉空白恋闕無謀心謾丹獲鴈不聞蘇子信沐猴徒笑楚人冠馬蹄恐有唐城便為把功名問二潘獄中作壯士剛腸不受寃髑髏可斷志難干韓仇未報薪當卧漢賊犹存鋏謾彈情款不從囚口責炙漿難塞吏腸寛何當盡瀝姦邪血染作衣裳看孟安池亭即事春風恰恰破桃李池舘無人一徑深鷗刷斷翎翻水面蝶抛殘粉出花心詩懷攪我丹心破節物催人白髮侵流水伯牙今已矣世間那復有知音南剣水閣欲向津頭問鏌鎁一潭秋水漫煙霞画屏對客景藏景芳樹壓溪花照花有策廷爭慚賈誼無功庙食笑張華夜深霹靂轟双劒驚起延平十萬家丹青閣閣上闌干紫翠環閣中身世異塵寰長虹吸月印秋水孤鶩伴霞量晩山萬里風煙屏帳裡一時人物畫圖間凌烟須是男兒事却恐功名未放閑折桂園友人宴墻頭羅綺碧雲濃墻外鞦韆電掣空蝴蝶拍開花面粉鷓鴣吹落杏腮紅翠裀不巻珠簾月蠟烛還摇錦袖風醉眼不知塵世有直疑身在廣寒宫夜步水西半趿颯折音芒鞋過水西樓臺灯火未多時山羞見我頭頭轉月怕抛人步步隨楓葉巻愁秋去早溪声翻笑夜歸遲柴門只解關煙雨不隔離愁些子兒酒樓秋望西風吹客上闌干萬里無雲宇宙寛秋水碧連天一色暮霞紅映日三竿花摇舞帽枝犹軟酒入詩腸句不寒古徃今來恨多少一時收拾付盃盤臨清閣闌干古木瑣青葱闌外簷花灼半空萬里好山春黛碧一溪流水暮霞紅􅐼疎不礙東西月帆過始知南北風試問支郎一樽酒好天良夜与誰同思故人十載無人問益之誰于欬唾覔珠璣雨三千里家何在三十六峯人未歸將謂抱薪能救燎果然畫餅不充饑東川恐遇連榮祖一笑不須論是非翠㣲南征録卷之七
