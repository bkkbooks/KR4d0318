front:
  text: 翠微南征録卷之四律詩
  hash: sha256:6fd966128f4057b3819ff8a56633092f2cd0ea95dbd8d2713228fb0640c757e5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_SBCK_004-1a}
body:
  text: 次李信州七十韻挺挺萬人傑坣坣間世賢胸中兵十萬足下客三千楊賦希三嘆坡詩和百萹錦囊華似衮綵筆大如椽隨陸縱橫舌良平左右肩兩驂公子服四牡魯侯畋量闊滄溟岸胸蟠泰華巔紅壇歌魯杏白社結陶蓮遣幣通秦好求􅊚托鄭㜕匣藏須虎兕冠飾待貂蟬標自龍頭奪書由堆足傳不侯嗤李廣求使短張騫食客希毛遂茶僧集大顛詩材親子建字法邁公權黃貉蒙金絡青􅔕勒寶韉伐燕欺騎劫聘魯慢韓穿周室歌山甫齊人美仲連劒從豐水鑄碑向峴山鐫有頌褒唐太無詩剌衛宣􅊾堪傳代郡節可仗居延聽訟踈淹禁豐財剔冗貟䇿從之反後鞭著祖生先孝有參而已忠如丘者焉春氷同皎潔秋月共嬋姢冡宰當釣軸將軍事槖鞬千官視標凖萬國倚陶甄多士圜冠帶諸侯執豆籩山期封泰岱石擬勒燕然禹甸期環轍堯氓願受㕓明坣歌赤紱清廟頌朱絃臺閣皆三益􅐻盂記十愆片言能息訟隻手可旋乾公昔嘗推轂吾今尚食饘聞雞效劉舞抱虎笑秦眠蘇子舌猶在邉韶腹尚便牛衣懷白璧虎節誓青氈飲馬量淝水屯兵料漢田鬢星飛汴洛血兩灑伊瀍伊五成湯就軻三孟母遷雲鋤翻椘嶠月纜繫秦川甕有扶頭酒厨無縮項鯿詞源慚子美詩社感庭堅水陸三千里炎涼二十年周田才廢井秦陌已開阡夜月琴三弄春風詩一聫自稱山宰相人號地神仙扣馬罹三尺平戎授一編鼠投當忌器魚得偶忘筌避地思無所滔天罪莫湔梁鴻方北謫賈鵩已東旋孫刖難謀魏樊誅莫救燕江天驅鳥雀淮地迅鷹鸇日守掫訾分星流太白躔瘡痍連四境煨燼極三邉淮浪夜翻雪胡塵晝起煙二陵歸培塿百自撫劉生几誰思祖逖鞭戍方興頡利役莫宫昔嘗遊泮􅩪今謾嘆圜豈知醫國手變作椘客弓雖失秦人璧幸全宦途良可畏吏鞅不丗變言難盡民頑令不悛一千新楮劵三百舊駟馬涎流地群烏兾蔽天人心徒擾擾王道衛女歌淇澳曺人思下泉窮途惟自愧當路作俑冝旡後追俘恐不前詩成何太喜舞袖欲蹁躚丹青閣之韻折次朱載未識丹青意憑欄試解嘲煙雲朝起陸汀渚暮生潮山卓數枝筆天橫一幅綃霞收紅暈淺溪褪緑痕消箇裡凨煙冷于中景物饒飛黃凌翠閣寒碧瞰紅橋酒盡香凝甕詩成錦掣標朱衣扶客醉翆袖殢人嬌屏帳接千里畫圖連九霄長凨耒水尾斜日轉山腰赤腳支笻穩蒼頭控馬驕老臣今已矣兒女總金貂律詩上韓平原君家勳業在􅐻盂莫把頭顱問钃􅍢漢地不埋王莽骨唐天難庇祿山軀不隨召奭始求老便學孔明終托孤十廟英靈儼如在謾于宗社作穿窬清冨樓樓名清冨求詩折小湖楞珈老作楞珈心地有瞿曇清冨名樓足可觀買斷江山詩料俗揭開凨月畫圖寬都無一點紅塵到便作千雙白璧看我欲鞭驢快幽賞白鷗盟在不憂寒去年清冨屢求詩今日憑闌約翆微山帶野花堪入畫水環汀草欲成圍一園黃菊有餘食兩頃白雲無限衣説與塵寰守錢虜不勞魂夢到禪扉出郭隨佛下生者就嘲之折十客出郭中有自稱為十客聫鑣出北門馬蹄剜盡碧苔䀶從教管史占星聚且聽杯人和月吞我欲求仙問離坎君當隨佛整乾坤樽前慷慨休辝醉明日有懷誰共論則邀清凨明月醉而倒折舍後丈地令人植花竹悶有地都耒一丈餘墾鋤元不費工夫匝墻先種竹三本繞檻却栽花數株凨伯喚耒煩解珮月娥􅌽淂醉携壷􅑀君試向蓬萊問還有神仙似我無送周魁是嵗元日立春折時周在閣門出疆昨夜霜凨鼓萬兵今朝華節照邊庭人間元日是春日天上魁星為使星且向􅍑囊挆寸尺却歸麟閣做丹青離觴不是延清夜明日異邦長短亭二月二日即事元韻折次王德春潮昨夜沒平灘一兩催花色半含堆喚元霄歸塞北燕銜新社到江南無歡不必逰花籍有病何須置藥藍只把公忠答天地從教兒女閙冠簮登樓晚望以棘丞求輔外折次曲溪韻曲溪方六曲朱闌瞰碧虛淡煙秋水接平蕪展開凨月添詩料裝點江山歸畫圖舉足便堪馳駟馬折腰何必問雙鳬當年庾亮今還在㝎約樓前醉一壺訓㸑婢十載膠庠莫怪窮旅囊安淂有從容無錢休欠牛羊債有酒只將魚蟹供班頷昔嘗肥似燕沈腰今已瘦如蜂從今莫恣肥甘口只擷清𬞞祭豢龍别藍詳道橫江以詩言别折詳道率昆玉送至君在江東我水西君今北去我南歸竹孫和客凌風瘦梅子偏他得兩肥鶯囀好聲歸酒斚花分紅影上人衣相看莫作皺眉别期子秋髙賦式微傷春仲韻折次賈武𥘉入京華菊薦香途中今已過春芳十年恰赱万餘里兩鬢几乎一半霜却酒不禁春黯淡落花愁對月昏黃不堪夜半歸心切更被杜鵑啼斷腸别子陳子之宣城郡齋折寧州人向嘗識丙寅三月三十日天子􅊾我南國行蒲劍欲飛春漲急栁綿才脫曉寒輕事非淂已𥘉何好物到不平終作聲自古英雄總多難賈梁何必怨清明河魨仲山韻折有感次秦形容𥘉不類魚蝦偏稱蘆蒿與荻芽觸物可憐空怒腹囓人旡計謾聱牙子排金粟真堪畏乳溜玉酥何足誇從此烹鮮督庖吏只將鮎鱯假名它自嘆魁韻折次黃自嘆身謀我獨踈只貪凨月恣歡娛杯􅐻遇客隨多寡囊槖何時問有無万里梯航旡罥罣十年墻屋有穿窬從今老去無他望緑綺一張醪一壺春日書懷熊韻折次李次紫褪紅銷到海棠几多逰俠為渠忙秋聲落盞鶯調曲春色惱人花聞香羝乳雖能屈蘇武牛衣終不卧王章男兒多少英雄氣只對東凨醉几場過文脊山之隂市曰版橋次壁間題韻折宣界有山曰文脊又曰百峯山百峯攢碧版橋西眼力增明步武遲紅映竹籬花笑客翠翻雲幕兩催詩蕡還及第吾何愧廣不封侯子未思凡物不齊皆有謂到頭忠義是男兒熱伯恭示詩次韻折三衢道中訪周翆微家在大江東五月鞭驢入建中雲烈火車天欲兩汗淹香葛扇無凨不求殿閣千間庇却喜岩泉一線通為汲滿盂清齒頰與君行盡夕陽紅有感仲韻折次陳平十年憂患客江城雙鬢蕭蕭已不禁多病不逄醫國手感懷徒有濟時心西凨吹夢夜寒悄黃葉滿階秋意深休笑當年杜陵老白頭今亦不勝簮悶中𢋫趙丞韻壯士不同兒女曺誰云賦性太粗豪一編韜略追擒虎十轄絲綸學釣鰲劍口不磨韓信血鼎心須刮食其膏英雄多少不平氣一夜朔凨爭怒號秋宵有感滿目秋容拂畫圖敗荷衰栁接平蕪西凨刮地鴈聲落寒月滿天人影孤木耳有才持紫槖楮皮無計換青蚨不知此去功名事還許封彛見也無過羊腸嶺于潛分水之間折和壁間韻羊腸在拂面東凨吹夕陽路蟠千折過羊腸山疑隨馬回回見花欲撩人故故香丗路與誰分曲直人情于我自炎涼何當更上凨煙上為把窮途問彼蒼宿橫溪橋淳安界折橫溪在夜宿橫溪煙霧間眉頭歸路萬山攢連天麥浪波千頃撲地楊花雪一團餘鏹不供春後醖夾衾猶怯夜耒寒征夫莫怪車音澀自是愁多行路難送倪尚書赴召守節如𥘉未足觀毫釐終始實其艱鄭公勇却樞衡貴衛叔羞居荷槖班冷暖萬端炊飯頃是非一著奕棊間江湖無限孤髙客拭目看公此召還宿嚴瀨卿未至折時迓王遐想髙凨殊未崖艤舟夜訪子陵臺􅋦山西照情何限逝水東流夢不回雙槳未聞卿月過一尊先為客星開東都人物俱煨燼獨有先生迹未灰題澤民廟命追回折時被生握藩旌死象梨澤民山下澤民溪蒼天九重開日月赤地千里興雲霓寐假商宗曽淂説爵髙韓信屢封齊英雄不入蒼生眼願借髙風吹馬蹄早春即事坡韻折次菊楊栁絲絲㺯淡黃怯寒燕子未歸梁曉迷芳草騅騣􅊜夜宿間花蝶翅香得句自慚非子美賞音猶恐誤中郎願言相約花前醉莫放春容過海棠早行述懷間韻折和壁歸心夜半已飛揚喚僕吹燈促曉裝雞翅拍斜茅店月馬蹄剜破板橋霜二陵万里埋荆棘十廟百年生稻梁安淂有臣如祖逖慨然擊楫誓江長題易村請迂道半里訪之示詩賡韻折次何貢元韻何兄以辛酉同路轉峯回覺有村數間茅屋瞰山隂午炊已飽翻匙玉臘醖仍拚挂杖金窮去作文和鬼送興耒得句倩蟬吟一聲橫笛斜陽外吹起江湖万里心述事談物理之學因針之折次王夢與韻夢與好心不融明遂啓疑源流本末致交馳谷何嘗響人相喚岸幾曽行舟自移枉直萬端明似鏡是非一著錯如棊磨心拔去誰能轉試問諸公知不知述懷父韻折次何德我生不解覔冠裳滿目凨波祗自傷楮劵不堪供虜幣沙籌那解足軍糧人情在我隨多寡丗態從他自短長只告天公乞安樂百年隨分老農桑寄劉浩然書中所喻之意折次浩然韻且勉以樽酒檠􅐼鬢髮新别耒驚見雪霜侵幾行泪滴凨前燭一片心敲月下砧好德未聞如好色知人安得似知音一書欲寄南耒堆江濶天髙無處尋知遇今思古成知遇折閲韓信傳因傷淮隂西漢一英雄史氏持衡論亦工不向追亡羡蕭相却于爰死著滕公豈知並績三人傑皆自當時一語功後世人材自戕賊炎涼安淂古人凨和戎請成之議折時有函首納幣求成事已非可堪函首獻戎墀一天共戴心非石九地皆塗血尚泥反漢須知為朝錯成秦恐不在於期和戎自有和戎䇿却恐諸公未必知翆微南征録卷之四
