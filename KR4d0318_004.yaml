front:
  text: 翠㣲南征録卷之四律詩
  hash: sha256:8a2085affb7d9b36e3b1a9def67c03e77f6ac34435ddd45a55ddfa178016ec13
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_SBCK_004-1a}
body:
  text: 次李信州七十韵挺挺萬人傑坣坣間世賢胸中兵十萬足下客三千楊賦希三嘆坡詩和百萹錦囊華似衮綵筆大如椽随陸縱横舌良平左右肩両驂公子服四牡魯侯畋量闊滄溟岸胷蟠泰華巔紅壇歌魯杏白社結陶蓮遣幣通秦好求􅊚托鄭㜕匣藏湏虎兕冠餙待貂蝉標自龍頭奪書由㕍足傳不侯嗤李廣求使短張騫食客希毛遂茶僧集大顛詩材親子建字法邁公權黄貉䝉金絡青􅔕勒宝韉伐燕欺騎刼聘魯慢韓穿周室歌山甫齊人美仲連劒從豊水鋳碑向峴山鐫有頌褒唐太無詩剌衛宣􅊾堪傳代郡節可仗居延聴訟踈淹禁豊財剔冗貟䇿從之反後鞭着祖生先孝有参而已忠如丘者焉春氷同皎㓗秋月共婵姢冡宰當釣軸将軍事槖鞬千官視標凖萬國倚陶甄多士圜冠帶諸侯執豆籩山期封泰岱石擬勒燕然禹甸期環轍堯氓願受㕓明坣歌赤紱清庙頌朱絃䑓閣皆三益􅐻盂記十愆片言能息訟隻手可旋乹公昔尝推轂吾今尚食饘聞鳮効劉舞抱虎笑秦眠蘇子舌犹在邉韶腹尚便牛衣怀白璧虎節誓青氈飲馬量淝水屯兵料漢田鬂星飛汴洛血両洒伊瀍伊五成湯就軻三孟母遷雲鋤翻椘嶠月䌫繫秦川罋有扶頭酒厨無縮項鯿詞源慚子美詩社感庭堅水陸三千里炎凉二十年周田纔廢井秦陌已開阡夜月琴三弄春風詩一聫自称山宰相人号地神仙扣馬罹三尺平戎授一編䑕投當忌器魚得偶忘筌避地思無所滔天罪莫湔梁鴻方北謫賈鵩已東旋孫刖難謀魏樊誅莫救燕江天駈鳥雀淮地迅鷹鸇日守掫訾分星流太白躔瘡痍連四境煨燼極三邉淮浪夜翻雪胡塵晝𧺫烟二陵帰培塿百自撫劉生几誰思祖逖鞭戍方興頡利役莫宫昔尝㳺泮􅩪今謾嘆圜豈知医國手変作椘客弓雖失秦人璧幸全宦途良可畏吏鞅不丗変言難盡民頑令不悛一千新楮劵三百舊駟馬涎流地群烏兾蔽天人心徒擾擾王道衛女歌淇澳曺人思下泉穷途惟自愧當路作俑冝旡後追俘恐不前詩成何太喜舞䄂欲蹁躚丹青閣之韵折次朱載未識丹青意凭欄試觧嘲烟雲朝起陸汀渚暮生潮山卓数枝筆天横一幅綃霞收紅暈淺溪褪緑痕消箇裡凨烟冷扵中景物饒飛黄凌翠閣寒碧瞰紅橋酒盡香凝甕詩成錦掣標朱衣扶客酔翆䄂殢人嬌屏帳接千里画圖連九霄長凨耒水尾斜日轉山腰赤脚支笻稳蒼頭控馬驕老臣今已矣児女搃金貂律詩上韓平原君家勲業在􅐻盂莫把頭顱問钃􅍢漢地不埋王莽骨唐天難庇禄山軀不随召奭始求老便學孔明終托孤十庙英灵儼如在謾于宗社作穿窬清冨楼楼名清冨求詩折小湖楞珈老作楞珈心地有瞿曇清冨名樓足可覌買断江山詩料俗揭開凨月画圖寛都無一點紅塵到便作千双白璧㸔我欲鞭馿快幽賞白鷗盟在不憂寒去年清冨屡求詩今日凭闌約翆㣲山帶野花堪入画水環汀草欲成圍一園黄菊有餘食両頃白雲無限衣說与塵寰守錢虜不劳魂梦到禅扉出郭随佛下生者就嘲之折十客出郭中有自称為十客聫鑣出北門馬蹄剜盡碧苔㾗從教管史占星聚且聴盃人和月吞我欲求仙問離坎君當随佛整乾坤樽前慷慨休辝酔明日有懐誰共論則邀清凨明月醉而倒折舍後丈地令人植花竹悶有地都耒一丈餘墾鋤元不費工夫匝墙先種竹三本遶檻却㘽花数株凨伯喚耒煩觧珮月娥􅌽淂醉携壷􅑀君試向蓬莱問還有神仙似我無送周魁是嵗元日立春折時周在閣門出疆昨夜霜凨鼓萬兵今朝華節照边庭人間元日是春日天上魁星為使星且向􅍑囊挆寸尺却帰麟閣做丹青離觴不是延清夜明日異邦長短亭二月二日即事元韵折次王德春潮昨夜没平灘一兩催花色半含㕍喚元霄帰塞北燕啣新社到江南無歡不必逰花籍有病何湏置藥藍只把公忠荅天地從教児女閙冠簮登楼晚望以棘丞求𥙷外折次曲溪韵曲溪方六曲朱闌瞰碧虚淡烟秋水接平蕪展開凨月添詩料装点江山帰画圖㪯足便堪馳駟馬折腰何必問双鳬當年庾亮今还在㝎約楼前醉一壺訓㸑婢十載膠庠莫恠穷旅囊安淂有從容無錢休欠牛羊債有酒只将魚蟹供班頷昔尝肥似燕沈腰今已瘦如蜂從今莫恣肥甘口只擷清𬞞祭豢龍别藍詳道横江以詩言别折詳道率昆玉送至君在江東我水西君今北去我南帰竹孫和客凌風瘦梅子偏他得兩肥鶯囀好声帰酒斚花分紅影上人衣相㸔莫作皺眉别期子秋髙賦式㣲傷春仲韵折次賈武𥘉入京華菊薦香途中今已過春芳十年恰赱万餘里兩鬂几乎一半霜却酒不禁春黯淡落花愁對月昏黄不堪夜半帰心切更被杜鵑啼断腸别子陳子之宣城郡斋折寕州人向尝識丙寅三月三十日天子􅊾我南囯行蒲剣欲飛春漲急栁綿才脫曉寒輕事非淂已𥘉何好物到不平終作声自古英雄縂多難賈梁何必怨清明河魨仲山韵折有感次秦形容𥘉不類魚鰕偏稱芦蒿与荻芽触物可憐空怒腹囓人旡計謾聱牙子排金粟真堪畏乳溜玉酥何足誇從此烹鮮督庖吏只将鮎鱯假名它自嘆魁韵折次黄自嘆身謀我独踈只貪凨月恣歡娛盃􅐻遇客随多寡囊槖何時問有無万里梯航旡罥罣十年墙屋有穿窬從今老去無他望緑綺一張醪一壺春日書怀熊韵折次李次紫褪紅銷到海棠几多逰侠爲渠忙秋声落盞鶯調曲春色惱人花聞香羝乳雖能屈蘇武牛衣終不卧王章男兒多少英雄氣只对東凨酔几塲過文脊山之隂市曰版橋次壁間題韵折宣界有山曰文脊又曰百峯山百峯攅碧版橋西眼力増明步武遅紅映竹籬花笑客翠翻雲幕兩催詩蕡还及第吾何媿廣不封侯子未思凡物不齊皆有謂到頭忠義是男兒熱伯恭示詩次韵折三衢道中訪周翆㣲家在大江東五月鞭馿入建中雲烈火車天欲兩汗淹香葛扇無凨不求殿閣千間庇却喜岩泉一線通為汲滿盂清齒頰与君行盡夕陽紅有感仲韵折次陳平十年憂患客江城双鬂蕭蕭已不禁多病不逄医國手感怀徒有済時心西凨吹梦夜寒悄黄葉滿堦秋意深休笑當年杜陵老白頭今亦不勝簮悶中𢋫趙丞韵壮士不同兒女曺誰云賦性太麄豪一編韜略追擒虎十轄絲綸斈釣鰲剣口不磨韓信血鼎心須刮食其膏英雄多少不平氣一夜朔凨争怒号秋宵有感滿目秋容拂画圖敗荷衰栁接平蕪西凨刮地鴈声落寒月滿天人影孤木耳有才持紫槖楮皮無計換青蚨不知此去功名事還許封彛見也無過羊腸嶺于潜分水之間折和壁間韵羊腸在拂面東凨吹夕陽路蟠千折過羊腸山疑随馬囬囬見花欲撩人故故香丗路與誰分曲直人情扵我自炎凉何當更上凨烟上為把穷途問彼蒼宿横溪橋淳安界折横溪在夜宿横溪烟霧間眉頭帰路萬山攅連天麥浪波千頃撲地楊花雪一團餘鏹不供春後醖夾衾犹怯夜耒寒征夫莫恠車音澁自是愁多行路難送倪尚書赴召守節如𥘉未足覌毫釐終始寔其艱鄭公勇却樞衡貴衛叔羞居荷槖班冷暖萬端炊飯頃是非一着奕棊間江湖無限孤髙客拭目看公此召还宿嚴瀬卿未至折時迓王遐想髙凨殊未厓艤舟夜訪子陵䑓􅋦山西照情何限逝水東流梦不囬双槳未聞卿月過一尊先為客星開東都人物俱煨燼独有先生迹未灰題澤民庙命追囬折時被生握藩旌死象梨澤民山下澤民谿蒼天九重開日月赤地千里㒷雲霓寐假商宗曽淂說爵髙韓信屡封齊英雄不入蒼生眼願借髙風吹馬蹄早春即事坡韵折次菊楊栁絲絲㺯淡黄怯寒燕子未帰梁曉迷芳草騅騣􅊜夜宿閑花蝶翅香得句自慚非子羙賞音犹恐誤中郎願言相約花前酔莫放春容過海棠早行述怀間韵折和壁帰心夜半已飛揚喚僕吹灯促曉装鳮翅拍斜茅店月馬蹄剜破板橋霜二陵万里埋荆棘十庙百年生稻梁安淂有臣如祖逖慨然擊楫誓江長題易村請迂道半里訪之示詩賡韵折次何貢元韵何兄以辛酉同路轉峯囬斍有村数間茅屋瞰山隂午炊已飽翻匙玉臘醖仍拚掛杖金穷去作文和鬼送㒷耒得句倩蝉吟一声横笛斜陽外吹起江湖万里心述事談物理之斈因箴之折次王梦与韵梦与好心不融明遂啟疑源流本末致交馳谷何尝響人相喚岸幾曽行舟自移枉直萬端明似鏡是非一著錯如棊磨心拔去誰能轉試問諸公知不知述怀父韵折次何德我生不觧覔冠裳滿目凨波祗自傷楮劵不堪供虜幣沙籌那觧足軍粮人情在我随多寡丗態從他自短長只告天公乞安樂百年随分老農桑寄劉浩然書中所喻之意折次浩然韵且勉以樽酒檠􅐼鬂髮新别耒驚見雪霜侵幾行泪滴凨前烛一片心敲月下砧好徳未聞如好色知人安得似知音一書欲寄南耒㕍江濶天髙無䖏尋知遇今思古成知遇折閱韓信傳囙傷淮隂西漢一英雄史氏持衡論亦工不向追亾羡蕭相却于爰死著滕公豈知並績三人傑皆自當時一語功後世人材自戕賊炎凉安淂古人凨和戎請成之議折時有凾首納幣求成事已非可堪函首献戎墀一天共戴心非石九地皆塗血尚泥反漢湏知為朝錯成秦恐不在於期和戎自有和戎䇿却恐諸公未必知翆㣲南征録卷之四
