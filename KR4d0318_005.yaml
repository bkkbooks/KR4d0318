front:
  text: 翆微南征録卷之五
  hash: sha256:9e1dd903167fa6efe2c04af7d6a83b5f4e3523996c7dd61f4ebb023487e2607b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_SBCK_005-1a}
body:
  text: 律詩自寬翁韻折次遊少十事相尋九不諧骨窮更值五行乖人情厚薄且隨分丗態炎涼休挂懷家欲自豐無楮幣㸑􅑀誰執有荆叉如今且任眼前過他日功名殊未涯黃氏三層樓登樓賦詩次韻折東嘉焦次詹約妓瘦笻支我上髙寒凨露凄清酒力慳千里人邀千里月一重樓見一重山筵前飛雪噴焦遂檻外行雲遏小蠻便好翻身駕黃鵠直將情枉扣天關幽居父韻􅊨折次陳吉莫問門無長者車只圖深巷樂樵漁一園黃落食無限萬􅊤碧蓑衣有餘雁足北耒歸訊杳馬蹄南去故人踈東風看整朝天斾多少功名在故廬賀趙丞登第要與宗盟立紀綱俯從多士較文章人材漏網無疏密科目搜羅有短長蟾窟一枝分玉樹風池三浪出銀潢何當推解延豪傑為復中原万里疆梅香字韻折次稼軒一年無處覔春光杖䇿尋春特地忙墻角數枝偏冷淡江頭千樹欲昏黃梢橫波面月搖影花落樽前酒帶香更仗西湖老居士為豫收拾付詩囊捉月仙尾因酌以酒送之中流折夜發雷江有捉月者出舟纜解西凨拍岸顛堆拖秋色上航船挂帆未作乘凨客舉棹先驚捉月仙椘些有淵心石殞賀狂無井眠折眼花眠殷勤為酹一杯酒斷送西江浪拍天呈寧次翁見慰次韻折次翁以詩王謙不事冨春侯自是薰蕕味不侔病體隔年留枉獄夢魂連夜遂歸舟可憐商木遷新令欲為韓門復舊讎但淂此心無所愧為公一死亦何尤悶成勿憂李廣不封矦廣不封侯未足憂漢鼎不烹曹操肉吳鈎空斷伍貟頭鴻門自昔推屠狗虎帳于今愧沐猴千万南陽遇徐庶為言豪傑尚縲囚别館即事十年客裡過春光客裡逢春分外狂半堵碧雲蝸路􅊜一簾紅兩燕泥香􅋦山西日辝春閣拍岸東凨趂夜航莫向錢塘蘇小説東吳新髻李紅娘武興解舟征之役折時有北西凨落日椘江頭秋水已平鸚鵡洲煙樹接天迷過斾浪花翻雪噴行舟三杯万事我已飽一日千里誰能留見説平戎新遣使班超投筆已封侯不遇軒韻折次稼英雄不遇勿長吁苟遇凨雲彼豈拘不向關中效蕭相便于江左作夷吾當知晉霸非由晉所謂虞亡豈在虞多少英靈費河嶽鍾豫不遇獨何歟紀事事即紀以詩折翆微在建遇鉗口刳腸未足殫窮源探本可觀瀾乞醯孰謂鄰非直反矢須知友必端暴虎欲從頭碎璧沐猴還慮髮衝冠積薪措火居其下試問賈生安未安冬日述懷塘韻折次栁寒入肌膚粟已生銀河凍合水無聲梅花漏泄春先到凨色商量雪未成有愧何須問天理無求方始合人情男兒未際風雲會辜負胸中十万兵暮春述懷彰韻折次李子一年春事已差池又見楊花貼水飛梁燕不憂驚午枕箔蠶生怕誤春衣景逢佳處須行樂事到難時且式微幸有黃雞并濁酒且和凨月醉柴扉幽居兄狀元韻折次陳百一十頃平湖一簇山湖山佳處著朱闌分階草色迎春緑漱石泉聲入夜寒不優自然人事好有為方信丗途難如今休説當年事只把心平氣㝎看謝三劉米黍之辱時昌節前一日折文卿挺卿惠卿見慰且有雁行􅎔慰暖如春玉粒金包即拜恩周粟不肥清聖肉椘絲難繫直臣魂二生在昔聞孤竹一死于今愧屈原圓簠下頒誠有謂此情兄外更誰論暮春述懷文韻折次羅廣買春無計托花神費盡榆錢不計緡凨絮飛成三徑雪雨犁翻動一園春有心報國從招禍無相封侯謾怨貧試問登壇與分社豫何人彼亦何人呈諸同舍然韻折次黃浩洛陽年少不知几十載南州賦式微三舉不登黃甲去兩庠空笑白丁歸頭長賈昔過三尺腰大巨今徒十圍秪恐金鑾不前席誰云無䇿冨王畿寄陳士元有符離之役折丁卯五月聞郊野英雄不肯收膏梁芻豢有何謀胡兒只怒馬黃弩公子當求狐白裘唐詔屢頒蕡不第漢壇才築信當侯古今淂喪同兒戲何必區區嘆白頭貧居卿韻折次劉亞貧居不暇理椽茅只倩江山圍一遭林鳥樂時知地僻嶺雲間處覺天髙春衫著破重連線臘酒擎乾猶糝糟且把杯􅐻聊自適不須平地起凨濤呈魯功甫有禁煙之約折功甫元宵預拂面東凨二月天緑楊芳草暗平川花容著雨閗翻錦春色惱人催禁煙燈夜雖然君有約花時却恐我無緣直須淂暇耒相訪當約嫦娥伴醉眠勉馮著明淮著明病辝作詩勉之折著明𬒳西府􅊾押兵上主憂臣辱已難堪國事顛危况未安溺嫂􅎔淵猶援手閗人同室尚纓冠公如不唱從軍樂士亦恐行路難麟閣功名總勞苦莫將行役作辛酸藕花西社中名士見者莫不閣筆近折馮肖許有藕花詩和者盈軸其却勉強續貂折送至義不可惜絲不肯織宫鞋花月仙人謫不耒河伯借泥封玉腕凨神翻浪沃香腮無房不許蜂留宿有蓋嘗令鷺自開何事冤仇結青女一朝收拾付塵灰自勉丞韻折次趙丗態凨波不可論且于間處樂天真肥家無子堪登隴憂國有人休問津顔色雖蒙時借我腳跟那解日隨人客耒若問當時事搖手無言對北鄰𥘉夏即事叔韻折次王剛隂晴未判落梅天栁巷無人絮撲氈滌器倒囊尋市醖喚船挑網得溪鮮鳥聲呼夢客千里山色撩人句一聫遐想故人應念我馬蹄何處夕陽邉呈鍾子嚴之意因針之折子嚴方有入荆那條路不通聲折去長安莫把心腸獨自剜有釀何須兒索飲無殽徒勸客加餐千金不賞思歸椘萬戶無封願識韓大抵利名些子耳幾多豪傑𬒳縈絆寄楊渭夫自愧材猷不足觀獨于忠義死難千二陵漢万里腥羶誰報韓眼到北盟常揾血衝冠如何一代多人傑稽首稱藩鼻不酸幽居之韻折次劉德瀟灑幽居屋一重入門花栁間青紅簾嘗礙月鈎嘗挂酒不逢花盞不空畏愛難全公子日雌雄誰識大王凨且將酒貨遷詩料休問榷場通未通呈王君庸有納寵之慶示詩次韻折君庸嵗有烹笋之集是春主人意重出霓裳客子愁多欲斷腸眉黛暗傳春去恨臉紅猶帶夜耒粧竹根稚子肌膚滑葉底荷花語笑香多少行雲在巫峽謾將詩思惱襄王寄西山訊事次韻折西山以詩宫墻無地可穿窬猶幸先人有弊廬仕版可羞寧毁瓦儒冠曽誤枉收書供柴我合同收炭寄食君當自辦𬞞此理曉然明似鏡何須足下肆耕鋤呈李朝舉昜有詩見寄次韻折朝舉談論慷慨居番一片忠肝照日明濟時無䇿苦傷情聱牙拊几悔南渡和泪挑燈編北盟漢用􅊾招三十郡椘因歌散八千兵太平若鬪生靈肉何用生靈望太平小春言懷甫韻折次項山桃李生香花滿溪南州十月尚襜衣春從酒甕榨將出秋在詩囊帶得歸弓射十分方破的棊髙一著便爭機勸君莫作等間看毫髮差殊事已非春愁已昏之句次其韻折益公有萬事關心眼十日春愁不出門出門春事已消魂摘花掀帽倩人插索酒得杯和月吞啼鳥聲中近寒食落花隂裡又黃昏春耒春去總休問往事悠悠付一樽呈徐商卿十年憂患謫東南萬事于心了不關病去只愁雙足軟老耒且喜一身間人情無處便生怨天道有時猶好還大抵久長居冨貴到頭天意亦須慳春逰有感賞春之韻折次王長卿上苑春工到海棠老夫隨分為春忙朱絃轉枕鶯催拍紅粉倚欄花閗粧吾道幾時曽損益人心今日自炎涼願言相約花前醉一聽兒童號酒狂憂山甫折呈項憂吾所謂果何憂憂國憂家卒未休坐法馬遷方去漢釋囚箕子未歸周西凨萬籟聲聲恨夜兩踈桐點點愁有客不知吾所向却將米價問南州述懷忽自廣信耒慰我有詩次其韻折陳子中自番昜一别不聞動靜近我生胸次不塵埃不學兒曹剛自媒詩料雖􅑀凨月製宦途還聽鬼神開十年教飬功名念已灰安得金鑾有清問賈生何事未歸耒套筒為繫囚之具因詩其狀折黥辛以鐵圈竹筒貫索作箇咿贅項咽箇中和我萬愁牽一筒作柄簘無竅雙鐵為圜扇有圈身拜却疑人是犬手擎還類筆如椽從今節節能通氣安得常為積蓄錢春郊即事東凨吹動綺羅塵翠蓋紅纓處處新蝶翅拍開千樹雪鶯聲催老十洲春人生有酒須行樂吏祿無階且食貧歸客不須籠畫燭醉和明月上雕輪雪價添字韻折次吳子同酒天低江闊水連天上下周回一色兼撲雀獵鷹翻白縞得魲漁父指青簾馬拋玉勒瓏瑓落獅欠金鈴橘抽添淂句莫嫌呵凍筆明年嵗事已堪占翠微南征録卷之五
