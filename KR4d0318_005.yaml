front:
  text: 翆㣲南征録卷之五
  hash: sha256:7d9d6b38a43ff6ca92cff9a83019742fe31234773e427c0d6400738791012f57
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0318_SBCK_005-1a}
body:
  text: 律詩自寛翁韵折次㳺少十事相尋九不諧骨穷更值五行乖人情厚薄且随分丗態炎凉休掛懐家欲自豊無楮幣㸑􅑀誰執有荆釵如今且任眼前過他日功名殊未涯黄氏三層楼登楼賦詩次韵折東嘉焦次詹約妓瘦笻支我上髙寒凨露凄清酒力慳千里人邀千里月一重楼見一重山筵前飛雪噴焦遂檻外行雲遏小蛮便好翻身駕黄鵠直将情枉扣天関幽居父韵􅊨折次陳吉莫問門無長者車只圖深巷樂樵漁一園黄落食無限萬􅊤碧蓑衣有餘雁足北耒帰訊杳馬蹄南去故人踈東風㸔整朝天斾多少功名在故庐賀趙丞登第要與宗盟立紀綱俯從多士較文章人材漏網無䟽宻科目搜羅有短長蟾窟一枝分玉樹风池三浪出銀潢何當推觧延豪傑為復中原万里疆梅香字韵折次稼軒一年無䖏覔春光杖䇿尋春特地忙墙角数枝偏冷淡江頭千樹欲昏黄梢横波面月摇影花落樽前酒帶香更仗西湖老居士為予收拾付詩囊捉月仙尾囙酌以酒送之中流折夜發雷江有捉月者出舟䌫觧西凨拍岸顛㕍拖秋色上航船掛帆未作乗凨客㪯棹先驚捉月仙椘㱔有淵心石殞賀狂無井眠折眼花眠慇懃為酹一盃酒断送西江浪拍天呈寕次翁見慰次韵折次翁以詩王謙不事冨春侯自是薰蕕味不侔病体隔年留枉獄梦䰟連夜遂帰舟可憐商木遷新令欲為韓門復舊讎但淂此心無所愧為公一死亦何尤悶成勿憂李廣不封矦廣不封侯未足憂漢鼎不烹曹操肉吳鈎空断伍貟頭鴻門自昔推屠狗虎帳于今愧沐猴千万南陽遇徐庶為言豪傑尚縲囚别舘即事十年客裡過春光客裡逢春分外狂半堵碧雲蜗路􅊜一簾紅兩燕泥香􅋦山西日辝春閣拍岸東凨趂夜航莫向錢塘蘇小說東吳新髻李紅娘武㒷觧舟征之役折時有北西凨落日椘江頭秋水已平鸚鵡洲烟樹接天迷過斾浪花翻雪噴行舟三盃万事我已飽一日千里誰能留見說平戎新遣使班超投筆已封侯不遇軒韵折次稼英雄不遇勿長吁苟遇凨雲彼豈拘不向関中効蕭相便于江左作夷吾當知晋覇非由晋所謂虞亾豈在虞多少英灵費河嶽鍾予不遇独何欤紀事事即紀以詩折翆㣲在建遇鉗口刳腸未足殚穷源探本可覌瀾乞醯孰謂鄰非直反矢湏知友必端暴虎欲從頭砕璧沐猴还慮髮衝冠積薪措火居其下試問賈生安未安冬日述怀塘韵折次栁寒入肌膚粟已生銀河凍合水無声梅花漏泄春先到凨色商量雪未成有愧何湏問天理無求方始合人情男兒未際風雲会辜負胸中十万兵暮春述怀彰韵折次李子一年春事已差池又見楊花貼水飛梁燕不憂驚午枕箔蚕生怕誤春衣景逢佳䖏湏行樂事到難時且式㣲幸有黄鳮并濁酒且和凨月酔柴扉幽居兄状元韵折次陳百一十頃平湖一簇山湖山佳䖏著朱闌分堦草色迎春緑漱石泉声入夜寒不優自然人事好有為方信丗途難如今休說當年事只把心平氣㝎㸔謝三劉米黍之辱時昌節前一日折文卿挺卿惠卿見慰且有雁行􅎔慰暖如春玉粒金包即拜㤙周粟不肥清圣肉椘絲難繫直臣魂二生在昔聞孤竹一死于今愧屈原圓簠下頒誠有謂此情兄外更誰論暮春述怀文韵折次羅廣買春無計托花神費盡榆錢不計緡凨絮飛成三径雪雨犁翻動一園春有心報囯從招祸無相封侯謾怨貧試問登壇与分社予何人彼亦何人呈諸同舍然韵折次黄浩洛陽年少不知几十載南州賦式㣲三㪯不登黄甲去両庠空笑白丁帰頭長賈昔過三尺腰大巨今徒十圍秪恐金銮不前席誰云無䇿冨王畿寄陳士元有符離之役折丁夘五月聞郊野英雄不肯收膏梁蒭豢有何謀胡児只怒馬黄弩公子當求狐白裘唐詔屡頒蕡不第漢壇纔築信當侯古今淂䘮同児戲何必區區嘆白頭貧居卿韵折次刘亞貧居不暇理椽茅只倩江山圍一遭林鳥楽時知地僻嶺雲閑䖏斍天髙春衫着破重連線臈酒擎乾犹䊉糟且把盃􅐻聊自適不須平地𧺫凨濤呈魯功甫有禁烟之約折功甫元宵預拂面東凨二月天緑楊芳草暗平川花容着雨閗翻錦春色惱人催禁烟灯夜雖然君有約花時却恐我無縁直湏淂暇耒相訪當約嫦娥伴酔眠勉馮著明淮著明病辝作詩勉之折著明𬒳西府􅊾押兵上主憂臣辱已難堪囯事顛危况未安溺嫂􅎔淵犹援手閗人同室尚纓冠公如不唱從軍樂士亦恐行路難麟閣功名縂劳苦莫将行役作辛酸藕花西社中名士見者莫不閣筆近折馮肖許有藕花詩和者盈軸其却勉強續貂折送至義不可惜絲不肯織宫鞋花月仙人謫不耒河伯借泥封玉腕凨神翻浪沃香腮無房不許蜂留宿有盖尝令鷺自開何事冤仇結青女一朝收拾付塵灰自勉丞韵折次趙丗態凨波不可論且于閑䖏楽天真肥家無子堪登隴憂囯有人休問津顔色雖䝉時借我脚跟那觧日随人客耒若問當時事摇手無言對北鄰𥘉夏即事叔韵折次王剛隂晴未判落梅天栁巷無人絮撲氈滌器倒囊尋市醖喚船挑網得溪鮮鳥声呼梦客千里山色撩人句一聫遐想故人應念我馬蹄何䖏夕陽邉呈鍾子嚴之意因箴之折子嚴方有入荆那條路不通声折去長安莫把心腸独自剜有釀何湏兒索飲無殽徒勸客加飡千金不賞思帰椘萬戸無封願識韓大抵利名些子耳幾多豪傑𬒳縈絆寄楊渭夫自愧材猷不足覌独于忠義死難千二陵漢万里腥羶誰報韓眼到北盟常揾血衝冠如何一代多人傑稽首称藩鼻不酸幽居之韵折次刘徳瀟灑幽居屋一重入門花栁間青紅簾尝礙月鈎尝掛酒不逢花盞不空畏爱難全公子日雌雄誰識大王凨且将酒貨迁詩料休問榷塲通未通呈王君庸有納寵之慶示詩次韵折君庸嵗有烹笋之集是春主人意重出霓裳客子愁多欲断腸眉黛暗傳春去恨臉紅犹帶夜耒粧竹根稚子肌膚滑葉底荷花語笑香多少行雲在巫峡謾将詩思惱㐮王寄西山訊事次韵折西山以詩宫墙無地可穿窬犹幸先人有弊庐仕版可羞寕毁瓦儒冠曽誤枉收書供柴我合同收炭寄食君當自办𬞞此理曉然明似鏡何湏足下肆耕鋤呈李朝舉昜有詩見寄次韵折朝㪯談論慷慨居番一片忠肝照日明済時無䇿苦傷情聱牙拊几悔南渡和泪挑灯編北盟漢用􅊾招三十郡椘因歌散八千兵太平若闘生灵肉何用生灵望太平小春言懐甫韵折次項山桃李生香花滿谿南州十月尚襜衣春從酒罋榨将出秋在詩囊帶得帰弓射十分方破的棊髙一著便争机勸君莫作等閑看毫髮差殊事已非春愁已昏之句次其韵折益公有萬事関心眼十日春愁不出門出門春事已消魂摘花掀㡌倩人挿索酒得盃和月吞啼鳥声中近寒食落花隂裡又黄昏春耒春去縂休問徃事悠悠付一樽呈徐商卿十年憂患謫東南萬事于心了不関病去只愁双足軟老耒且喜一身閑人情無䖏便生怨天道有時犹好還大抵乆長居冨貴到頭天意亦湏慳春逰有感賞春之韵折次王長卿上苑春工到海棠老夫随分為春忙朱絃轉枕鶯催拍紅粉倚欄花閗粧吾道幾時曽損益人心今日自炎凉願言相約花前醉一聴児童号酒狂憂山甫折呈項憂吾所謂果何憂憂國憂家卒未休坐法馬遷方去漢釋囚箕子未帰周西凨萬籟声声恨夜兩踈桐點点愁有客不知吾所向却将米價問南州述懐忽自廣信耒慰我有詩次其韵折陳子中自番昜一别不聞動静近我生胸次不塵埃不學兒曹剛自媒詩料雖􅑀凨月製宦途還聴鬼神開十年教飬功名念已灰安得金銮有清問賈生何事未帰耒套筒為繫囚之具因詩其状折黥辛以鉄圈竹筒貫索作箇咿贅項咽箇中和我萬愁牽一筒作柄簘無竅双鉄為圜扇有圈身拜却疑人是犬手擎還類筆如椽從今節節能通氣安得常為積蓄錢春郊即事東凨吹動綺羅塵翠盖紅纓處處新蝶翅拍開千樹雪鶯声催老十洲春人生有酒湏行楽吏禄無階且食貧帰客不湏籠畫烛酔和明月上雕輪雪價添字韵折次呉子同酒天低江闊水連天上下周囬一色兼撲雀獵鷹翻白縞得魲漁父指青帘馬抛玉勒瓏瑓落獅欠金鈴橘抽添淂句莫嫌呵凍筆明年嵗事已堪占翠㣲南征録卷之五
